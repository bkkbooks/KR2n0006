body:
  text: 漢藝文志考證卷七宋王應麟撰名鄧析二篇劉向序臣所校讎中鄧析書四篇臣叙書一篇凡中外書五篇以相校除復重為二篇子産卒後二十年而鄧析死𫝊或稱子産誅鄧析非也其論無厚者言之異同與公孫龍同類隋志一卷無厚轉辭二篇韓非子曰堅白無厚之辭章而憲令之法息晁氏曰析之學盖兼名法家今其書大㫖訐而刻真其言也其間時勦取他書頗駮襍不倫豈後人附益之與荀子非十二子與惠施並言左傳鄭駟顓殺鄧析而用其竹刑淮南鴻烈曰鄧析巧辯而亂法尹文子一篇莊子天下篇云宋鈃尹文其為人太多其自為太少魏黄初末山陽仲長氏得其書始詮次為上下二篇李獻臣云仲長氏紇也晁氏曰序稱當齊宣王時居稷下學於公孫龍龍稱之而志叙此書在龍書上顔師古謂文嘗説齊宣王在龍之前史記云公孫龍客于平原君君相趙惠文王惠文王元年齊宣没已四十餘嵗矣則知文非學于龍者也今觀其書雖専言刑名然亦宗六藝數稱仲尼其叛道者盖鮮豈若龍之不宗賢聖好怪妄言哉洪氏曰劉歆云其學本於黄老今其文僅五千言亦非純本黄老者頗流而入於兼愛隋志二卷周之處士逰齊稷下公孫龍子十四篇史記趙有公孫龍為堅白同異之辯志毛公九篇趙人與公孫龍等並逰平原君趙勝家索隠謂龍即仲尼弟子非也列子釋文龍字子秉趙人莊子謂惠子曰儒墨楊秉四與夫子為五果孰是邪楊楊朱也秉公孫龍也晉太康地記云汝南西平縣有龍淵水可用淬刀劍特堅利故有堅白之論云黄所以為堅也白所以為利也或辯之曰白所以為不堅黄所以為不利司馬彪曰堅白謂堅石非石白馬非馬也同異謂使異者同同者異吕氏春秋云孔穿公孫龍相與論於平原君所深而辯至於藏三牙公孫龍言藏之三牙甚辯孔穿不應少選辭而出明日孔穿朝平原君謂孔穿曰昔有公孫之言甚辯孔穿曰然幾能令藏三牙矣雖然難願得有問於君謂藏三牙甚難而實非也謂藏兩牙甚易而實是也不知君将從易而是也者乎将從難而非者乎平原君不應明日謂公孫龍曰公無與孔穿辯淮南鴻烈曰公孫龍粲於辭而貿名楊子曰公孫龍詭辭數萬東萊吕氏曰告子彼長而我長之彼白而我白之斯言也盖堅白同異之祖孟子累章辯析歴舉玉雪羽馬人五白之説借其矛而伐之而其技窮唐志三卷今一卷惠子一篇莊子天下篇惠施多方其書五車其道舛駁其言也不中荀子曰惠子蔽於辭而不知實荘子徳充符天選子之形子以堅白鳴孔子曰必也正名乎尹文子曰形以定名名以定事事以驗名察其所以然則形名之與事無所隠其理矣名有三科一曰命物之名方圓白黒是也二曰毁譽之名善惡貴賤是也三曰況謂之名賢愚愛憎是也墨尹佚二篇左傳稱史佚有言史佚之志晉語胥臣曰文王訪於辛尹注辛甲尹佚皆周大史洛誥逸祝册正義以為史佚淮南鴻烈引成王問政於尹佚保傅傅丞立於後是史佚也説苑引成王問政於尹逸尹佚周史也而為墨家之首今書亡不可考按吕氏春秋魯惠公使宰譲請郊廟之禮於天子天子使史角徃惠公止之其後在於魯墨子學焉意者史角之後託於佚歟田俅子三篇文選注太平御覽引之隋志梁有一卷謂少昊鞬鞮毛人獻羽裘赤集户遺其丹書夏禹渠搜人獻珍裘堯蓂莢成歴獬豸毛為帳隨巢子六篇胡非子三篇隋唐志各一卷洪氏曰二書今不復存馬揔意林所述隨巢兼愛明鬼而墨之徒可知胡非言勇有五等其説亦卑陬無過人處藝文類聚引隨巢子曰昔三苖大亂天命夏禹於𤣥宫有大神人面鳥身降而福之司禄益食而民不饑司金益富而國家實司命益年而民不夭四方歸之禹乃克三苖而神民不違禹産於崐石啟生於石史記索𨼆引隨巢子云夷羊在牧飛拾滿野天鬼不顧亦不賔㓕太平御覽引昔三苖大亂龍生于廟犬哭于市天賜武王黄鳥之旗以代殷愚謂此即墨氏之明鬼也墨子七十一篇館閣書目十五卷自親士至襍守為七十一篇亡節用節葬明鬼非樂非儒等九篇一本自親士至襍守為七十一篇所存六十一篇且多訛脱不相聨屬又一本止存一十三篇晁氏曰荀孟皆非之而韓愈獨謂辯生於末學非二師之道本然也韓非子曰有相里氏相夫氏鄧陵氏之墨墨離為三荀子曰墨子有有於齊無見於畸又曰墨子蔽於用而不知文晉魯勝注墨辯其叙曰墨子著書作辯經以立名本惠施公孫龍祖述其學以正刑名顯於世墨辯有上下經經各有説凡四篇與其書衆篇連第故獨存史記云墨翟宋之大夫善守禦為節用或曰並孔子時或曰在其後索隠曰按别録云墨子書有文子文子子夏之弟子問於墨子如此則墨子在七十子之後莊子天下篇云相里勤之弟子五侯之徒南方之墨者苦獲已齒鄧陵子之屬俱誦墨經而倍譎不同相謂别墨又云以巨子為聖人皆願為之尸吕氏春秋墨者有鉅子腹䵍居秦墨者鉅子孟勝善荆之陽城君孟勝曰我将屬鉅子於宋之田襄子此即莊子所謂巨子也從横蘓子三十二篇鬼谷子三卷樂壹注云蘓秦欲神秘其道故假名鬼谷也史記正義戰國䇿云乃發書陳篋數十得太公隂符之謀伏而誦之簡練以為揣摩鬼谷子有隂符七術有揣及摩二篇乃蘓秦書明矣東萊吕氏曰戰國游説之風蘓秦張儀公孫衍實倡之秦周人也儀與衍皆魏人也故言權變辯智之士必曰三晉兩周云石林葉氏曰蘓秦學出於揣摩未嘗卓然有志天下反覆無常不守一道度其隙苟可入者則為之此揣摩之術也故始求説周周顯王不能用則去而之秦再求説秦秦孝公不能用則去而之燕幸燕文侯適合而從説行其所以説周者吾不能知若秦孝公而聴之則必先為衡説以噬六國何有於周此蘓秦所以取死也太平御覧引蘓子曰天子坐九重之内樹塞其門旅以翳明衡以隠聴鸞以抑馳後漢王符傳注引蘓子曰人生一世若朝露之宅於桐葉耳其與幾何御覧又引蘭以芳自燒膏以肥自􅌊翠以羽殃身蚌以珠致破鬼谷子不著録晁氏曰按史記戰國時隠居頴川陽城之鬼谷因以自號長於養性治身蘓秦張儀師之受縱横之事尹知章叙謂此書即授秦儀者捭闔之術十三章一云十二章本經持樞中經三篇一云受轉九胠篋三章秦儀復徃見先生乃正席而坐嚴顔而言告二子以全身之道梁陶𢎞景注桞子厚嘗曰劉向班固録書無鬼谷子鬼谷子後出而嶮盭峭薄恐其言妄亂世難信尤者晚乃益出七術怪謬異甚言益隘使人猖狂失守來鵠亦曰鬼谷子昔教人詭紿激訐揣測憸􅉸之術悉備於章學之者惟儀秦而已始捭闔飛䈤實今之常態是知漸漓之後不讀鬼谷子書者其行事皆得自然符契也昔蒼頡作文字鬼為之哭不知鬼谷作是書鬼何為耶世人欲知鬼谷子者觀二子言略盡矣劉氏涇曰老之翕張儒之闔闢其與鬼谷徃來如環鬼幽而顯者也谷扣而應者也藏幽露顯一扣一應信如其名哉説苑引鬼谷子曰人之不善而能矯之者難矣闕子一篇太平御覧引闕子云任公子冬羅鯉於山阿又云吳章莊吉之調又云魯人有好釣者以桂為餌黄金為鈎垂翡翠之綸藝文類聚引闕子云宋景公使弓工為弓九年來見云云其餘力逸勁飲羽於石梁又云宋之愚人得燕石於梧臺之東歸而藏之以為寳蒯子一篇蒯通𫝊論戰國時説士權變亦自序其説凡八十一首號曰雋永史記通善為長短説論戰國之權變為八十一首主父偃二十八篇説苑引主父偃曰人而無辭安所用之昔子産脩其辭而趙武致其敬王孫滿明其言而楚莊以慙縱横東萊吕氏曰連闗中之謂横合闗東之謂從胡氏曰秦合六國從儀以秦衡不再嵗其約皆觧蘓氏曰二者皆出於權譎而從為愈葉氏曰從人之與衡人相去逺矣太史公言張儀之惡甚於蘓秦韓非子曰從者合衆強以攻一弱也而衡者事一強以攻衆弱也皆非所以持國也周去秦為從朞年而舉衛離魏為衡半嵗而亡是周㓕於從衛亡於衡也襍孔甲盤盂二十六篇田蚡傳學盤盂諸書注應劭曰黄帝史孔甲所作也文選注七畧曰盤孟書者其傳言孔甲為之孔甲黄帝之史也書盤盂中為誡法或於鼎名曰銘書盤盂中所以為法戒孟康曰襍家書兼儒墨名法蔡邕銘論黄帝有巾機之法孔甲有槃杅之誡梁簡文帝云盤盂寓殷髙之辭大􅀢三十七篇賈誼書脩政語引大禹曰民無食也則我弗能使也功成而不利於民我弗能勸也太史公大宛傳云禹本紀言河出崑崙尉繚二十九篇兵形埶又有尉繚三十一篇隋志尉繚子五卷今二十四篇天官至兵令言刑政兵戰之事其文意有附㑹者首篇稱梁惠王問意者魏人與秦始皇紀大梁人尉繚來説秦王尸子二十篇史記楚有尸子注劉向别録楚有尸子疑謂其在蜀今案尸子書晉人也名佼秦相衛鞅客也衛鞅商君謀事畫計立法理民未嘗不與佼規也商君被刑佼恐并誅乃亡逃入蜀造二十篇書凡六萬餘言後漢書注尸佼作書二十篇内十九篇陳道徳仁義之紀内一篇言九州險阻水泉所起吕強上疏引尸子曰君如杅民如水杅方則水方杅圓則水圓隋志二十卷其九篇亡魏黄初中續李淑書目存四卷館閣書目止存二篇合為一卷爾雅疏引廣澤仁意綽子篇宋書禮志引禹治水為䘮法古今人表註雒陶已下背舜之友也並見尸子榖梁傳引尸子曰舞夏自天子至諸侯皆用八佾吕氏春秋二十六篇史記吕不韋招致士厚遇之主食客三千人是時諸侯多辯士如荀卿之徒著書布天下不韋乃使其客人人著所聞集論以為八覧六論十二紀二十餘萬言以為備天地萬物古今之事號曰吕氏春秋索隠曰八覧者有始孝行慎大先識審分審應離俗恃君凡八十三篇六論者開春慎行貴直不苟似順士容凡三十六篇十二紀者記十二月也有孟春等紀凡六十一篇是書以月紀為首故以春秋名髙誘注二十六卷月令本十二月紀之首章東萊吕氏曰不韋春秋成於始皇八年按吕氏春秋維秦八年嵗在涒灘秋甲子朔朔之日良人請問十二紀此其書成之嵗月也涒灘者申也通鑑皇極經世始皇八年嵗在壬戌後吕氏春秋二年不韋當時人必不誤盖後世筭歴者之差也不韋引夏書曰天子之徳廣運乃神乃武乃文商書曰五世之廟可以觀怪萬夫之長可以生謀仲虺有言曰諸侯之徳能自為取師者王者自為取友者存其所擇而莫如巳者亡周書曰若臨深淵若履薄氷舜自為詩曰普天之下莫非王土率土之濵莫非王臣其舛異如此豈一字不能増損乎司馬遷傳云不韋遷蜀世傳吕覧淮南内二十一篇淮南王安𫝊招致賔客方術之士數千人作為内書二十一篇外書甚衆又有中篇八卷言神仙黄白之術亦二十餘萬言安入朝獻所作内篇新出上愛秘之西京襍記安著鴻烈二十一篇鴻大也烈明也言大明禮教自云字中皆挾風霜揚子雲以為一出一入安與蘓飛李尚左吳田由雷被毛披伍被晉昌八人及諸儒大山小山之徒共講論道徳總統仁義而著此書許慎注標其首皆曰問詁自名注曰記上伯象先生一篇新序公孫敖問伯象先生曰今先生收天下之術博觀四方之事久矣未能禆世主之治明君臣之義荆軻論五篇文章縁起司馬相如作荆軻讚文心彫龍相如屬詞始讚荆軻農神農二十篇孟子有為神農之言者許行食貨志鼂錯引神農之教曰有石城十仞湯地百歩𢃄甲百萬而亡粟弗能守也吕氏春秋引神農之教曰士有當年而不耕者則天下或受其饑矣女有當年而不績者則天下或受其寒矣管子引神農之教曰一榖不登减一榖榖之法十倍汜勝之書亦引神農之教劉子引神農之法淮南子曰世俗之人多尊古而賤今故為道者必託之于神農黄帝而後入説野老十七篇真隠𫝊六國時人遊秦楚間年老隠居著書言農家事因以為號尹都尉十四篇劉向别録云尹都尉書有種芥葵蓼韭葱諸篇北史蕭大圜云穫菽尋氾氏之書露葵徴尹君之録唐志尹都尉書三卷氾勝之十八篇氾音凡皇甫謐云本姓凡氏遭秦亂避地於汜水因改焉勝之撰書言種植之事子輯為燉煌太守隋唐有氾勝之書二卷月令注農書曰土長冐橛國語注引春土冐橛陳根可拔耕者急發正義云先師以為氾勝之書周禮草人注化之使羙若氾勝之術也䟽云漢時農書有數家氾勝為上後漢劉般傳注文選注缺學記太平御覧皆引之晉食貨志漢遣輕車使者氾穣勝之督三輔種麥而闗中遂蔡癸一篇食貨志宣帝時蔡癸以好農使勸郡國至大官太平御覧崔元始正論曰宣帝使蔡癸校民耕相三犂共一牛一人持之下種挽摟皆取備焉一日種頃盖出於農稷之官吕氏春秋任地篇后稷曰子能以窐為突乎子能藏其惡而揖之以隂乎食貨志后稷始甽田小説伊尹説二十七篇司馬相如𫝊注應劭曰伊尹書曰箕山之東青馬之所有盧橘夏孰吕氏春秋伊尹説湯以至味箕山之東青島之所有甘櫨焉即應劭所引盖戰國之士謂伊尹以割烹要湯故為是説孟子辯之詳矣史記殷本紀伊尹從湯言素王及九主之事注引劉向别録曰九主者有法君専君授君勞君寄君等君破君國君三嵗任君凡九品圖畫其形青史子五十七篇風俗通義引青史子書大戴禮保傅篇青史氏之記曰古者胎教隋志梁有青史子一卷文心彫龍云青史日綴於街談務成子十一篇荀子舜學於務成昭注尸子曰務成昭之教舜曰避天下之逆從天下之順天下不足取也避天下之順從天下之逆天下不足失也宋子十八篇孫卿道宋子荀子云宋子有見於少無見於多注宋鈃宋人也與孟子同時孟子作宋牼又云宋子蔽於欲而不知得又引子宋子曰明見侮之不辱使人不闘注莊子説宋子曰見侮不辱救民之闘弟宋子盖尹文子又云子宋子曰人之情欲寡而皆以巳之情欲為多是過也天乙三篇賈誼書脩政語引湯曰云云史記殷本紀湯曰予有言人視水見形視民知治不虞初周説九百四十三篇郊祀志丁夫人雒陽虞初等以方祠詛匈奴大宛焉孔子曰雖小道必有可觀者焉按論語子夏曰云云非孔子之言蔡邕曰小能小善雖有可觀孔子以為致逺則泥盖因此志之誤相反而皆相成也致堂胡氏曰夫仁以親親義以尊尊施之雖有等衰發端則非異道故事父孝則忠可移求忠臣則於孝子未聞相反之理也曰法則慘刻曰名則苛繞曰墨則二本曰從横則妾婦之道是皆五經之棄也其歸豈足要乎儒家者流因修六藝矣列儒於九家而曰修六藝之術以觀九家之言則修六藝者無所名家謂誰氏耶何以言之多舛也漢藝文志考證卷七
