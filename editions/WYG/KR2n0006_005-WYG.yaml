body:
  text: 漢藝文志考證卷五宋王應麟撰儒文晏子八篇隋唐志晏子春秋七卷著其行事及諫諍之言太史公曰吾讀晏子春秋禮記投壺注引晏子春秋崇文總目十二卷或以爲後人采嬰行事爲書故卷頗多於前志柳宗元謂墨子之徒有齊人者爲之墨好儉晏子以儉名於世故墨子之徒尊著其事以增高爲巳術者且其㫖多尚同兼愛非樂節用非厚葬久䘮非儒明鬼皆出墨子其言問棗及古冶子等尤怪誕又往往言墨子聞其道而稱之此甚顯白者晏子春秋云墨子聞之曰晏子知道道在爲人失在爲巳後之録諸子書者宜列之墨家非晏子爲墨也爲是書者墨之道也晁氏從此説薛氏曰讀孔叢子詰墨怪其於墨子無見皆晏子春秋語也迺知宗元之辨有自而起史通曰晏子虞卿呂氏陸賈其書篇第本無年月而亦謂春秋子思二十三篇隋唐志子思子七卷沈約謂禮記中庸表記坊記緇衣皆取子思子愚按坊記引論語曰三年無改於父之道可謂孝矣論語成於夫子之門人則記所謂子云者非夫子之言也文選注引子思子民以君爲心君以民爲體又引詩云昔吾有先正其言明且清國家以寧都邑以成初學記引東户季子之時道上鴈行而不拾遺耕耜餘糧宿諸畝首今有一卷乃取諸孔叢子非本書也曾子十八篇隋唐志二卷參與弟子公明儀樂正子春單居離曾元曾華之徒論述立身孝行之要天地萬物之理今十篇自脩身至天圓皆見於大戴禮於篇第爲四十九至五十八蓋後人摭出爲二卷朱文公曰世傳曾子書乃獨取大戴禮之十篇以充之其言語氣象視論孟檀弓等篇所載相去逺甚晁氏曰視漢亡八篇矣漆彫子十二篇孔子弟子漆彫啟後韓非子曰孔子之後儒分爲八有子張氏子思氏顔氏孟氏漆彫氏仲良氏公孫氏樂正氏之儒史記列傳漆彫開字子開蓋名啟字子開史記避景帝諱也論語注以開爲名著書者其後也世子二十一篇王充論衡本性篇周人世碩以爲人性有善有惡舉人之善性養而致之則善長惡性養而致之則惡長如此則性各有隂陽善惡在所養焉故世子作養書一篇宓子賤漆彫開公孫尼子之徒亦論性情與世子相出入皆言性有善有惡李克七篇韓詩外傳説苑魏文侯問李克文選魏都賦注引李克書公孫尼子二十八篇隋唐志一卷似孔子弟子沈約謂樂記取公孫尼子劉瓛曰緇衣公孫尼子所作也馬摠意林引之孟子十一篇趙岐題辭著書七篇又有外書四篇性善辯文説孝經爲正其文不能𢎞深不與内篇相似志云十一篇并外書也外書今不傳論衡云孟子作性善之篇以爲人性皆善及其不善物亂之也謂人生於天地皆稟善性長大與物交接放縱悖亂不善日以生矣法言引孟子曰夫有意而不至者有矣未有無意而至者也説苑太平御覽引人皆知以食愈飢莫知以學愈愚人皆知糞其田而莫知糞其心顔氏家訓引圖景失形劉知幾史通引堯舜不勝其美桀紂不勝其惡李善注文選引太山之高參天入雲史記六國表注皇甫謐曰孟子稱禹生石紐西夷人也漢伍被傳引孟子曰紂貴爲天子死曾不如匹夫是紂先自絶乆矣非死之日天去之也藝文類聚引滕文公葬及恵子諫坊記注引舜年五十而不失其孺子之心皆外書也説文引孟子去齊滰浙而行謜謜而來孝子之心不若是􅢚二女婐晁氏曰按此書韓愈以爲弟子所㑹集非軻自作今考於軻之書則知愈之言非妄發也其書載孟子所見諸侯皆稱諡如齊宣王梁恵王梁襄王滕定公滕文公魯平公是也夫死然後有謚軻著書時所見諸侯不應皆死且恵王元年至平公之卒凡七十七年孟子見恵王王目之曰叟必已老矣决不見平公之卒也故予以愈言爲然𫝊子云字子輿廣韻云字子居其唐林謹思云七篇非軻自著乃弟子共記言與韓愈之説同孫卿子三十三篇當云三十二篇劉向校讐書錄序云所校讐中孫卿書凡三百三十三篇以相校除復重二百九十篇定著三十二篇皆以定殺青簡書可繕冩勸學至賦篇楊倞分易卷苐更名荀子韓文公曰荀卿之書語聖人必曰孔子子弓子弓之事業不傳惟太史公書弟子傳有馯臂子弓子弓受易於商瞿論語釋文引王弼注朱張字子弓荀卿以比孔子後山陳氏曰子弓者仲弓也唐氏曰向博極羣書序卿事大抵本司馬遷於遷書有三不合春申君死當齊王建二十八年距宣王八十七年向言卿以宣王時來游學春申君死而卿廢設以宣王末年游齊年巳百三十七矣遷書記孟子以恵王三十五年至梁當齊宣王七年恵王以叟稱孟子計亦五十餘後二十三年子之亂燕孟子在齊若卿來以宣王時不得如向言後孟子百餘嵗田忌薦孫臏爲軍師敗魏桂陵當齊威王二十六年距趙孝成王七十八年臨武君與卿議兵於王前向以為孫臏倞以敗魏馬陵疑年馬陵去桂陵又十三年矣芉子十八篇名嬰齊人史記阿之吀子索隠吀音􅇗别錄作芉子徐廣云阿者今之東阿正義曰藝文志吀子十八篇顔師古音弭按是齊人阿又屬齊恐顔誤内業十五篇按管子有内業篇此書恐亦其類周史六弢六篇師古曰即今之六韜莊子女商曰從説之則以金板六弢釋文云本又作六韜謂文武虎豹龍犬今六韜六卷六十篇尚書正義以爲後人所作非實事也館閣書目謂周史六弢恐别是一書通鑑外紀云志在儒家非兵書也今六韜文王武王問太公兵戰之事其言鄙里煩雜不類太公之語蓋後人依托爲之唐氏曰春秋以前中國未有騎戰計必起於戰國之時今六韜言其戰最詳决非太公所作當出於孫吳之後謀臣䇿士之所託也寗越一篇呂氏春秋寗越中牟之鄙夫也苦耕稼之勞謂其友曰何爲而可以免此苦也其友曰莫如學學三十嵗則可以達矣寗越曰請以十嵗人將休吾將不敢休人將卧吾將不敢卧十五嵗而周威公師之注威公西周君也志注公爲周威王師説苑引周威公問於寗子取士有道乎史記秦始皇紀賈生曰六國之士有寧越索隠云趙人徐廣云一作經越或自别有此人不必寗越王孫子一篇隋志梁有王孫子一卷馬總意林引之太平御覽引趙簡子獵於晉陽撫轡而歎楚莊王攻宋將軍子重諫藝文類聚引衛靈公坐重華之臺董子一篇名無心難墨子隋志一卷論衡福虚篇儒家之徒董無心墨家之徒纒子相見講道纒子稱墨家右鬼神是引秦穆公有明徳上帝賜之九年董子難以堯舜不賜年桀紂不夭死近而秦繆晉文言之夫繆者誤亂之名文者徳恵之表有誤亂之行天賜之年有徳恵之操天奪其命乎按繆公之霸不過晉文晉文之諡美於繆公天不加晉文以命獨賜繆公以年是天報誤亂也館閣書目一卷與學墨者纒子辨上同兼愛上賢明鬼神非纒子屈焉吳袐注徐子四十二篇魏世家恵王三十年使龎涓將而令太子申爲上將軍過外黄外黄徐子謂太子曰臣有百戰百勝之術太子曰可得聞乎客曰固願效之曰太子自將攻齊大勝并莒則富不過有魏貴不益爲王若戰不勝齊則萬世無魏矣此臣之百戰百勝之術也太子曰諸請必從公之言而還矣客曰太子雖欲還不得矣彼勸太子戰攻欲啜汁者衆太子雖欲還恐不得矣太子因欲還其御曰將出而還與北同太子果與齊人戰敗於馬陵齊虜魏太子申殺將軍涓遂大破魏劉向别錄曰徐子外黄人也外黄時屬宋魯仲連子十四篇隋志五卷錄一卷春秋正義文選注太平御覽引之史記正義引魯連子云齊辯士田巴服徂丘議稷下毁五帝罪三王服五伯離堅白合同異一日服千人有徐刼者其弟子曰魯仲連年十二號千里駒往詣田巴曰臣聞堂上不糞郊草不芸白刃交前不救流矢急不暇緩也今楚軍南陽趙伐高唐燕人十萬聊城不去國亡在旦夕先生柰之何若不能者先生之言有似梟鳴出城而人惡之願先生勿復言田巴曰謹聞命矣巴謂徐刼曰先生乃飛􅊵也豈直千里駒巴終身不談虞氏春秋十五篇十二諸侯年表序趙孝成王時其相虞卿上采春秋下觀近世亦著八篇爲虞氏春秋本傳云著書上采春秋下觀近世曰節義稱號揣摩政謀凡八篇以刺譏國家得失世傳之曰虞氏春秋太史公曰虞卿非窮愁亦不能著書以自見於後世當史記志篇數不同考高祖傳十三篇魏相傳奏明堂月令曰高皇帝所述書天子所服第八隋志梁有漢高祖手詔一卷陸賈二十三篇本傳高帝曰爲我著秦所以失天下吾所以得之者及古成敗之國賈凡著十二篇每奏一篇未嘗不稱善稱其書曰新語太史公曰余讀陸生新語十二篇固當世之辯士隋唐志二卷今存道基術事輔政無爲資賢至徳懐慮七篇吳儔曰輔政篇曰書不必起於仲尼之門夫黜仲尼之書則道不尊矣烏能使高帝行儒術哉孝文傳十一篇史記文帝紀凡詔皆稱上曰以其出於帝之實意也賈誼五十八篇本傳凡所著述五十八篇今新書十卷事勢連語雜事凡五十八篇或取漢書誼傳附于後隋志云賈子書本七十二篇劉向刪定昭帝始元五年詔曰通保傅𫝊文頴以爲賈誼作今在大戴禮第四十八篇考之新書蓋以保傅傅職胎教容經四篇合爲一朱文公曰其言教太子輔少主之道與誼本傳疏語同當時以列於論語孝經尚書而進於君蓋已有識其言之要者矣顔師古曰誼上疏可爲太息者六今三而止蓋史取其切要者今考新書諸篇其末綴以痛哭者一流涕者二太息者四其餘篇目或泛論事機而不屬於是三者如服疑益壤權重諸篇是也班固作傳分散其書參差不一總其大略自陛下誰憚而久不爲此已上則取其書所謂宗首數寧藩傷藩强五美壹動而五業附新書云五美制不定親疎危亂凡七篇而爲之自天下之勢方病大腫以下以爲痛哭之説與其書合至於流涕二説其論足食勸農者是其一也而固載之食貨志不以爲流涕之説也論制匈奴其實一事凡有二篇其一書以流涕其一則否是與前所謂足食勸農而爲二也固既去其一則以爲不足故又分解制匈奴二篇以爲流涕之二説庶人上僣體貌大臣皆其書所謂太息之説也固從而取之當矣而其書又有等齊篇論當時名分不正銅布篇論收銅鑄錢又皆其太息之説也固乃畧去等齊之篇不取而以銅布之篇附于食貨志顧取秦俗經制二篇其書不以爲太息者則以爲之書經刪削非皆全文朱文公謂新書是平日記錄藁草其中事事俱有誼有經世之才孔臧十篇孔叢連叢子云臧厯位九卿遷御史大夫辭曰世以經學爲家乞爲太常與安國紀綱古訓遂拜太常禮賜如三公著書十篇先時常爲賦二十四篇四篇别不在集似其幼時之作也又爲書與從弟及戒子皆有義朱文公曰孔叢子叙事至東漢然詞氣卑近亦非東漢人作所書孔臧禮賜如三公等事皆無其實而通鑑誤信之所載臧兄弟往還書疏正類西京雜記偽造漢人文章河間獻王對上下三雍宮三篇本傳武帝時獻王來朝獻雅樂對三雍宮應劭曰辟雍明堂靈臺及詔䇿所問三十餘事其對推道術而言得事之中文約指明後漢張純案河間古辟雍記具奏之説苑引獻王之言司馬公曰獻王得周官左氏春秋毛氏詩而立之周禮者周公之大典毛氏言詩最宻左氏與春秋相表裏三者不出六藝不明微獻王則六藝其遂曀乎故其功烈至今賴之五宗世家注漢名臣奏曰獻王朝被服造次必於仁義問以五䇿獻王輒對無窮董仲舒百二十三篇本傳仲舒所著皆明經術之意及上疏條教凡百二十三篇而説春秋事得失間舉玉杯蕃露清明竹林之屬復數十篇十餘萬言後漢明徳馬后尤善董仲舒書注云玉杯蕃露清明林竹之屬七錄隋唐志春秋繁露十七卷今八十二篇始楚莊王終天道施三篇闕又即用玉杯竹題題篇疑後人附著館閣書目案逸周書王㑹天子南面立絻無繁露注云繁露冕之所埀有聫貫之象春秋屬辭比事仲舒立名或取諸此集一卷士不遇賦荅制䇿詣公孫𢎞記室其見於傳注者有救日食祝止雨書雨雹對鉤盾冗從李步昌八篇百官表少府有鉤盾令丞注鉤盾主近苑囿枚臯傳與冗從爭注散職鹽鐵論六十篇車千秋傳贊鹽鐵議者起始元中六年二月徴文學賢良問以治亂皆對願罷郡國鹽鐵酒𣙜均輸務本抑末毋與天下争利然後教化可興御史大夫桑𢎞羊以爲此迺所以安邊竟制四夷國家大業不可廢也當時相詰難頗有其議又至宣帝時汝南桓寛次公治公羊春秋舉爲郎至廬江太守丞博通善屬文推衍鹽鐵之議增廣條目極其論難著數萬言亦欲以究治亂成一家之法焉今十卷本論第一至雜論第六十劉向所序新序本傳采傳記行事者新序説苑凡五十篇奏之隋志新序三十卷説苑二十卷是也曾鞏校定十卷雜事至善謀陽朔元年二月癸卯上總一百八十三章二十卷缺史記商君傳注引新序論索隠曰新序是劉歆所撰蓋誤以向爲歆説苑向校中書説苑雜事分别次序除去與新序復重者以類相從凡二十篇君道至反質七百八十四章鴻嘉四年三月巳亥上崇文總目存者五篇曾鞏復得十五篇與舊爲二十篇李徳芻云闕反質一卷鞏分修文爲上下以足二十卷後高麗進一卷遂足世説未詳本傳著疾讒摘要救危及世頌凡八篇古事悼已及同類也今其書不傳列女傳頌圖本傳向採取詩書所載賢妃正婦興國規條可法則及孽嬖亂亡者序次爲列女傳凡八篇以戒天子傳七篇頌義一篇曾鞏序曰隋書及崇文總目皆十五篇曹大家注以頌義考之蓋大家所注離其七篇爲十四與頌義凡十五篇而益以陳嬰母及東漢以來凡十六事非向書本然也蘓頌以頌義篇次復定其書爲八篇隋書以頌義爲劉歆作今驗頌義之文蓋同自叙又藝文志有頌圖明非歆作也王囘序曰有母儀賢明仁智真慎節義辯通孽嬖等篇而各頌其義圖其狀總爲卒篇傳如太史公記頌如詩之四言而圖爲屏風頌云畫之屏風列劉向七畧别錄曰臣向與黄門侍郎歆所校女傳種類相從爲七篇以著禍福榮辱之效是非得失之分畫之於屏風四堵以頌考之每篇皆十五傳則凡無頌者宜皆非向所奏書不特自陳嬰母爲斷也自周郊婦至東漢梁嬺等以時次之别爲一篇隋志又曰向作列仙列士列女之傳列仙列士傳不著錄揚雄所序太𤣥十九本傳𤣥三方九州二十七部八十一家二百四十三表七百二十九贊分爲三卷曰一二三有首衝錯測攡瑩數文掜圖告十一篇皆以解剥𤣥體離散其文首贊測各爲卷范望散於注中蕭該音義曰案别録告下有𤣥問一篇合十二篇今脱一篇司馬公説𤣥曰易與太𤣥大抵道同而法異易畫有二曰陽曰隂𤣥畫有三曰一曰二曰三易有六位𤣥有四重易以八卦相重爲六十四卦𤣥以一二三錯於方州部家爲八十一首易每卦有六爻合爲三百八十四爻𤣥每首有九贊合爲七百二十九贊皆當朞之日易有元亨利貞𤣥有罔直䝉酋冥易大衍之數五十其用四十九𤣥天地之䇿各十有八合爲三十六䇿地則虚三用三十三䇿易揲之以四𤣥揲之以三易有七九八六謂之四象𤣥有一二三謂之三摹易有彖𤣥有首易有爻𤣥有贊易有象𤣥有測易有文言𤣥有文易有繋辭𤣥有攡瑩棿圖告易有説卦𤣥有數易有序卦𤣥有衝易有雜卦𤣥有錯殊塗而同歸百慮而一致皆本於太極兩儀三才四時五行而歸於道徳仁誼禮也郭亨疏云太𤣥潤色於君平未知出何書邵子曰𤣥之於易猶地之於天也又曰揚雄作𤣥可謂見天地之心者也張文饒曰𤣥紀日於牛宿者法日也紀氣於中首者法天也以罔冥爲元則艮之終始萬物神妙之理故太𤣥於三易實依連山而作也七畧曰雄卒弟子侯芭負土作墳號曰𤣥冡法言十三本傳以爲傳莫大於論語作法言胡氏曰論語乃孔門弟子記諸善言誠有是人相與問答也法言則假借問答以則論語且又淺近特甚有不必問不必答不必言者晁氏曰法言稱谷口鄭樸子真蜀人李𢎞仲元與嚴君平蜀人聞之有願載名於法言者雄謝之雖林翁儒猶不得與也樂四未詳雄有琴清英箴二本傳箴莫善於虞箴作州箴後漢胡廣𫝊揚雄依虞箴作十二州二十五官箴其九箴亡闕館閣書目二十四箴一卷州箴十二衛尉等箴十二又作酒箴見陳遵傳晁氏曰雄見莽更易百官變置郡縣制度大亂士皆忘去節義以從諛取利乃作司􅆰尚書光祿勲衛尉廷尉太僕司農大鴻臚將作大匠博士城門校尉上林苑令等箴及荆揚兖豫徐青幽兾并雍益交十二州箴皆勸人臣執忠守節可爲萬世戒言於道最爲高唐氏曰此自謂尊儒不知與九流並列已不是八家皆儒家之一偏一曲耳淇水李氏曰儒者之術教化仁義而已也使儒者在人主左右得以仁義教化爲天下之治則所謂道家者不過爲巖野居士名法家者不過爲賤有司隂陽者食于太史局而從横雜墨之流或馳一𫝊或效一官農家者流耕王田奉國賦以樂天下之無事彼得與儒者相抗而爲流哉漢藝文志考證卷五
