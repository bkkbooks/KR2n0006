body:
  text: 漢藝文志考證卷十宋王應麟撰雜占黃帝長桞占夢十一卷史記正義帝王世紀云黃帝夢大風吹天下之塵垢皆去又夢人執千鈞之弩驅羊萬羣帝寤而歎曰風為號令執政者也垢去土后在也天下豈有姓風名后者哉夫千鈞之弩異力者也驅羊數萬羣能牧氏為善者也天下豈有姓力名牧者哉於是依二占而求之得風后於海隅登以為相得力牧於大澤進以為將黃帝因著占夢經十一卷嚏耳鳴雜占十六卷隋志梁有嚏書耳鳴書各一卷請雨止雨二十六卷董仲舒傳以春秋災異之變推隂陽所以錯行故求雨閉諸陽縱諸隂其止雨反是行之一國未嘗不得所欲隋志梁有董仲舒請禱圖三卷後漢輿服志注引仲舒止雨書初學記引淮南子曰董仲舒請雨秋用桐木魚泰一雜子候嵗二十二卷天官書有候嵗美惡漢之為天數者占嵗則魏鮮隋志東方朔歲占一卷種樹臧果相蠶十三卷秦燒書所不去者醫藥卜筮種樹之書周禮馬質注蠶書蠶為龍精月直大火則浴其種衆占非一而夢為大隋志有占夢書三卷京房撰志不著録西山真氏曰周官六夢之占獨所謂正夢者不緣感而得餘雖所因不同大抵皆感也感者何中有動焉之謂也其動也有真有妄夢亦隨之雖昔聖賢不能無夢惟其私欲銷泯天理昭融兆朕所形亦莫非實髙宗之得説武王之克商皆是物也常人則不然方寸之靈莫適為主欲動情勝擾擾萬端故厭勞慕佚則徒步而夢輿馬矣惡餒思飫則霍食而夢梁肉矣若是者皆妄也至於因夢而獲若主父苕榮之歌叔孫竪牛之兆似有其實矣而卒以基莫大之禍夢其果可慿耶非夢之不可慿也感之妄故夢亦妄也人失常則訞興今左傳作人棄常則訞興形法山海經十三篇隋志相傳以為夏禹所記二十三卷郭璞注釋乃劉歆所定書其南西北東及中山號五藏經十八篇其文最多海內海外大荒三經南西北東各一篇并海內經一篇總十八篇多者十餘簡少者二三簡其卷後或題建平元年四月丙戌待詔太常屬臣望校治侍中光祿勳臣龔侍中奉車都尉光祿大夫臣秀領主省序曰禹定髙山大川蓋與伯翳主驅禽獸命山川類草木别水土四嶽佐之以周四方逮人迹之所希至及舟輿之所罕到內别五方之山外分八方之海紀其珍寶竒物異方之所生水土草木禽獸昆蟲麟鳯之所止休祥之所隱及四海之外絶域之國殊類之人古文之著明者也孝武時東方朔言異鳥之名孝宣時臣父向對二負之臣皆以是書朝士由是多竒山海經者可以考休祥變怪之物見逺國異人之謡俗臣望所校凡三十二篇今定為十八篇顔之推曰山海經禹益所記而有長沙零陵桂陽諸暨後人所羼非本文也通典以為恢怪不經疑夫子刪詩書後尚竒者所作或先有其書如詭誕之言必後人所加也郭璞序曰東方生曉畢方之名劉子政辨盜械之尸王頎訪兩靣之客海民獲長臂之衣精驗潛效絶代懸符論衡謂董仲舒睹重常之鳥劉子政曉二負之尸皆見山海經故能立二事之説今本十八卷劉歆定為十八篇多於志五篇固已不同尤袤定為先秦之書非禹及伯翳所作朝氏曰長沙零陵雁門皆郡縣名又載禹鯀後人參益之薛氏曰左傳稱大禹鑄鼎象物以知神姦入山林者不逢不若山海所述不幾是也經言大川所出及舜所葬皆秦漢時郡縣又有成湯文王之事管子之文其非先秦有夏遺書審矣劉歆直云伯益所記又分伯益伯翳以為二人皆未之詳考於太史公記漢西京書非後世之作也山海經要為有本於古秦漢增益之書太史公謂言九州山川尚書近之至山海經禹本紀所言怪物余不敢言也然哉朱文公曰記異物飛走之類多云東向或云東首皆為一定之形疑本依圗畫為之宫宅地形二十卷范氏曰考古卜地之法周始居豳相其隂陽觀其流泉度其隰原擇地利以便人事而已其作新邑也卜澗水東瀍水西又卜瀍水之東則推其不能決者而令之龜其法蓋止於此彼風水向背附著之説聖人弗之詳焉雖然甲子作於大撓尚矣宣王揆日以田既吉戊又吉庚午則枝幹固有吉凶保章氏以星土辨九州之封域以觀妖祥則方隅固有休咎聖人弗之詳而未嘗廢其説相人二十四卷荀子非相曰古者有姑布子卿今之世梁有唐舉陶𢎞景相經序相者蓋性命之著乎形骨吉凶之表乎氣貌亦猶事先謀而後動心先動而後應表裏相感莫知所以然隋志相書四十六卷史通曰許負相經當時所聖見傳流俗相六畜三十八卷隋志有伯樂相馬經寧戚相牛經荀子論堅白同異云曽不如好相雞狗之可以為名也莊子徐無鬼見魏武侯告之相狗馬列子秦穆公謂伯樂曰子姓有可使求馬者乎曰有九方臯吕氏春秋古之善相馬者寒風是相口齒麻朝相頰子女厲相目衛忌相􅀢許鄙相􅪉投伐褐相胸脅管青相膹吻陳悲相股腳秦牙相前贊君相後凡此十人者皆天下之良工也又云齊有善相狗者其鄰假以買取鼠之狗淮南子伯樂韓風秦牙管青所相各異其知馬一也日者傳禇先生曰黃直丈夫也陳君夫婦人也以相馬立名天下留長孺以相彘立名滎陽禇氏以相牛立名馬援上馬式表近世有西河子輿明相法子輿傳儀長孺傳丁君都君都傳楊子阿臣援師事子阿受相馬骨法孝武時善相馬者東門京鑄銅馬法臣謹依儀氏羈中帛氏口齒謝氏脣䰇丁氏身中偹此數家骨相以為法洪氏曰今時相馬者間有之相牛者殆絶所謂相雞狗彘者不復聞之矣苟非其人道不虛行司馬公原命曰天道精微非聖人莫能知今學者未能通人理之萬一而遽從事於天昔眭孟知有王者興於微賤而不知孝宣乃欲求公孫氏禪以天下翼奉知漢有中衰厄會之象而不知王莽乃云洪水為災西門君惠知劉秀當為天子而不知光武乃謀立國師公劉秀秀亦更名以應之皆無益於事是以聖人之教治人而不治天知人而不知天宋有子韋新序宋景公時熒惑在心子韋曰熒惑天罰也心宋分野也隂陽家宋司星子韋三篇楚有甘公天官書在齊甘公此云楚當考張耳傳甘公曰東井秦分先至必王楚必屬漢漢有唐都太史公學天官於唐都律歷志造太初歷方士唐都與焉都分天部天官書漢之為天數者星則唐都序數術為六種張文饒曰象生於數數生於理故天地萬物之生皆祖於數聖人先知先覺因制之以示人以分天度量地理觀之天地皆有數况人物乎始自伏羲畫卦以用太極神農植榖以用元氣於是黃帝制歷分天度也畫野分圻量地里也其餘𨽻首造算大橈造甲子蒼頡制字岐伯論醫伶論造律皆以理數而示人者也醫經黃帝內經十八卷王冰曰素問即其經之九卷也兼靈樞九卷乃其數焉雖復年移代革而授學猶存懼非其人而時有所隱故第七一卷師氏藏之今之奉行惟八卷爾林億曰皇甫士安靈樞經序云今有針經九卷素問九卷素問九卷并十八卷即九經也素問第九卷皇甫士安名為針經楊玄操云黃帝內經二帙帙各九卷按隋志謂之九靈王冰名為靈樞素問第七卷亡已久士安序甲乙經云亦有亡失隋志載梁七録云止存八卷而冰得舊藏之卷今竊疑之天元紀大論五運行論六微旨論氣交變論五常政論六元正紀論至真要論七篇與餘篇略不相通疑此七篇乃隂陽大論之文王氏取以補所亡之卷又曰黃帝坐明堂之上臨觀八極考建五常與岐伯上窮天紀下極地理逺取諸物近取諸身更相問難於是雷公之倫授業傳之而內經作蒼周之興秦和述六氣之論越人得其一二演而述難經倉公傳其舊學仲景撰其遺論晉皇甫謐刺而為甲乙隋楊上善纂而為太素全元起始為訓解闕第七一通唐寶應中王冰得先師所藏之卷為注合八十一篇二十四卷按隋志始有素問之名晉皇甫謐已云素問論病精辨王叔和西晉人撰脈經云出素問針經漢張仲景傷寒論集云撰用素問是則素問之名起漢世也全元起曰素者本也問者黃帝問岐伯也按乾鑿度大素者質之始名或由此館閣書目黃帝針經九卷八十一篇與靈樞經同針經以九針十二原為首靈樞以精氣為首間有詳略程子曰素問之書必出於戰國之末夏竦銅人腧穴針灸圖經序曰黃帝問岐伯盡書其言藏於金蘭之室洎雷公請問其道乃坐明堂以授之後世言明堂者以此皇甫謐曰素問九卷是原本經脈其義深奧不可容易覽也又有明堂孔穴針灸治要皆黃帝岐伯遺事也扁鵲內經九卷隋志黃帝八十一難經二卷崇文總目秦越人撰秦越人采黃帝內經精要之説凡八十一章編次為十三類理趣深逺非易了故名難經館閣書目脈經一卷題扁鵲撰凡十六篇史記倉公師公乘陽慶傳黃帝扁鵲之􅎃書太史公曰扁鵲言醫為方者宗王勃八十一難經序曰岐伯以授黃帝黃帝歷九師以授伊尹伊尹以授湯湯歷六師以授太公太公以授文王文王歷九師以授醫和醫和歷六師以授秦越人秦越人始定立章句歷九師以授華他華他歷六師以授黃公黃公以授曹元針石內經素問岐伯曰鑱石針艾治其外説苑扁鵲先造軒光之竈八成之湯砥針礪石取三陽五輸子容搗藥子明吹耳陽儀反神子越扶形子越矯摩太子遂得復生王僧孺曰古以石為針説文砭以石刺病也東山經髙氏之山多針石郭璞云可以為砭針春秋傳美疢不如惡石服虔云石砭石也季世無復佳石故以鐡代之經方泰始黃帝扁鵲俞拊方二十三卷應劭曰黃帝時醫黃帝八十一難序云秦越人與軒轅時扁鵲相類仍號之為扁鵲扁鵲傳上古之時醫有俞拊治病不以湯液醴灑鑱石橋引案杌毒尉一撥見病之應因五藏之輸湔浣腸胃漱滌五藏練精易形周禮疾醫注脈之大候要在陽明寸口能専是者其惟秦和乎岐伯榆柎則兼彼數術者吕氏春秋巫彭作醫説苑上古之為醫者曰苖父中古之為醫者曰俞柎帝王世紀黃帝使岐伯嘗味百草典醫療疾今經方本草之書咸出焉素問云上古使僦貸季理色貸季理色脈而通神明注岐伯祖世之師湯液經法三十二卷內經素問有湯液醪醴論事物紀原湯液經出於商伊尹郊祀志莽以方士蘇樂言起八風臺於宫中作樂其上順風作液湯皇甫謐曰仲景論伊尹湯液為十數卷本草不著録淮南子云神農嘗百草之滋味一日而七十毒梁七録神農本草三卷按平帝紀元始五年舉天下通知方術本草者郊祀志成帝初有本草待詔樓護傳少誦醫經本草方術數十萬言其名見於此陶𢎞景云疑仲景元化等所記舊經三卷藥止三百六十五種𢎞景以名醫别録亦三百六十五種合七百三十種因而注釋分為七卷唐顯慶中李績于志寧等刋定蘇恭增一百十四種廣為二十一卷并圖合五十四篇志寧曰世謂神農氏嘗藥以拯含氣而黃帝以前文字不傳以識相付至􅀈雷乃載篇册然所載郡縣多是漢時疑張仲景華他所記國朝開寶中盧多遜重定增百三十有三種嘉祐中掌禹錫補注附以新補八十有二種新定十有七種合一千七百有六種分二十有一卷新舊混并經之本文遂晦周禮疾醫注五藥其治合之齊則存乎神農子儀之術疏案劉向云扁鵲使子儀脈神又中經簿云子儀本草經一卷儀與義一人也子義亦周末時人六典注凡藥八百五十種三百六十神農本經一百八十二名醫别録一百十四新修新附一百九十四有名無用帝王世紀黃帝使岐伯嘗味草本定本草經造醫方以療衆疾張仲景金匱云神農能嘗百藥本草石之寒溫此論經方之語而無本草之名房中容成隂道二十六卷後漢方術傳汵夀光行容成公御婦人法列仙傳容成公自稱黃帝師見於周穆王能善補𨗳之事取精於玄牝其要谷神不死髮白復黑齒落復生神仙傳甘始依容成玄素之法更演益之為十卷神仙宓戲雜子道二十篇帝王世紀宓戲畫八卦以通神明之德類萬物之情所以六氣六腑五臟五行隂陽水火升降得以有象百病之理得以類推炎黃因斯乃嘗味百藥而制九針莊子曰伏戲得之以襲氣毋黃帝雜子步引十二卷列子天瑞篇引黃帝書曰谷神不死是謂玄牝梁肅導引圗序朱少陽得其術於黃帝外書又加以元禽化禽之説乃志其善者演而圗之隋志有引氣圗道引圗抱朴子云黃帝論導養而質玄素二女著體診則受雷岐西山真氏曰養生之説出於老子谷神章其最要也莊子曰黃帝得之以登雲天黃帝岐伯按摩十卷唐六典按摩博士一人注崔實正論云熊經鳥伸延年之術故華他有六禽之戲魏文有五捶之煆仙經云户樞不朽流水不腐謂欲使骨節調利血脈宣通韓詩外傳扁鵲砥針厲石子遊按摩周禮疏案劉向云扁鵲使子術案摩黃帝雜子芝菌十八卷黃氏曰神農經五芝久食輕身延年不老先秦之世未有稱述芝草者漢武宣世始以為瑞黃帝內傳王母授神芝圗十二卷水經注黃帝登具次之山受神芝圗於黃蓋童子泰一雜子黃冶三十一卷郊祀志谷永曰明於天地之性不可惑以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神廣崇祭祀之方求報無福之祠及言世有仙人服食不終之藥䢣興輕舉登遐倒景覽觀縣圃浮遊蓬萊耕耘五德朝種暮穫與山石無極黃冶變化堅氷淖溺化色五倉之術者皆姦人惑衆挾左道懷詐偽以欺罔主聽其言洋洋滿耳若將可遇求之蕩蕩如係風捕景終不可得是以明王距而不聽聖人絶而不語劉向傳淮南有枕中鴻寶苑祕書書言神仙使鬼神為金之術龜策傳禇先生曰臣為郎時見萬畢石朱方唐志淮南王萬畢術一卷隋志金丹玉液長生之事歷代麋費不可勝紀竟無效焉神仙十家司馬公曰老莊之書大指欲同死生輕去就而為神仙者服餌修錬以求輕舉錬草石為金銀其為術正相戾是以劉歆七略敘道家為諸子神仙為方技其後復有符水禁呪之術至寇謙之遂合而為一至今循之其訛甚矣蘇氏曰黃帝老子之道本也方士之言末也羅氏曰秦猶以博士領其方而號其人為列仙之儒明猶有所本非若後世夸者之傳也歐陽氏曰自古有道無仙後世之人知有道而不得其道不知無仙而妄學仙葛洪云秦阮倉所記有數百人劉向所纂又七十一人顔之推云列仙傳劉向所造而贊云七十四人出佛經非本文也索隱行怪中庸素隱朱文公按漢書作索論病以及國原診以知政晉語趙文子曰醫及國家乎醫和對曰上醫醫國其次疾固醫官也大凡書六略三十八種景迂朝氏曰劉歆告揚雄云三代之書藴藏於家直不計耳顧弗多耶今有一周易而無連山歸藏有一春秋而無千二百國寶書及不修春秋有鄉禮二士禮七大夫禮二諸侯禮四諸公禮一而天子之禮無一傳者不知其傳孰多於其亡耶隋志光武篤好文雅明章尤重經術鴻生巨儒負帙自逺而至石室蘭臺彌以充積又於東觀及仁夀閣集新書校書郎班固傳傳等典掌焉並依七略為書部固編為藝文志朝氏公武曰劉歆始著七略總録羣書至荀朂更著新簿分為四部蓋合兵書術數方技於諸子自春秋類春秋史記别為一六藝諸子詩賦皆仍歆舊其後歷代所編書目如王儉阮孝緒之徒咸從歆例謝靈運任昉之徒皆從朂例唐分經史子集藏於四庫是亦祖述朂而加詳焉歐陽公謂始於開元矣決疑曰自六經以至隂陽之家其數或多或少春秋九百四十八篇而其數之不及者七十有一道家九百十三篇而其數之衍者四十有四自此以後蓍龜一家而卷之溢於目者八十醫經一家而卷之不登其總者四十有一或者其傳於後世有以私意增損者邪夾漈鄭氏曰蕭何入咸陽收秦律令圖書則秦亦未嘗無書籍也其所焚者一時間事耳秦人之典蕭何能收於草昧之初蕭何之典歆何不能紀於承平之後是所見有異也范氏曰漢時以竹簡寫書在天下者至少非祕府不能偹非如後世以紙傳寫流布天下所在皆有也漢藝文志考證卷十
