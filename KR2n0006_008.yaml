body:
  text: 漢藝文志考證卷八宋王應麟撰道屈原賦二十五篇離騷經九歌天問九章逺遊卜居漁父王逸曰武帝使淮南王安作離騷經章句安傳云為離騷傳隋志其書全亡劉向分楚辭為十六卷屈原八卷九辨亦謂原作王逸云宋玉隋志原著離騷八篇班固敘贊二篇太史公曰作辭以諷諌連類以爭義離騷有之地理志始楚賢臣屈原被讒放流作離騷諸賦以自傷悼後有宋玉唐勒之屬慕而述之漢興吳王濞招致娛遊子遊枚乘鄒陽嚴夫子之徒興於文景之際淮南王安招賔客著書而吳有嚴助朱買臣貴顯漢朝文辭並發故世傳楚辭朱買臣召見言楚辭帝宣帝徴能為楚辭九江被公朝見誦讀七略曰宣詔徴被公見誦楚辭被公年衰母老每一誦輒與粥平園周氏曰詩國風及秦不及楚已而屈原離騷出焉衍風雅於詩亡之後發乎情主乎忠直殆先王之遺澤也謂之文章之祖宜矣艾軒林氏曰江漢在楚地詩之萌牙自楚人發之詩一變為楚辭屈原為之唱是文章鼓吹多出於楚也宋玉賦十六篇隋志宋玉集三卷王逸云屈原弟子楚辭九辨招魂文選風賦髙唐神女登徒子好色賦古文苑大言小言釣笛諷賦朱文公謂辭有餘而理不足莊夫子賦二十四篇楚辭哀時命賈誼賦七篇朱文公曰賈太傅以卓然命世英傑之材俯就騷律所出三篇皆非一時諸人所及惜誓弔屈原服賦古文苑有旱雲虡賦隋志梁有賈誼集四卷枚乘賦九篇古文苑有梁王莬園賦文選注枚乘集有臨霸池逺訣賦隋志乘集二卷文選有七發司馬相如賦二十九篇朱文公曰相如之文能侈而不能約能諂而不能諒其上林子虛之作既以誇麗而不得入於楚辭大人之於逺遊其漁獵又泰甚然亦終歸於諛也特長門哀二世賦二篇為有諷諌之意艾軒林氏曰相如賦之聖者隋志集一卷淮南王賦八十二篇隋志集一卷梁二卷劉向别録淮南王有薰籠賦淮南王羣臣賦四十四篇楚辭招隱士淮南小山之所作也淮南王安招致賔客客有八公之徒分造詞賦以類相從或稱大山或稱小山如詩之有大小雅孔臧賦二十篇孔叢子云臧嘗為賦二十四篇四篇别不在集似其幼時之作也吾丘夀王賦十五篇隋志梁有漢光祿大夫虞丘夀王集二卷藝文類聚有驃騎論功論而賦不傳上所自造賦二篇外戚傳有傷悼李夫人賦文選有秋風辭溝洫志有瓠子之歌二章隋志武帝集一卷唐志二卷劉向賦三十三篇楚辭九歎古文苑請雨華山賦文選注雅琴賦隋志向集六卷唐志五卷今所存十八篇别録曰向有芳松枕賦王褒賦十六篇本傳作甘泉洞簫頌楚辭有九懷文選注有碧雞頌隋唐志褒集五卷枚臯賦百二十篇本傳凡可讀者百二十篇其尤嫚戲不可讀者尚數十篇司馬遷賦八篇藝文類聚有悲士不遇賦隋志遷集一卷唐志一卷揚雄賦十二篇本傳賦莫深於離騷反而廣之又旁惜誦以下至懷沙一卷名曰畔牢愁辭莫麗於相如作四賦甘泉河東校獵長楊志云入揚雄八篇蓋七略所略止四賦也古文苑有太玄蜀都逐貧賦文選注有核靈賦隋志雄集五卷孫卿賦十篇荀子賦篇禮知雲蠶針又有佹詩隋志荀况集二卷唐志二卷東暆令地理志縣在樂浪郡雒陽錡華左傳分康叔云云殷民七族錡氏别祤陽賦庾信哀江南賦祤陽亭有離别之賦蓋亭名也華龍蕭望之傳華龍宣帝時與張子矯等待詔志云張子喬雜賦成相雜辭十一篇荀子成相篇注蓋亦賦之流也朱文公曰凡三章雜陳古今治亂興亡之效託聲詩以諷時君若將以為工師之誦旅賁之規者其尊主愛民之意亦深切矣相者助也舉重勸力之歌史所謂五羖大夫死而舂者不相杵是也成相助力之歌淮南王亦有成相篇見藝文類聚雜禽獸六畜昆蟲賦十八篇劉向别録有行過江上弋鴈賦行弋賦弋雌得雄賦隱書十八篇文心雕龍讔者隱也遁辭以隱意譎譬以指事也昔還社求拯於楚師喻眢井而稱麥麴叔儀乞糧於魯人歌佩玉而呼庚癸伍舉諌荆王以大鳥齊客譏薛公以海魚莊姬託辭於龍尾臧文謬書於羊裘隱語之用被于紀傳大者興治濟身其次弼違曉惑楚莊齊威性好隱語至東方曼倩尤巧辭述晉語有秦客廋辭於朝注廋隱也東方朔曰乃與為隱耳新序齊宣王發隱書而讀之歌詩髙祖歌詩二篇大風歌亦名三侯之章文中子曰大風安不忘危其伯心之存乎鴻鵠歌朱文公以為卒章意象蕭索非復三侯比矣泰一雜甘泉夀宫歌詩十四篇宗廟歌詩五篇史記樂書今上即位作十九章令侍中李延年次序其聲拜為協律都尉通一經之士不能獨知其辭皆集會五經家相與共講習讀之乃能通知其意多爾雅之文禮樂志多舉司馬相如等數十人造為詩賦略論律吕以合八音之調作十九章之歌郊祀志亳人謬忌奏祠泰一方遊水發根言上郡有巫病而鬼下之上召置祠之甘泉置夀宫神君神君最貴者曰太一其佐曰太禁司命之屬黃門倡車忠等歌詩周禮旄人注散樂野人為樂之善者今黃門倡矣樂府集有黃門倡歌一首凡詩賦百六家唐氏曰武帝好文詩賦特盛然五種凡百六家千三百一十八篇而已非若後世濫取至不可勝計登髙能賦可以為大夫毛詩定之方中傳建邦能命龜田能施命作器能銘使能造命升髙能賦師旅能誓山川能説喪紀能誅祭祀能語君子能此九者可謂有德音可謂為大夫也自孝武立樂府禮樂志孝惠二年有樂府令夏侯寬似非始於武帝又云孝武定郊祀之禮乃立樂府采詩夜誦元帝時京房知五音六十律之數上使韋玄成等試問房於樂府吕氏曰太樂令丞所職雅樂也樂府所職鄭衛之樂也樂府雖鄭衛之聲然天子所常御上至郊廟咸用焉采詩即古之采詩也哀帝罷樂府非鄭衛之音者條奏丞相孔光大司空何武奏不可罷者夜誦貟五人亦在其中蓋雅樂也樂府集漢鐃歌十八首陸厥擬李夫人及貴人中山王孺子妾歌臨江王節士歌張庾肩吾擬未央才人歌古今樂録橫吹胡樂也騫入西域傳其法於長安唯得摩訶兜勒一曲李延年因之更造新聲二十八解乘輿以為武樂兵權謀吳孫子兵法八十二篇圖九卷史記孫武傳闔廬曰子之十三篇吾盡觀之矣正義七録云孫子兵法三卷十三篇為上卷又有中下二卷杜牧注孫子序曰武所著書凡數十萬言魏武削其繁剩筆其精切凡十三篇因注解之始計至用間隋志梁有孫子八陳圖一卷周禮車僕注孫子八陳有蘋車之陳鄭氏曰圗經也書緯也七略收書不取圖唯任宏校兵書四種有書五十三家有圖四十三卷武經總要曰今之祕府所存孫武書惟十三篇無圖其所言皆權謀之事極為精密戰國如二孫吳起輩號善用兵者而著書皆有圖漢名臣如韓信子房刪定亦著其法周公亦典司馬教坐作進退之度蓋陳法者所以訓齊士衆使其上下如一前後左右進退周旋如身之運臂臂之使指無不如意歐陽氏曰孫武嘗以其書干吳王闔廬闔廬用之西破楚北服齊晉而霸諸侯夫使武自用其書止於強霸及曹公用之然亦終不能滅吳蜀豈武之術盡於此乎抑用之不極其能也蘇氏曰武用兵不能必克與書所言逺甚吳起與武一體之人也皆著書言兵世稱之曰孫吳然而起之言兵也輕法制草略無所統紀不若武之書詞約而義盡然起始用於魯破齊及入魏又能制秦入楚楚復伯而武之所為乃如是書之不足信固矣齊孫子八十九篇圖四卷通典引孫臏曰用騎有十利吕氏春秋孫臏貴勢司馬遷曰孫子臏腳兵法修列吳起四十八篇隋志吳起兵法一卷今本三卷六篇圖國至勵士所闕亡多矣唐氏曰司馬法在六藝兵法始孫吳皆後世變詐之兵非古之兵書也雖隂陽神農黃帝之號皆託也范蠡二篇甘延夀傳投石拔距張晏注引范蠡兵法春秋正義賈逵以旝為發石一曰飛石引范蠡兵法作飛石之事以證之文選注引飛石重二十斤為機發行三百步東萊吕氏曰越語下篇所載范蠡之詞多與管子勢篇相出入兒良一篇吕氏春秋兒良貴後亦見賈生過秦省伊尹太公刑法志凡兵所以存亡繼絶救亂除害也故伊吕之將子孫有國與商周並蘇氏曰世之論伊尹太公多以隂謀竒計歸之其説乃與漢陳平魏賈詡無異夫陳平賈詡之事張子房荀文若之所不為也而謂伊尹太公為之乎石林葉氏曰墨翟以太公於文王為忤合而孫武謂之用間且以嘗為文武將兵故尚權詐者多並緣自見吾意六韜所傳雜出春秋戰國以來兵家漢魏間好事者始掇為書而名之故獨晚出且後世言兵及周之隂權皆宗太公以為本謀司馬遷亦嘗言之矣而不能是正遷真多愛而好竒者哉兵形藝蚩尤二篇髙帝紀祠黃帝祭蚩尤於沛庭注應劭曰蚩尤古天子好五兵瓉曰蚩尤庶人之貪者管子五行篇黃帝得蚩尤而明於天道則黃帝六相亦有蚩尤隋志梁有黃帝蚩尤兵法一卷繇敘二篇古今人表繇余即由余疑敘當作余李筌太白隂經云秦由余有陳圗魏公子二十二篇圖十卷史記公子無忌為魏上將軍率五國之兵破秦軍於河外走蒙驁乘勝逐秦軍至函谷關公子威震天下諸侯之客各進兵法公子皆名之故世俗稱魏公子兵法史記注引七略云圖七卷項王一篇史記本紀髙祖與諸侯兵共擊楚軍與項羽決勝垓下淮隂侯將三十萬自當之孔將軍居左費將軍居右皇帝在後絳侯柴將軍在皇帝後項羽之卒可十萬淮隂先合不利却孔將軍費將軍縱楚兵不利淮隂侯復乘之大敗垓下東萊吕氏曰此陳即馬隆所謂魯公不識者也陳者兵之末羽以不仁失天下亦不在一戰利鈍之間然羽少學兵法略知其意即不肯學負其雄才髙氣而無沉深縝密之度其病卒見於此時是故騖大而忽小者君子懼焉兵隂陽太一兵法一篇隋唐志黃帝太一兵歷一卷武經總要太一者天帝之神也其星在天一之南總十六神知風雨水旱金革凶饉隂陽二局存諸祕式星文之次舍分野之災祥貴于先知逆為之偹用軍行師客主勝負蓋天人之際相參焉黃帝十六篇圖三卷胡建傳上奏曰黃帝李法曰壁壘已定穿窬不繇路是謂姦人姦人者殺顔師古注李者法官之號總主征伐刑獄之事故稱其書為李法管子后土為李説苑云黃帝理法封胡五篇通典衛公兵法守城篇曰禽滑釐問墨翟守城之具墨翟答以五六十事皆煩冗不便於用其後韋孝寬守晉州羊侃守臺城皆約封胡子伎巧之術古今人表封胡在上中風后十三篇圗二卷鄭康成云風后黃帝之三公也館閣書目風后握機一卷晉馬隆略序卷首言本有三其一三百六十字其一三百八十字吕望所增其一行間有公孫𢎞等語或云武帝令霍光等習之於平樂館以輔少主偹天下之不虞今本載所增字亦有公孫𢎞語薛氏詮定云握竒經别有續關記金革旗麾進退趨鬪之法獨孤及風后八陳圖記云得其遺制於黃帝書之外篇裂素而圖之李靖問對云黃帝兵法世傳握竒文嚴從依風后大旨為圖以擬方陳隋志黃帝蚩尤風后行軍祕術一卷後漢張衡傳注春秋內事曰黃帝師於風后風后善於伏羲氏之道故推演隂陽之事武經總要曰大撓造甲子推天地之數風后演遁甲究鬼神之奧力牧十五篇李筌太白隂經云風后演握竒圖復置虛實二壘力牧亦創營圖抱朴子云黃帝精推步則訪山稽力牧講占候則詢風后鬼容區三篇封禪書鬼臾區號大鴻古今人表注臾容聲相近素問鬼臾區曰積考太始天元册文地典六篇後漢張衡傳師天老而友地典注帝王世紀黃帝以風后配上台天老配中台五聖配下台謂之三公其餘知天規紀論語擲輔象云知命窺紀地典力牧常先封胡孔甲等或以為師或以為將師曠八篇隋志師曠書三卷後漢蘇竟傳云猥以師曠雜事輕自眩惑注雜占之書也方術傳序師曠之書注今書七志有師曠六篇占災異淮南子曰萇𢎞師曠先知禍福言無遺䇿又小説有師曠六篇萇𢎞十五篇淮南鴻烈曰萇𢎞周室之執數者也天地之氣日月之行風雨之變律歷之數無所不通史記天官書昔之傳天數者周室史佚萇𢎞封禪書萇𢎞以方事周靈王諸侯莫朝周周力少萇𢎞乃明鬼神事設射狸首狸首者諸侯之不來者依物怪欲以致諸侯諸侯不從而晉人執殺萇𢎞周人之言方怪者自萇𢎞推刑德尉繚子天官篇梁惠王問曰黃帝刑德可以百勝有之乎對曰刑以伐之德以守之非所謂天官時日隂陽向背也人事而已矣淮南子兵略訓注刑十二辰德十日也又天文訓云凡用太隂左前刑右背德擊鈎陳之衝辰以戰必勝以攻必尅兵技巧伍子胥十篇圖一卷唐志伍子胥兵法一卷文選注引越絶書伍子胥水戰兵法內經武經總要云伍子胥對闔廬以船軍之教比陸軍之法逢門射法二篇莊子羿逢蒙不能睥睨荀子羿蜂門者善服射淮南子重以逢蒙門子之巧孟子逢蒙學射於羿龜䇿傳羿名善射不如雄渠蜂門注引七略有蜂門射法後之言姓者皆作逢吕氏春秋蜂門始習於甘蠅三褒傳云逢門子李將軍射法三篇李廣傳世世受射望逺連弩射法具十五篇李廣以大黃射其禆將注孟康曰太公陷堅郤敵以大黃參連弩愚按周官五射參連其一也李陵發連弩射單于注服虔曰三十弩共一弦張晏曰三十絭共一臂劉氏謂如今合蟬或併兩弩共一弦之類秦始皇自以連弩候射大魚地理志南郡有發弩官武經總要曰弩者中國之徑兵四夷所畏服也古者有黃連百竹八簷雙弓之號絞車擘張馬弩之差今有參弓合蟬手射小黃皆其遺法若乃射堅及逺爭險守隘怒聲徑勢遏衝制突者非弩不克然張遲難以應卒臨敵不過三發四發而短兵已接故或者以為戰不便於弩然則非弩不便於戰為將者不善於用弩也蒲苴子弋法四篇列子詹何曰聞先大夫之言蒲且子之弋也古善弋射者弱弓纎繳乘風振之連雙鶬於青雲之際用心専動手均也臣因其事放而學釣五年始盡其道淮南子曰蒲旦子連鳥於百仞之上禽張茂先詩蒲盧縈􅌳神感飛即蒲且劍道三十八篇史記自序司馬氏在趙者以傳劍論顯又序孫吳傳云非信廉仁勇不能傳兵論劍與道同符日者傳禇先生曰齊張仲曲成侯以善擊刺學用劍立名天下東方朔十五學擊劍手摶六篇甘延夀試辨為期門注辨手摶哀帝紀時覽卞射武戲注手摶為卞角力為武戲刑法志戰國稍增講武之禮以為戲樂用相夸視而秦更名角抵武帝紀元封三年春作角抵戲蹴􅨲二十五篇劉向别録曰蹴鞠者傳言黃帝所作或曰起戰國時記黃帝蹴鞠兵勢也所以練武士知有才也今軍無事得使蹴鞠有書二十五篇史記霍去病穿域踏鞠正義徐廣云穿地為營域按蹴鞠書有域説篇即今之打毬也黃帝所作戰國時程武士知其材力若講武師古曰鞠以皮為之實以毛蹴踏而戲也楊子云斷木為棊梡革為鞠亦皆有法焉蘇秦傳臨淄民六博蹴鞠黃石公記不著録後漢光武詔報臧宫馬武曰黃石公記曰柔能制剛弱能制強注即張良於下邳圯所見老人出一編書者隋志黃石公三略三卷梁又有黃石公記三卷館閣書目黃石公素書一卷凡六章恐依託省墨子史記墨翟善守禦注墨子曰公輸般為雲梯之械成將以攻宋墨子聞之至于郢見公輸般墨子解帶為城以牒為械公輸般九設攻城之機變墨子九距之公輸般之攻械盡墨子之守固有餘列子云墨翟之飛鳶韓非子云墨子為木鳶三年而成蜚一日而敗曰不如為車輗者巧也惠子聞之曰墨子大巧巧為輗拙為鳶詩正義引墨子偹衝篇後漢書注引墨子偹突篇張良韓信序次兵法髙帝紀韓信申軍法李靖曰張良所學六韜三略是也韓信所學穰苴孫武是也然大體不出三門四種而已任宏論次兵書為四種淮海秦氏曰此四術者以道用之則為四勝不以道用之則為四敗事同而功異不可不察也何以知其然耶昔孫臏伏萬弩於馬陵之下魏軍至而伏發龎涓死焉王恢伏車騎材官三十萬於馬邑之旁胸奴覺之而去恢以自殺此則用權謀之異也馬服君救閼與既遣秦間卷甲而趨之二日一夜遂破秦軍曹公追劉先主一日一夜行三百里敗於烏林此則用形勢之異也西伯將獵卜之曰獲霸王之輔果得太公望而克商漢武卜諸將二師最吉因以為將卒降胸奴此則用隂陽之異也申公巫臣教吳以車戰吳是以始通上國房琯用車以抗祿山賊投芻而火之王師奔潰此用技巧之異也豈非以道用之則為四勝不以道用之則為四敗乎雖然所謂道者何也治心養氣而已矣漢藝文志考證卷八
