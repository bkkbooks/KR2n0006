body:
  text: 漢藝文志考證目錄類一經籍之屬提要臣等謹案漢藝文志考證十卷宋王應麟撰應麟有周易鄭康成註已著録漢書藝文志因劉歆七略而修凡句下之注不題姓氏者皆班固原文共標某某曰者則顔師古所集諸家之説然師古注班固全書藝文特其八志之一故僅略疏姓名時代所考證者如漢著記即起居注家語非今家語鄭鄧析非子産所殺莊怱乃嚴助之駁文逢門即逢䝉之類不過三五條而止應麟始捃摭舊文各為補註不載漢志全文惟以有所辨論者摘録為綱略如經典釋文之例其傳記有此書名而漢志不載者亦以類附入易類增連山歸藏子夏易𫝊詩類增元王𫝊禮類增大戴禮小戴禮王制漢儀樂類增樂記樂元語春秋類增𠖇氏春秋道家増老子指歸秦王好論法家增漢律漢令縱横家增鬼谷子天文增夏氏日月𫝊甘氏嵗星經石氏星經巫咸五星占周髀星𫝊厯譜增九章算術五紀論五行增翼氏風角經方增左師凡二十六部各疏其所注于下而以不著録字别之其間如子夏易𫝊鬼谷子皆依託顯然而一槩泛載不能割愛又庾信哀江南賦稱栩陽亭有離别之賦實由誤記藝文志與所用桂華馮馮誤讀郊祀志者相等應麟乃因而附㑹以栩陽為漢代亭名亦未免間失之嗜奇然論其該洽究非他家之所及也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:afce109aa7db803879569bd7053b811118d191b4631f8dba4b7aeb0e676e9825
