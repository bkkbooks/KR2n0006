body:
  text: 漢藝文志考證卷一宋王應麟撰藝文秦燔滅文章大事記始皇三十四年焚書非博士官所職天下敢有藏詩書百家語者悉詣守尉雜燒之東萊吕氏曰所燒者天下之書博士官所職固自若也蕭何獨收圖籍而遺此惜哉韓非五蠧篇云名主之國無書簡之文以法爲教無先王之語以吏爲事即李斯之説也漢興大收篇籍惠帝紀四年三月除挾書律爾雅挾藏也劉歆移書太常博士曰漢興獨有一叔孫通略定禮儀天下唯有易卜未有他書至孝惠之世乃除挾書之律至孝文始使掌故朝錯從伏生受尚書詩始萌牙至孝武然後鄒魯梁趙頗有詩禮春秋先師皆起於建元之間泰誓後得博士集而讀之趙岐孟子題辭孝文欲廣逰學之路論語孝經孟子爾雅皆置博士朕甚閔焉孝武紀元朔五年夏六月詔曰今禮壞樂崩朕甚閔焉劉歆書又云書缺簡脱於是建藏書之策注劉歆七畧曰外則有太常太史博士之藏内則有延閣廣内祕室之府通典漢氏圖籍所在有石渠延閣廣内貯之於外府又御史中丞居殿中掌蘭臺祕書及麒麟天禄二閣藏之於内禁百官表御史中丞在殿中蘭臺掌圖籍祕書劉向受詔校書每一書竟表上輙言臣向以長水校尉臣參書太常博士書中外書合若干本以相比校然後殺青向傳云領校中五經祕書霍山坐寫祕書藉蘇昌爲太常坐藉霍山書泄祕書免班斿賜以祕書之副時書不布自東平思王以叔父求太史公諸子書大將軍白不許張安世傳上行幸河東嘗亡書三篋詔問莫能知唯安世識之屬通典中丞有石室以藏袐書圖䜟之司馬遷為太史令紬史記石室金鐀之書西都賦天禄石渠典籍之府七畧曰孝武敕丞相公孫𢎞廣開獻書之路百年之間書積如丘山河平三年謁者陳農使使求遺書於天下劉向條其篇目歆奏七畧隋志劉向七畧别録二十卷劉歆七畧七卷剖析條疏各有其部歆嗣父業乃徙温室中書於天禄閣上者為七畧大凡三萬三千九十卷風俗通云劉向典校書籍皆先書竹為易刋定可繕寫者以上素成帝紀河平二年光禄大夫劉向校中祕書言中以别外易易經十二篇注上下經及十翼今易乾卦至用九即古易之本文鄭康成始以彖象連經文王輔嗣又以文言附乾坤二卦至於文辭連屬不可附卦爻則仍其舊篇自康成輔嗣合彖象文言於經學者遂不見古本秦漢之際易亡說卦宣帝時河内女子發老屋得之後漢荀爽集解又得八卦逸象三十有一東萊吕氏因晁氏書參考傳記復定爲十二篇朱文公曰其卦本伏羲所畫有交易變易之義故謂之易其辭則文王周公所繫故繫之周簡袠重大故分爲上下兩篇經則伏羲之畫文王周公之辭也并孔子所作之傳十篇凡十二篇中間頗爲諸儒所亂近世晁氏始正其失未能盡合古文吕氏又更定著爲經二卷傳十卷乃復孔氏之舊又曰易更三聖制作不同包羲氏之象文王之辭皆依卜筮以爲教而其法則異孔子之賛一以義理爲教而不專於卜筮豈其故相反哉俗之淳漓既異故爲教爲法不得不異而道未嘗不同也孔頴逹云十翼謂上彖下彖上象下象上繫下繫文言説卦序卦雜卦易傳周氏二篇字王孫服氏二篇光楊氏二篇何王氏二篇同儒林傳田何授王同周王孫丁寛服生皆著易傳數篇同授楊何言易者本之田何太史公受易於楊何晁氏曰商瞿受易孔子五傳而至田何漢之易家盖自田何始何而上未嘗有書管輅謂易安可注者其得先儒之心歟易家著書自王同始學官自楊何始所謂易楊者是也丁氏八篇寛丁寛事田何學成復從周王孫受古義號周氏傳寛作易說三萬言訓故舉大誼而已今小章句是也髙相專說隂陽災異自言出於丁將軍艾軒林氏曰先秦之爲易者未有及理義也自田何而後章句傳說多矣見於今者獨有費氏之書費氏舊亡章句而學者宗王弼之說至於京氏之隂陽占筮其書雖存視之爲術數之流矣易有聖人之道四焉理義之學以其辭耳王弼而下其說紛紛不若象數之粗有所明也韓氏二篇嬰韓嬰亦以易授人推易意而爲之傳燕趙間好詩故其易㣲唯韓氏自傳之涿郡韓生其後也曰所受易即先太傅所傳也嘗受韓詩不如韓氏易深葢寛饒從受焉寛饒封事引韓氏易傳言五帝官天下三王家天下古五子十八篇劉向别録所校讎中古五子書除復重定著十八篇分六十四卦著之日辰自甲子至壬子凡五子律歴志日有六甲辰有五子注云六甲之中唯甲寅無子淮南道訓二篇七畧曰九師道訓者淮南王安所造張平子思𤣥賦文君爲我端蓍兮利飛遁以保名注云遯上九曰飛遯無不利淮南九師道訓曰遁而能飛吉孰大焉曹子建七啓飛遯離俗注亦引之葢以肥爲飛劉向别録所校讎中易傳淮南九師道訓除復重定著十二篇淮南王聘善爲易者九人從之採獲故中書著曰淮南九師書文中子謂九師興而易道㣲隋志已亡其書孟氏京房十一篇災異孟氏京房六十六篇京氏叚嘉十二篇唐大衍厯卦議曰十二月卦出於孟氏章句其説易本於氣而後以人事明之京氏又以卦爻配朞之日坎離震兑其用事自分至之首皆得八十分日之七十三頥晉井大畜皆五日十四分餘皆六日七分止於占災眚與吉凶善敗之事至於觀隂陽之變則錯亂而不明京房傳注孟康曰分卦直日之法一爻主一日六十四卦為三百六十日餘四卦震離兑坎為方伯監司之宫消息卦為辟辟君也息卦曰太隂消卦曰太陽其餘卦曰少隂少陽謂臣下也五行志引京房易傳尊卦用事注孟康曰尊卦乾坤也賢者居明夷之世知時而傷或衆在位震遂泥厥咎國多麋復崩來無咎自上下者為崩潜龍勿用衆逆同志至徳迺潜厥異風行不觧物不長幹父之蠱亡子考亡咎子三年不改父道思慕不皇亦重見先人之非不則為私婦貞厲君子㐫言君弱而婦疆為隂所乗則月並出谷永以京房易占對日食李固對策引京房易郎顗按房飛侯參察衆政正月三日至乎九日三公卦集韻觀我瑞頥膚釋文坎卦京作欿剥牀以京作簠謂祭器龜山楊氏曰以爻當期其原出於繫辭而以星日氣候分布諸爻易未有也其流詳於緯書世傳稽覽圖是也艾軒林氏曰如復所謂七日臨所謂八月蠱所謂先甲後甲巽所謂先庚後庚又如十年三嵗月㡬望已日乃孚是皆隂陽氣數當然之變孟氏而下有焦贛氏以一卦變為六十四積而至於四千九十六凡一卦所主六日震離坎兑寄直於分至之日如曰冬至則坎用事次未濟次蹇次頥次中孚次復當期之數循環為變後魏正光厯推四正卦術四正為方伯中孚為三公復為天子屯為諸侯謙爲大夫睽爲九卿升還從三公周而復始九三應上九清淨㣲温陽風九三應上六絳赤決温隂雨六三應上六白濁㣲寒隂雨六三應上九麴塵决寒陽風諸卦上有陽爻者陽風上有隂爻者隂雨京房分六十卦更直日用事以風雨寒温爲候釋文序録孟喜章句十卷無上經七錄云又下經無旅至節無上繫之一行易纂引孟喜序卦曰隂陽養萬物必訟而成君臣養萬民亦訟而成之殘隋志八卷缺京房章句十二卷七録云十卷晁氏曰漢志易京氏凡三種八十九篇隋志有京章句十卷又有占候十種七十三卷唐藝文志有京章句十卷而占候存者五種二十三卷今其章句亡矣乃畧見於僧一行及李鼎祚之書而其傳者曰易傳三卷積筭雜占條例法一卷或共題易傳四卷而名皆與古不同今所謂京氏易傳者或題曰京氏積筭易傳疑隋唐志之錯卦是也錯卦在隋七卷唐八卷所謂積筭雜占條例法者疑隋逆刺占災異十二卷是也至唐逆刺三卷而亡其九卷元祐八年髙麗進書有京氏周易占十卷疑隋志周易占十二卷是也正義大衍之數五十京房云五十者謂十日十二辰二十八宿也凡五十其一不用者天之生氣將欲以虚來實章句施孟梁丘氏各二篇儒林傳初易唯有楊孝宣世立施孟梁丘元帝立京氏隋志梁丘施髙亡於西晉孟京有書無師陸澄曰易自商瞿之後雖有異家之學同以象數爲宗許氏說文稱易孟氏其文多異虞翻傳其家五世孟氏之學丁寛授田王孫王孫授施讐孟喜梁丘賀繇是易有施孟梁丘之學釋文云晉卦孟作齊文王重易六爻重卦之人有四說王輔嗣等以爲伏羲鄭康成之徒以爲神農淳于俊曰包羲因燧皇之圖而制八卦神農演之爲六十四孫盛以爲夏禹史遷等以爲文王淮南子伏戲爲之六十四變周室増以六爻張行成曰伏羲先天示易之體故孔子謂之作八卦文王後天明易之用故子雲謂之重六爻楊繪曰筮非八卦之可爲必六十四之然後爲筮舜禹之際曰龜筮協從則何文王重卦之有乎八卦成列象在其中矣因而重之爻在其中矣按是而言重卦之始其在上古乎京房引夫子曰神農重乎八純易爲筮卜之事傳者不絶吕氏曰古者教人之通法詩書禮樂而已至於易則未嘗躐等與人是以孔子孟子之問答初未嘗及易也若如魏晉祖尚浮虚談老易者徧天下則秦焚之乆矣朱文公曰易經本爲卜筮而作皆因吉凶以示訓戒故其言雖約而所包甚廣夫子作傳亦畧舉其一端以見凡例而已薛氏曰六經之道易爲之宗他經亡而易傳不殊其書之存也民間有費髙二家之說費直本皆古字號古文易以授王璜未得立陳元鄭衆皆傳費氏學建武中韓歆上疏欲爲費氏立博士范升奏非急務馬融爲傳授鄭康成康成作易注荀爽又作傳自是費氏大興釋文序録費直章句四卷殘缺髙相專說隂陽災異未立學官後漢費興髙遂㣲費直說十二次度數見晉天文志王弼所傳本費氏晁氏曰先儒謂費直專以彖象文言參解易爻以彖象文言雜入卦中者自費氏始其初費氏不列學官唯行民間至漢末陳元方鄭康成之徒皆學費氏古十二篇之易遂亡孔頴逹又謂輔嗣之意象本釋經宜相附近分爻之象辭各附當爻則費氏初變亂古制時猶若今乾卦彖象繫卦之末歟古經始變於費氏而卒大亂於王弼昔韓宣子適魯見易象是古人以卦爻統名之曰象也故曰易者象也其意深矣豈若後之人卦必以象明象必以辭顯紛紛多岐哉劉向以中古文易經校施孟梁丘經釋文引古文如彚作􅥖翩作偏介作砎枕作沈蹢躅作􅤲􅤳繻作𥜗劉向引易曰飛龍在天大人聚也與今易異又引易大傳曰誣神者殃及三世說苑引易曰建其本而萬物理失之毫釐差以千里司馬遷引易曰差以毫釐謬以千里東方朔引正其本萬事理失之毫釐差以千里經解引君子慎始差若毫釐繆以千里今易無此語沙隨程氏曰此緯書通卦驗之文說苑引勞而不怨有功而不徳厚之至也有一道大足以守天下中足以守國家小足以守其身謙之謂也夫天道毁滿而益謙不損而益之故損自損而終故益又云天地動而萬物變化坊記引不耕穫不菑畬凶晁氏曰文字之傳始有齊楚之異音卒有科斗籀篆𨽻書之四變因而訛謬者多矣劉向嘗以中古文易經校施孟梁丘經至蜀李譔又嘗著古文易則今之所傳者皆非古文也唯費氏經與古文同吕氏曰漢興言易者六家獨費氏傳古文易而不立於學官費氏易在漢諸家中最近古最見排擯千載之後巋然獨存豈非天哉晁氏公武曰歐陽永叔謂孔子古經已亡費氏經與古文同則古經何嘗亡哉易文之異者漢書引嗛嗛䘮其齊斧日中見昩其欲浟浟不如西鄰之瀹祭說文引夕惕若夤伉龍有悔乘馬驙如再三黷禔既平百榖草木䕻於地以徃遴包㐬用馮河僮牛之告泣涕􆂶如其牛觢天且君子豹變其文斐也噬乾明出地上㬜顨巽􅀢艮榰恒凶折馬壯吉升大吉履虎尾虩虩寷其屋日􅨫之離需有衣䋈𣙗􅝨孰飪夫乾寉然天地壹㚃牛乘馬參天兩地重門撃柝燥萬物者莫暵于離雜而不􅫝爲馰顙又引地可觀者莫可觀於木井法也今易所無說文序曰其稱易孟氏皆古文也周禮注引其刑剭𥜗有衣絮參天兩地而竒數巽爲宣髮緇衣引恒其徳偵深衣引直其政方其義也史記引乾稱蜚龍鴻漸于般狐渉水濡其尾後漢劉脩碑動乎儉中鬼神富謙魏文帝紀注太史許芝引初六履霜隂始凝也内則注引明夷睇于左股郎顗引困而不失其所旡亨字史記索𨼆劉向别録云易家有救氏注連山歸藏不著録桓譚新論曰連山八萬言歸藏四千三百言漢世盖有二易矣水經注引連山易曰有崇伯鯀伏于羽山之野帝王世紀引連山易曰禹娶塗山之子名曰攸女生余唐志有十卷盖劉炫偽作梁元帝三十卷在五行家禮運坤乾注其書存者有歸藏晉中經有之隋唐志皆十三卷今唯存初經齊毋本蓍三篇初經云初乾初奭坤初艮初兊初犖坎初離初釐震初巽卦皆六畫漢上朱氏謂伏羲初畫八卦因而重之者也齊毋經云瞿有瞿有䱄宵梁爲酒尊於兩壺兩羭飲之三日然後鯀士有澤我取其魚見爾雅疏傳注所引若君子戒車小人戒徒有鳬鴛鴦有鴈鷫鷞有白雲自蒼梧入大梁上有髙臺下有雝池若以賈市其富如河漢昔女媧筮張雲幕枚占之曰吉昭昭九州日月代極平均土地和合四國黄神將戰筮於巫咸帝堯降二女以舜殷王其國常母谷羿彃十日明夷曰昔夏后啓筮乘龍飛以登于天睪陶占之曰吉昔者河伯筮與洛戰而枚卜昆吾占之不吉昔夏后啓筮享神於大陵而上鈞臺枚占臯陶曰不吉昔夏后啓筮享神於晉之墟作爲璿臺於水之陽昔者桀筮伐唐而枚占於熒惑曰不吉不利出征唯利安處彼爲貍我爲鼠勿用作事恐傷其父昔穆王子筮卦於禺强昔常娥以西王母不死之藥服之遂奔月爲月精孔頴達謂偽妄之書非殷易也按周官大卜掌三易之灋一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四連山首艮象山之出雲連連不絶歸藏首坤萬物莫不歸藏於其中周易首乾杜子春云連山伏戲歸藏黄帝山海經云伏羲氏得河圖夏后氏因之曰連山黄帝氏得河圖殷人因之曰歸藏列山氏得河圖周人因之曰周易姚信謂連山氏得河圖夏人因之曰連山歸藏氏得河圖殷人因之曰歸藏伏羲氏得河圖周人因之曰周易皇甫謐謂夏人因炎帝曰連山殷人因黄帝曰歸藏世譜神農一曰連山氏列山氏黄帝一曰歸藏氏張行成謂連山天易也歸藏地易也有法數而未有書周易人易也始有書矣先儒謂夏殷易以七八不變者占左氏傳穆姜筮艮之八晉語公子重耳筮得貞屯悔豫皆八董因筮之得泰之八周易以九六變者占而沙隨程氏曰古之筮者兼用三易之法衛元之筮遇屯曰利建侯是周易或以不變者占也季友之筮遇大有之乾曰同復于父敬如君所此固二易辭也既之乾則用變矣是連山歸藏或以變者占也夾漈鄭氏以爲連山用三十六䇿歸藏用四十五䇿周易用四十九䇿予華子曰出於一立於兩成於三連山以之而呈形歸藏以之而御氣大易以之而立數春秋演孔圖云孔子脩春秋九月而成卜之得陽豫之卦宋均注謂夏殷之卦名葢意之也元豐中三墳書始出于唐州比陽民家曰山氣形天皇伏戲氏本山墳而作易曰連山人皇神農氏本氣墳而作易曰歸藏地皇黄帝氏本形墳而作易曰坤乾雖不畫卦而連山大象八曰君臣民物陰陽兵象而統以山歸藏大象八曰歸藏生動長育止殺而統以氣坤乾大象八曰天地日月山川雲氣而統以形皆八而八爲六十四龜山楊氏曰是書太古河圖代姓紀曰博厚而濁謂之太易太易之數三是以形數名易知其非古書也揚雄太𤣥日始於寅義取連山衛元嵩元包卦首於坤義取歸藏司馬公潜虚亦取歸藏云晉郭璞摹洞林乎連山子夏易傳不著録隋志周易二卷子夏傳殘缺梁六卷釋文序録子夏易傳三卷卜商七畧云漢興韓嬰傳中經簿録云丁寛作張璠云或馯臂子弓所作薛虞記唐志二志今本十卷案陸徳明音義云地得水而柔水得地而流故曰比今本作地藏水而澤水得地而安但小異爾束帛戔戔作殘殘又云五匹爲束三𤣥二纁象陰陽今本無此文葢後人附益者多景迂晁氏曰唐張弧偽作孫氏曰漢杜子夏之學唐司馬氏曰七畧有子夏傳十録六卷或云韓嬰或云丁寛中經簿四卷書尚書古文經四十六卷爲五十七篇注鄭𤣥叙賛云後又亡其一篇故五十七孔安國作傳值巫蠱不行遂有張霸之徒僞作舜典汨作九共九篇大禹謨益稷五子之歌𦙍征湯誥咸有一徳典寶伊訓肆命原命武成旅獒冏命二十四篇除九共九篇共卷爲十六卷葢亦畧見百篇之序故以伏生二十八篇者復出舜典益稷盤庚二篇康王之誥及泰誓共爲三十四篇而僞作此二十四篇十六卷附以求合於孔氏之五十八篇四十六卷之數張霸僞造尚書百兩篇而爲緯者附之云孔子求書得黄帝𤣥孫帝魁之書迄於秦穆公凡三千二百四十篇斷逺取近定可以爲世法者百二十篇以百二篇爲中候愚按尚書大傳虞傳有九共引書曰予辯下土使民平平使民無傲殷傳有帝引書曰施章乃服明上下此伏生所傳必有所據其張霸僞書若鄭康成引𦙍征曰厥篚𤣥黄昭我周王注咸有一徳云伊陟臣扈曰又注典寶引伊訓云載孚在亳又曰征是三朡注旅獒云獒讀曰豪謂是酋豪之長三統厯譜引伊訓篇曰惟太甲元年十有一月乙丑朔伊尹祀于先王誕資有牧方明武成篇曰粤若來三月既死霸粤五日咸劉商王紂惟四月既旁生霸粤六日庚戌武王燎于周廟翌日辛亥祀于天位粤五日乙卯乃以庶國祀馘于周廟古文月采篇曰三日曰朏畢命豐刑曰惟十有二年六月庚午朏王命作䇿豐刑王莽傳引逸嘉禾篇曰周公奉鬯立于阼階延登賛曰假王莅政勤和天下康成云武成逸書建武之際亡謂彼僞武成也又逸篇有册命霍侯之事又似異於豐刑皆妄作也康成所謂亡一篇者即武成杜林於西州得􅃮書古文尚書一卷劉向别録云五十八篇藝文志云古文又多十六篇篇即卷也即是僞書二十四篇不見孔傳劉向班固劉歆賈逵馬融鄭𤣥之徒皆不見眞古文而誤以此爲古文之書庸生賈馬等惟傳孔學經文三十三篇鄭與三家同以爲古文鄭承其後所注皆同賈馬之學題曰古文尚書篇與夏侯等同而經字多異鄭序以爲虞夏書二十篇商書四十篇周書四十篇賛云三科之條五家之教是虞夏同科也百篇次第孔鄭不同孔依壁内篇次及序爲文鄭依賈氏所奏别録爲次鄭注禮記遇引今尚書所有之文皆曰逸書桓譚新論云古文尚書舊有四十五卷服䖍杜預亦不之見注左傳亂其紀綱云夏桀時杜又注左傳成允成功念茲在兹寜失不經辰不集于房官占唯能蔽志惟彼陶唐怨不在明皇天無親民之所欲大國畏其力官師相規趙岐注孟子天降下民作之君作之師綏厥士女湯一征自葛始丕顯丕承韋昭注國語衆非元后何戴闗石龢均皆以爲逸書孟子引太誓曰我武惟揚趙岐謂古尚書百二十篇之時太誓也王肅注書始似竊見孔傳注亂其紀綱爲夏太康時晉鄭冲以古文授蘇愉愉授梁柳柳之内兄皇甫謐從柳得之柳又以授臧曹曹授梅頥頥於前晉奏上其書時已亡舜典一篇范甯爲解時已不得乃取王肅注堯典慎徽五典以下分爲舜典續之齊姚方興得於大航以獻曰若稽古帝舜曰重華協于帝十二字是方興上孔氏傳本無或此下更有濬哲文明至乃命以位凡二十八字異隋開皇二年始得其篇然後書大備自武帝至隋開皇凡六百七十餘年然後五十八篇傳學者唐開元十四年改洪範無偏無頗爲無偏無陂天寶三載詔衛包改古文從今文釋文序録云今以孔氏爲正其舜典一篇仍用王肅本薛氏曰唐明皇更以正𨽻改定而俗儒承詔文多踳駮文選注引七畧曰尚書有青絲編目録後周郭忠恕定古文尚書并釋文本朝開寶五年别定今文音義與古文並行經二十九卷伏生口傳二十八篇後得泰誓一篇劉歆曰泰誓後得博士集而讀之董仲舒引白魚入于王舟有火復于王屋流爲烏郊祀志引正稽古立功立事可以永年丕天之大律毛詩箋引天將有立父母民之有政有居詩正義引師乃鼓譟前歌後舞格于上天下地咸曰孜孜無怠又曰司馬在前周禮疏引周公曰都懋哉子聞古先哲王之格言大子發拜手稽首說苑引附下而罔上者死附上而罔下者刑與聞國政而無益於民者退在上位而不能進賢者逐伏生無此篇而書傳有八百諸侯俱至孟津白魚入舟之事與泰誓同不知伏生先爲此語抑泰誓出後後人加此語未可知也房宏等說宣帝本始元年河内女子有壞老人屋得古文泰誓三篇别録云武帝末得於壁内獻之與博士使讀說之數月皆起傳以教人不得云宣帝時始出也鄭康成書論云民間得泰誓墨子引太誓曰小人見姦巧乃聞不言也發罪鈞二十九篇是計卷若計篇則三十四去泰誓猶有三十一伏生所傳謂之今文則歐陽夏侯三家所傳及蔡邕石經是也泰誓非伏生所傳而史記儒林傳云秦時焚書伏生壁藏之漢定伏生求其書亡數十篇獨得二十九篇葢太史公當武帝時泰誓已出而入伏生書内故總言之孔臧與安國書云曩雖爲今學亦多所不信唯聞尚書二十八篇取象二十八宿謂爲至然也河圖古文乃自百篇邪此劉歆所謂以尚書爲備傳四十一篇伏生作尚書傳四十一篇授張生張生授歐陽生隋志云濟南伏生之傳唯劉向父子所著五行傳是其本法而又多乖戾釋文序録尚書大傳三卷伏生作鄭康成注其序曰伏生至孝文時年且百歲歐陽生張生從學焉伏生終後數子各論所聞以己意彌縫其間而别作章句又特撰其大義因經屬指名之曰傳劉子政校中書奏此目録凡四十一篇康成詮次爲八十三篇今本四卷首尾不倫劉向傳賛云鴻範論發明大傳著天人之應唐志又有暢訓一卷大傳篇有九共帝告以西伯戡黎爲􅀈耆冏命爲㷡命費誓爲肹誓吕刑爲甫刑序又有嘉禾揜誥今本闕又引盤庚若徳明哉湯任父言卑應言酒誥王曰封唯曰若圭璧皆古文所無漢儒五行傳其原自大傳其流爲災異之說吳氏曰馬融鄭康成之學悉本伏生石林葉氏曰大傳以天地人四時爲七政謂金縢作於周公没後何可盡據史記以平在朔易爲便在伏物索𨼆云據大傳周禮疏云白虎通引尚書大傳云拊革装之以穅今書傳無者在亡逸中歐陽章句大小夏侯章句初書唯有歐陽孝宣世立大小夏侯七録云三家至西晉並亡其說間見於義疏葉氏曰自漢訖西晉言書惟祖歐陽氏鄭康成云歐陽氏失其本義郊祀志引歐陽大小夏侯三家說六宗皆曰上不及天下不及墜旁不及四方在六者之間助陰陽變化實一而名六後漢輿服志永平二年乘輿服從歐陽氏說公卿以下從大小夏侯氏說柦榮習歐陽尚書受朱普學章句四十萬言浮辭繁長多過其實及榮入授顯宗减爲二十三萬言子郁復删省定成十二萬言夏侯勝從歐陽氏問建自師事勝及歐陽髙左右采獲又從五經諸儒問與尚書相出入者牽引以次章句然則大小夏侯皆歐陽之學劉向五行傳記十一卷本傳曰洪範五行傳論本伏生大傳云維王后元祀帝令大禹歩于上帝沈約曰伏生創紀大傳五行之體始詳劉向廣演洪範休咎之文益備歐陽氏曰箕子陳洪範條其事爲九類别其說爲九章考其說不相附屬向爲五行傳乃取五事皇極庻證附於五行以爲八事皆屬五行歟則至於八政五紀三徳稽疑福極之類又不能附至俾洪範之書失其倫理所謂旁引曲取而遷就其說也然自漢以來未有非之者又祥眚禍痾之說自其數術之學向治穀梁數其禍福𫝊以洪範子歆治左氏言五行傳頗不同隋志洪範五行傳論十一卷劉向注郎顗傳引尚書洪範記曰月行中道移節應期徳厚受福重華留之許商五行傳記一篇夏侯始昌推五行傳傳族子勝下及許商其傳與劉向同儒林傳商善爲筭著五行論夏侯勝曰天乆陰而不雨臣下有謀上者對言在鴻範傳周書七十一篇周史記劉知幾史通曰周書與尚書相類即孔氏刋約百篇之外凡爲七十一章上自文武下終靈景其有典雅髙義亦有淺末常說殆似後之好事者所増益也至若職方之言與周官無異時訓之說比月令多同斯百王之正書五經之别録隋志雜史有周書十卷今本凡七十篇始於度訓終於噐服晉孔晁注隋唐志皆云得之晉太康中汲郡魏安釐王冢晉紀咸寜五年十月得竹簡古書然劉向班固所録並著周書而司馬遷史記武王克殷事與此合鄭康成注周禮儀禮引王㑹許叔重說文亦引逸周書馬融注論語引周書月令有更火之文豈漢世已入中袐其後稍隠邪今篇目比漢但闕其一繫之汲冢失其本矣杜預注左傳轡之柔矣謂逸詩見周書而狼瞫所稱周志勇則害上不登於明堂其語今見篇中千里百縣縣有四郡又引以爲上大夫受縣之注預注左傳既訖汲冢書始出見後序吕氏春秋引民善之則畜也不善則讐也楚世家引欲起無先蘇秦引緜緜不絶蔓蔓奈何䝉恬傳引必參而伍之蕭何引天予不取反受其咎主父偃引安危在出令存亡在所用谷永引記功忘過宜爲君王商傳引以左道事君者誅楊賜引天子見恠則修徳說苑引前車覆後車戒墨子引國無三年之食非其國淮南子引掩雉不得更順其風上言者常下言者權戰國䇿引魏任章將欲敗之必姑輔之將欲取之必姑與之貨殖傳引農不出則乏食工不出則乏事商不出則三寶絶說文引朕實不明以俒伯父書正義引月令云三日粤朏張衡集引乃命少皥清皆曰周書今文有無其語者豈在逸篇乎書多駁辭宜孔子所不取抑戰國之士私相綴續託周爲名孔子亦未必見也唐大衍厯議曰七十二候原于周公時訓月令雖頗有増益然先後之次則同謚法即此書第五十四篇也若周史記之名太史公謂孔子西觀周室論史記舊聞义謂周太史伯陽讀史記孔子讀史記至楚復陳又曰史記獨藏周室而說公羊者以爲孔子制春秋之義使子夏等十四人求周史記得百二十國寶書薛氏曰先王之制諸侯無史外史掌四方之志而職於太史止齋陳氏曰古者諸侯無私史有邦國之志小史掌之而藏周室魯人所謂周人御書晉人所謂辛有之二子董之於是有董史是也秦宓曰書非史記周圖仲尼不采墨子曰吾見百國春秋議奏四十二篇石渠論論石渠者歐陽地餘林尊周堪張山拊假倉河出圖雒出書成王之末河圖尚在邵子曰圓者河圖之數方者洛書之文朱文公曰河圖與易之天一至地十者合而載天地五十有五之數易之所自出也洛書與洪範之初一至次九者合而具九疇之數洪範之所自出也世傳一至九數者爲河圖一至十數者爲洛書正是反而置之朱震張行成皆以九爲河圖十爲洛書震本劉牧行成本邵子鶴山魏氏曰戴九履一之圖其象圓五行生成之圖其象方是九圓而十方也安知邵子不以九爲圖十爲書乎朱子雖力攻劉氏而猶曰易範之數相表裏爲可疑又曰安知圖之不爲書書之不爲圖是朱子尚有疑於此也大戴禮明堂篇有二九四七五三六一八之語鄭氏注云按北史大戴禮乃後魏盧辯注今本云鄭氏注誤也法龜文則漢人固以九數爲洛書矣蘇氏曰河圖洛書著於易見於論語今學者或疑焉山川出圖書有時而然魏晉之間張掖出石圖文字粲然時無聖人莫識其意爾孔子篹焉上斷於堯下訖於秦凡百篇而爲之序言其作意書序古文本自爲一篇在百篇之後劉歆曰孔子修易序書朱文公曰書小序非孔子作或頗與經不合序云書序序所以爲作者之意未嘗以爲孔子所作至劉歆班固始以爲孔子所作五峯胡氏曰康誥葢武王命康叔之辭不得不捨書序而從經史林氏曰序乃歴代史官相傳以爲書之總目猶詩之有小序也吳氏曰先序者孔子之序猶詩之大序也再序者當時之序猶詩之小序也古文尚書者出孔子壁中注師古曰家語孔騰藏尚書孝經論語於夫子舊堂壁中漢記尹敏傳云孔鮒所藏二說不同决疑曰隋志云武帝時魯恭王壞孔子宅得其末孫惠所藏之書皆古文也史通亦以爲孔惠所藏則又非師古所引二人者矣酒誥脫簡一揚子曰昔之說書者序以百而酒誥之篇俄空焉今亡夫伏生大傳酒誥曰王曰封唯曰若圭璧其脫簡之文與文字異者七百有餘歐陽夏侯之學不傳今無所考以古文考之吕大防得古文于宋敏求王欽臣如嬴内國語放勛中􅣂伯酓絲史記􅖏乃擭周禮注大卨南偽揖五瑞楙遷傳納栞木泲河厥棐惟甾盟豬夏狄瑶瑻内戞服服田力嗇思曰畏用六極漢書臮咎繇平豑東作剛而㥶五品不愻畎澮距川若丹朱奡㝮三苗鳥獸􅂒一作髦一作毛以記之艸木蔪苞􅔧咨譒告惟箘輅枯嵞山雝州坶野相時􅧴民若顛木之有㕀枿一作􅤁我興受其䢙西伯戡􅧰使百工夐求得之傅巖至于媰婦上不諅于凶徳我之不􅀢無有作􅤋曰圛圛者色澤光明古文作悌今文作圛賈逵以今文校之定以爲圛鄭依賈氏所奏曰貞曰􅀈夏氏之民叨􅀢有疾不悆焯見三有俊心在受徳忞王三宿三祭三㓃粊誓猗無他技大命不􅧈一人冕執鈗維緢有稽惟其􅖏丹雘􅎒􅎒善諞言璪火黺米旁逑孱功教育子說文皆與古文合度西曰柳榖於蕃時雍辯秩東作辯秩南偽辯秩南譌敬致日永寅餞入日辯秩西成辯在朔易日短宅嵎夷稘三百有六旬顧畏于民嵒說文多言也舜讓于徳不台朱斨柏譽有能俾䢃惟刑之謐哉修五禮五樂黎民祖飢亡敖佚欲有國一日二日萬機五刑五庸哉茂哉茂哉禹拜讜言敬授民時還瑞于羣后鄙徳忝帝位歌詠言聲依詠歸假于祖禰用特貿遷有無化居鮮食根食天功人共代之予欲聞六律五聲八音七始詠一作采政忽一作來始滑辯章百姓又作便知人則悊五流有度夤淺納日毋曠庻官放勛乃欽明文思晏晏旁施象刑維朙堋滛于家沇州海瀕廣潟滎播既都民降丘宅土均于江海二百里任邦毋若丹朱敖天用劋一作摷絶其命予則奴戮女作女鳩女房毋若火始庸庸若矢之有志今汝懖懖若藥不眄眩說築𫝊險之野有蜚雉登鼎耳而雊自清人自獻于先王惟先假王正厥事天既付命正厥徳庻艸繁橆叶疑彝倫攸殬毋侮矜寡而畏髙明不黨不偏王道平平不偏不黨王道蕩蕩旪用五紀饗用五福羞用五事艾用三徳艾時陽若悊時奥若舒恒奥若霧恒風若鮌垔洪水三人議則從二人之言曰雨曰濟曰圛曰蟊曰尅西旅獻豪是有負子之責於天我舊云孩子民儀有十夫惟乃丕顯考文王克明俊徳克明明徳祗祗畏畏顯民戴璧秉圭羣飲女無失不敢僣上帝命爾不克逺省在夏后之詷維丙午蠢皇天既附中國民知我國有呰辨來來示予卜休恒吉乃女其悉自學功髙宗梁闇三年不言一作涼陰毋逸以萬民惟正之共毋滛于酒毋逸于游田不禦克奔乃惟孺子攽越惟有胥賦小大多政則克度之克猶繹之创申勸寧王之徳武王惟􅀈勿以譣人文王作孝作敬公毋困我哉生霸恫矜乃身乃用其婦人之言尚狟狟作餽禾常敀常任哲民惟刑一作悊我嗣事子孫大不克共上下遏失前人光在家不知命不易天應棐諶乃亡隊命用勱相我邦家天棐諶辭凭玉几畢力賞罰兹道能念予一人王乃洮沫水我有于西敢翼殷命作賄息謹之命王耄荒度作詳刑以詰四方刑罰時輕時重罰懲非死佞極于病報以庻訧天齊乎人假我一日爰制百姓于刑之𠂻其審核之告汝詳刑惟貨惟求上刑挾輕下刑挾重其罰百率即我御事罔克耆夀廸一人使四方若卜筮陳宗赤刀鮮誓一作盼峙乃餱粻黄髪之言則無所愆維諓諓善靖言俾君子易怠善徧言以諞爲徧漢世諸儒所引異字此其畧也蔡邕所書石經女母翕侮成人度爾口安定厥國興降不永崇降弗祥女比猶念以相從各翕中勛建大命厥遺任父母弟不迪曰陳其五行毋偏毋黨有年于兹雒乃劮乃憲既延乃逸乃諺既誕天命自亮以民祗懼肆髙宗之饗國百年懷保小人惠于矜寡毋劮于遊田母兄曰今日無皇人乃訓變正刑則兄曰敬徳旦以前人之㣲言是罔顯哉厥世鮮光耿光黼衣扆此殘碑存於今者也若左傳引聖有謩勲茂不茂引五子之歌衍師彼天常四字又引康誥曰父子兄弟罪不相及今無此語惟命不于常注云康誥今亦無禮記引兊命敬孫務時敏民立而正事純而祭祀是爲不敬尹告惟尹躬及湯君雅夏日暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨又引太甲曰民非后無能胥以寧髙宗云三年其惟不言言乃讙甫刑曰苗民匪用命播刑之不廸帝典曰克明峻徳又以割申勸寧王之徳爲周田觀文王之徳注今博士讀爲厥亂勸寧王之徳古文似近之引庻言同而無則繹二字尹吉曰惟尹躬天見于西邑夏尹吉亦尹誥也天當爲先國語引民可近也而不可上也惠于小民唯政之恭又引湯誓曰余一人有辠無以萬夫孟子引天誅造攻自牧宫有攸不惟臣東征綏厥士女無畏寧爾也非敵百姓也惟曰其助上帝寵之四方有罪無罪惟我在凡民罔不憝自作孽不可活墨子引吕刑羣后之肆在下明明不常三后成功維假於民皆文字之異者至於荀子引中蘬之言諸侯自爲得師者王得友者霸得疑者存自爲謀而莫已若者亡又引康誥𢎞覆乎天惟文王敬忌一人以擇先儒以爲繆妄又引道經曰人心之危道心之㣲書曰從命而不拂㣲諫而不倦爲上則明爲下則遜注以爲伊訓今無此語又引舜曰維予從欲而治後漢劉陶推三家尚書及古文是正文字七百餘事名曰中文尚書賈逵撰歐陽大小夏侯尚書古文同異集爲三卷書者古之號令艾軒林氏曰古者言爲尚書事爲春秋葢以左右二史分掌之秦置尚書於禁中以通章奏漢之詔命在尚書以尚書主王言故秦漢因是名官先儒以爲上古之書則失之七畧曰尚書直言也逸書附見聖作則慎始而敬終終以不困命以伯禽唐誥皆䇿命篇名左傳先其筭命漢書維髙宗報上甲㣲孔叢子太社唯松東社唯栢南社唯梓西社唯栗北社唯槐厥兆天子爵白虎通不及貢以政接于有庫孟子恃徳者昌恃力者亡史記呉氏曰自漢而下書之逸者已不復見雖間出既所未讀必不能知其爲書如所謂先其筭命髙宗報上甲㣲不及貢以政接于有􅋻之類先儒指以爲逸書世方知之不然孰知其爲書也漢藝文志考證卷一
