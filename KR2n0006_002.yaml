body:
  text: 漢藝文志考證卷二宋王應麟撰詩詩經二十八卷魯齊韓三家儒林傳言詩於魯則申公培於齊則轅固生於燕則韓太傅齊魯以其國所傳皆衆人之説也毛韓以其姓所傳乃專門之學也肅宗令賈逵撰齊魯韓詩與毛詩異同朝氏曰齊魯韓三家之詩早立博士以關雎葛覃卷耳鵲巢采蘩采蘋騶虞鹿鳴四牡皇皇者華之類皆為康王詩王風為魯詩鼓鐘為昭王詩異同不可悉舉賈誼以騶虞為天子之囿以木瓜為下之報上劉向以衛宣夫人作弼柏舟黎莊公夫人作式微陳婦道蔡人之妻作芣苡之類皆三家之説也揚雄曰周康之時頌聲作乎下關雎作乎上習治也與毛詩大不類如此則其序必不同也今所略見者韓詩之序曰芣苡傷夫也漢廣恱人也汝墳辭家也蝃蝀刺奔女也其詳可勝言哉韓詩序又云黍離伯封作也賔之初筵衛武公飲酒悔過也又謂商頌美宋襄公歐陽氏曰韓詩遺説往往見於他書至經文亦不同如逶迤郁夷之類又曰孔子言關雎哀而不傷太史公曰周道缺詩人本之衽席關雎作而三家皆以為康王政衰之時謂為周衰之作者近是矣彭俊民曰申公得詩之約也轅固得詩之直者也以約窮理而以直行已觀其言以察其所行信有異於毛公韓嬰之所聞也隋志齊詩魏代已亡魯詩亡於西晉韓詩雖存無傳之者唯毛詩鄭箋至今獨立詳見詩考魯故二十五卷儒林傳申公事浮丘伯受詩獨以詩經為訓故以教亡傳疑者則闕弗傳朝氏曰詩有魯故韓故齊后氏故孫氏故毛詩故訓傳書有大小夏侯解故前人惟故之尚如此後漢輿服志注引魯訓魯説十八卷荀卿子劉向説苑新序列女傳間引詩以證其説與毛義絶異蓋魯詩出於浮丘伯乃荀卿門人荀卿之學魯詩之原也劉向為楚元王交之孫交亦受詩於浮丘伯劉向之學魯詩之流也魯詩有章氏學後漢執金吾丞武榮碑云治魯詩經韋君章句元王詩不著録楚元王交與魯穆生白生申公俱受詩於浮丘伯伯者孫卿門人也申公始為詩傳號魯詩元王亦次詩傳號曰元王詩世或有之劉向列女傳稱詩芣苡柏舟大車之類與今序詩者之説尤乖異汝墳謂周南大夫妻作行露謂申女作式微一篇謂二人之作碩人之詩謂莊薑始至操行衰惰傅母作之新序謂衛宣公子伋方乘舟時伋傅母恐其死也閔而作詩二子乘舟之詩是也壽閔其兄之且見害作憂思之詩黍離之詩是也黍離為王風之首向之言殆未可信封事引飴我釐牟説苑引蔽芾甘棠傳曰舍于甘棠之下而聽斷焉尸鳩在桑傳曰尸鳩之所以養七子者一心也君子之所以理萬物者一儀也向乃元王之孫必本於魯詩齊后氏故二十卷后蒼事夏侯始昌授翼奉蕭望之匡衡奉言五際流為災異之説衡議論最為近理伏黯以明齊詩改定章句作解説九篇子恭省減浮辭定為二十萬言齊孫氏故二十七卷儒林傳齊詩有翼匡師伏之學孫氏未詳其名韓內傳四卷韓生推詩之意為內外傳數萬言其語頗與齊魯間殊然其歸一也白虎通引韓詩內傳隋志韓詩二十二卷薛氏章句文選注多引之後漢薛漢父子以章句著名杜撫受業於漢定章句韓外傳六卷隋志十卷太史公自序厥協六經異傳如子夏易傳毛公詩及韓嬰外傳伏生尚書大傳之流歐陽子曰外傳非嬰傳詩之詳者其遺説時見於他書與毛之義絶異而人亦不信毛詩二十九卷故訓傳三十卷六藝論曰河間獻王好學其博士毛公善説詩獻王號之曰毛詩正義云毛為詁訓與經别二十九卷不知併何卷經典序録河間人大毛公為詩故訓傳一云魯人不言其名初學記荀卿授魯國毛亨作詁訓傳以授趙國毛萇時人謂亨為大毛公萇為小毛公詩譜曰魯人大毛公為故訓傳於其家河間獻王得而獻之以小毛公為博士後漢儒林傳趙人毛萇傳詩然則小毛公名萇正義大毛公為傳由小毛公而題毛也序録小毛公一云名長肅宗詔選髙才生受毛詩遂行於世鄭衆賈逵傳毛詩後馬融作傳鄭玄作箋淇水李氏曰毛之説簡而深此獻王所以髙其學也鄭氏之釋繁塞而其失愈多鄭學長於禮以禮訓詩是按迹而議性情也魏氏曰毛傳簡要平實無臆説無改字正義云故訓者依故昔典訓而為傳義曹氏曰許氏説文援據古文毛氏詩其文與今多異吕氏曰左氏所引詩多與毛詩合歐陽氏曰毛詩序與孟子説詩多合隋志毛萇善詩自謂子夏所傳先儒相承謂毛詩序子夏所創毛公及衛敬仲又加潤益後漢儒林傳衛宏作毛詩序鄭氏以為諸序本自合為一編毛公始分以置諸篇之首書曰詩言志唐氏曰在心為志詩序一言而盡作詩之本以意逆志孟子一言而盡説詩之道古有采詩之官食貨志孟春之月羣居者將散行人振木鐸徇于路以采詩獻之太師比其音律以聞於天子葉氏曰列子言立我蒸民莫匪爾極者堯之時所謂詩也尚書大傳言日月光華𢎞余一人者舜之時所謂詩也古者天子五載一巡狩則太師陳詩以觀風俗二帝之世工以納言時而揚之其施之學校以教士與禮樂書相參謂之四術至孔子始刪取著以為經凡二百五篇孔子世家古者詩三千餘篇及至孔子去其重取可施於禮義上采契后稷中述殷周之盛至幽厲之缺始於袵席故曰關雎之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始三百五篇孔子皆弦歌之以求合韶武雅頌之音今按詩三百十一篇亡其辭者六篇考之儀禮皆笙詩也曰笙曰樂曰奏而不言歌則有聲而無辭明矣漢世毛學不行故云三百五篇王式以三百五篇諌龔遂曰誦詩三百五篇人事浹王道備詩有先孔子而亡者如新宫貍首之類以其諷誦不獨在竹帛程子曰古之人幼而聞歌誦之聲長而識刺美之意故人之學由詩而興艾軒林氏曰古書皆以言傳唯詩以聲𨽻之列國風詩皆隨時而變聞其聲審其邪正而知其時俗自訓詁之學起誦詩者泥其辭而不復求其聲聲之邪正既不可辨所得於詩者特在言句之間爾魯最為近之林氏曰班固論三家之為詩寧有取於魯而未始及毛氏也杜欽謂佩玉晏鳴關雎歎之鄭氏注坊記以先君之思為衛夫人定薑之詩皆魯詩也毛公之學自謂子夏所傳序録徐整云子夏授髙行子髙行子授薛倉子薛倉子授帛妙子帛妙子授河間大毛公一云子夏傳曽申申傳魏人李克克傳魯人孟仲子孟仲子傳根牟子根牟子傳趙人孫卿子孫卿子傳魯人大毛公今按詩序髙子曰靈星之尸也即髙行子孟子公孫丑問曰髙子曰小辨小人之詩也怨曰固哉髙叟之為詩也維天之命傳孟仲子曰大哉天命之無極而美周之禮也詩譜云子思論詩於穆不已仲子曰於穆不似仲子子思弟子禮禮古經五十六卷劉歆欲立逸禮移書曰魯恭王得古文於壞壁逸禮有三十九論衡謂宣帝時河內女子壞老屋得佚禮儀禮疏曰髙堂生傳十七篇是今文也孔子宅得古儀禮五十六篇其字皆篆書是古文也古文十七篇與髙堂生所傳者同而字多不同餘三十九篇絶無師説七録云餘篇皆亡祕在於館志云禮古經出於魯淹中及孔氏劉原父曰孔氏安國所得壁中書也六藝論云孔壁得之今其篇名頗見於他書若學禮賈誼傳天子巡狩禮內宰注朝貢禮聘禮注朝事儀覲禮注蒸嘗禮射人疏中霤禮月令注疏詩泉水疏王居明堂禮月令禮器注古大明堂禮昭穆篇蔡雍論本命篇通典聘禮志荀子又有奔喪投壺遷廟釁廟曲禮少儀內則弟子職諸篇見大小戴記及管子七録云古經周宗伯所掌五禮威儀之事經七十篇劉原父曰當作十七儒林傳魯髙堂生傳士禮十七篇史記正義謝承云秦代有魯人髙堂伯人按今儀禮士禮有冠昏相見喪夕虞特牲饋食七篇他皆天子諸侯卿大夫禮喪服傳子夏所為白虎通謂之禮服傳鄭康成注以今古二字並之或從今或從古或疊二文别釋餘義張淳曰漢初未有儀禮之名疑後漢學者見十七篇中有儀有禮遂合而名之也歐陽氏曰大射之篇獨曰儀蓋射主於容升降揖遜不可失七録云博士侍其生得十七篇記百三十一篇隋志云河間獻王得仲尼弟子及後學者所記一百三十一篇獻之今逸篇之名可見者有三正記别名記親屬記明堂記曽子記禮運記五帝記白虎通王度記禮記注禮記周禮疏白虎通後漢輿服志注王霸記夏官注瑞命記文選注論衡辨名記春秋疏孔子三朝記史記漢書注月令記大學志蔡雍論雜記正義云案别録王度記云似齊宣王時淳于髠等所説也明堂陰陽三十三篇隋牛𢎞曰案劉向别録及馬宫蔡雍等所見當時有古文明堂禮王居明堂禮明堂圖明堂大圖明堂陰陽泰山通義魏文侯孝經傳等並説古明堂之事其書皆亡唐會要引禮記明堂隂陽録牛𢎞亦引明堂陰陽録今禮記月令於别録中屬明堂陰陽記故謂之明堂月令説文引明堂月令王史氏二十一篇隋志河間獻王得記一百三十一篇劉向檢得一百三十篇第而敘之又得明堂陰陽記三十三篇孔子三朝記七篇王氏史氏記二十一篇樂記二十三篇凡五種合二百十四篇曲臺后蒼九篇本傳倉説禮數萬言號曰后氏曲臺記授大小戴服虔曰在曲臺校書著記因以為名七略曰宣皇帝時行射禮博士后倉為之辭至今記之曰曲臺記顔氏曰曲臺殿在未央宫初禮唯有后孝宣世復立大小戴禮按大戴公符篇載孝昭冠辭蓋宣帝時曲臺記也大戴禮小戴禮不著録二戴皆傳儀禮十七篇次第自冠昏士相見已下大小戴先後不同唯劉向别録大射以上七篇與小戴同其下尊卑吉凶次第倫敘鄭氏用之禮記所以釋儀禮之義也陳邵周禮論敘云戴德刪古禮二百四篇為八十五篇謂之大戴禮戴聖刪大戴禮為四十九篇是為小戴禮按劉向别録有四十九篇後漢馬融盧植考諸家同異附戴聖篇章去其繁重及所缺略而行於世即今禮記是也中庸子思作緇衣公孫尼子月令吕不韋王制漢博士所為今大戴禮十三卷總四十篇隋志夏小正别為卷始三十九終八十一當為四十三篇中間缺者四篇重出者一篇兩篇七十三其上不見者猶三十八篇不能合八十五篇之數豈但當為八十一耶其缺者或既逸其不見者抑聖所取者然哀公問投壺二篇與小戴書無甚異禮察篇與經解亦同曽子大孝篇與祭義相似則聖已取之篇豈其文無所刪者也勸學禮三本見荀卿子取舍之説及保傅見賈誼疏間與經子同者尚多有之隋志戴聖刪大戴之書為四十六篇馬融足月令一篇明堂位一篇樂記一篇合四十九篇七録云自後漢諸儒多為小戴訓即今之禮記中庸説二篇孔子之孫子思伋作中庸程氏曰中庸之書是孔門傳授成於子思傳於孟子白虎通謂之禮中庸記孔叢子云子思年十六撰中庸之書四十九篇東萊吕氏曰未冠既非著書之時而中庸之書亦不有四十九篇也此蓋戰國流傳之妄周官經六篇河間獻王得周官有李氏得而上於獻王獨缺冬官取考工記補之合成六篇禮記疏云孝文時求得此書不見冬官一篇乃使博士作考工記補之謂孝文時非也五峯胡氏曰司徒掌邦教司空掌邦土冬官未嘗闕也乃劉歆妄以冬官事屬之地官俞庭椿取其説為周禮復古編謂司空之篇雜出於五官之屬且因司空之復而六官之訛誤亦遂可以類考程氏曰冬官之屬才二十八而五官各有羡數考冢宰六屬各六十今天官六十三地官七十八春官七十夏官六十九秋官六十六蓋斷簡失次名實散亡取羡數凡百工之事歸之冬官其數乃周賈氏疏曰劉向未校之前或在山巖石室有古文考校後為今文古今不同鄭氏據今文注朱文公以為廣大精密周家之法度在焉齊文惠太子鎮雍州有發楚王冢獲竹簡書青絲編簡廣數分長二尺有得十餘簡以示王僧虔僧虔曰是科斗書考工記然則考工記亦先秦書謂之漢博士作誤矣馬融云成帝命劉歆考理祕書始得列序著于録略知其周公致太平之迹永平初杜子春年且九十能通其讀鄭衆賈逵往受業焉鄭康成序云鄭少贛興仲師衆衛次仲賈景伯馬季長皆作周禮解詁説文引任削地垗五帝於四郊廟門容大冪七箇孤乘夏輴赤魃氏煣牙外不熑與今字異周官傳四篇詩正義漢初為傳訓者皆與經别行及馬融為周禮注乃云欲省學者兩讀故具載本文然則後漢以來始就經為注軍禮司馬法百五十五篇周官縣師將有軍旅會同田役之戒則受法于司馬以作其衆庶小司馬掌事如大司馬之法司兵授兵從司馬之法以頒之此古者司馬法即周之政典也周禮疏云齊景公時大夫穰苴作司馬法至齊威王大夫等追論古法又作司馬法附於穰苴太史公曰自古王者而有司馬法穰苴能申明之又曰司馬法所從來尚矣太公孫吳王子王子成甫能紹而明之穰苴傳曰齊威王使大夫追論古者司馬兵法而附穰苴於其中因號曰司馬穰苴兵法太史公曰余讀司馬兵法閎廓深逺雖三代征伐未能竟其義如其文也亦少褒矣若夫穰苴區區為小國行師何暇及司馬兵法之揖讓乎漢武帝詔引登車不式周禮注引鼓聲不過閶鼙聲不過闒鐸聲不過琅土卜下謀是謂參之昏鼓四通為大鼜弓失圍殳矛守戈戟助疏引十人之長執鉦百人之師執鐸千人之師執鼙萬人之主執大鼓左傳疏服虔引謀帥篇曰大前驅啓乘卑大晨倅車屬焉又引五十乘為兩百二十乘為伍八十一乘為專二十九乘為參二十五乘為偏説文引騛衛斯輿善者欣民之善閉民之惡師多則人䜋杜佑引上謀下鬭圍其三面開其一面之類然其文或不見今五篇中百五十五篇今存五篇而已李靖曰周司馬法本太史公者也按周禮注引軍禮曰無干車無自後射豈即此書所載歟大宗伯所掌軍禮之别有五孔叢子有問軍禮之篇古封禪羣祀二十二篇梁許懋曰燧人之前世質民淳安得泥金檢玉結繩而治安得鐫文告成胡氏曰考舜典可以知後世封禪之失稽懋言可以知史遷著書之謬文中子曰封禪之費非古也徒以夸天下其秦漢之侈心乎孫氏曰帝王巡守每至方嶽必燔柴以告至非謂自陳功於天也議奏三十八篇石渠論石渠者戴聖韋玄成聞人通漢隋志石渠禮論四卷戴聖撰後漢禮儀輿服志注王制疏詩疏並引石渠論通典引石渠禮議甘露三年三月黃門侍郎臨奏經曰鄉射合樂大射不何也戴聖曰鄉射合樂者質也大射人君之禮儀多故不合樂也聞人通漢曰鄉射合樂所以和百姓也大射不合樂者諸侯之禮也韋玄成曰鄉人本無樂故合樂所以和百姓而同其意諸侯當有樂故不曰合樂時公卿以玄成議是梁丘臨為黃門郎奉使問諸儒於石渠王制不著録史記封禪書文帝使博士諸生刺六經中作王制索隱劉向七録云文帝所造書有本制兵制服制篇白虎通引禮王制曰天子棺槨九重今禮記王制篇蓋其略也漢儀不著録肅宗章和元年正月召曹褒詣嘉德門令小黃門持班固所上叔孫通漢儀十二篇敕褒曰此制散略多不合經然十二篇不著于七略蓋與律令同録藏於理官法家禮記正義云許氏謹案髙祖時皇太子納妃叔孫通制禮以為天子無親迎南史沈文阿云叔孫定禮尤失前憲奠贄不圭致享無帛公王同璧鴻臚奏賀若此數事未聞於古三禮注疏所引漢禮器制度通所作也隋志已亡此書儀禮鄉射疏引漢禮云五武成步步六尺周禮小祝注杜子春云漢儀每街路輒祭禮記祭法疏案漢儀髙帝廟主九寸前方後圓圍一尺論衡髙祖詔叔孫通制作儀品十六篇凡禮十三家六蓻論云傳禮者十三家唯髙堂生及五傳弟子戴德戴聖名在也熊氏曰髙堂生蕭奮孟卿后蒼及戴德戴聖為五此所傳皆儀禮也文選注七略曰禮家先魯有桓生説經頗異禮經三百威儀三千禮器曰經禮三百曲禮三千注經禮謂周禮也周禮六篇其官有三百六十曲猶事也事禮謂今禮也禮篇多亡本數未聞其中事儀三千中庸曰禮儀三百威儀三千禮樂志與此志同朱文公曰臣瓉曰禮經謂冠昏吉凶蓋以儀禮為經禮也葉夢得曰經禮制之凡曲禮文之目先王之世二者蓋皆有書藏於有司祭祀朝覲會同則大史執之以涖事小史讀之以喻衆而鄉大夫受之以教萬民保氏掌之以教國子者亦此書也禮篇之名禮器為勝諸儒之説瓉葉為長禮記正義禮説云正經三百動儀三千非謂篇有三千但事之殊别有三千條儒林王式傳歌驪駒江翁曰經何以言之式曰在曲禮注逸詩見大戴禮其辭云驪駒在門僕夫具存驪駒在路僕夫整駕朱文公曰曲禮戴氏編禮時已亡逸故特因其首章之幸存者而雜取諸書所引與他記相似者以補續之學七十篇文相似多三十九篇劉原父云學當作與七十當作十七五十六卷除十七正多三十九朱文公曰疏云古文十七篇與髙堂生所傳相似是唐初時漢志猶未誤也推士禮而致於天子之説朱文公曰士禮特略舉首篇以名之其曰推而致於天子者蓋專指冠昏喪祭而言若燕射朝聘則士豈有是禮而可推耶又曰儀禮乃本經而禮記郊特牲冠義等篇乃其義疏漢藝文志考證卷二
