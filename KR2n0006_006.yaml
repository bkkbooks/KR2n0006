body:
  text: 漢藝文志考證卷六宋王應麟撰道伊尹五十一篇説苑臣術篇吕氏春秋皆引伊尹對湯問周書王會有伊尹朝獻商書愚謂孟子稱伊尹曰天之生此民也使先知覺後知使先覺覺後覺也豫天民之先覺者也豫將以斯道覺斯民也非豫覺之而誰也伊尹所謂道豈老氏所謂道乎志於兵權謀省伊尹太公而入道家蓋戰國權謀之士著書而託之伊尹也湯誓序曰伊尹相湯伐桀升自陑孔安國謂出其不意豈知伊尹者哉傳伊尹之言者孟子一人而已太公謀八十一篇言七十一篇兵八十五篇李靖曰謀所謂隂謀不可以言窮言不可以兵窮兵不可以財窮此三門也齊世家後世之言兵及周之隂權皆宗太公為本謀戰國䇿蘇秦得太公隂符之謀隋志有太公隂謀文選注引七略太公金版玉匱雖近世之文然多善者又引太公金匱太史公序齊世家曰謬權於幽正義謂六韜三略隂符七術之屬愚謂老氏曰將欲翕之必固張之將欲奪之必固與之此隂謀之言也范蠡用之以取吳張良本之以滅項而言兵者尚焉此太史公入道家然隂謀之術申商韓非之所本也文王之德之純太公見而知之丹書敬義之訓武王得於師尚父隂謀傾商之説陋矣辛甲二十九篇劉向别録曰辛甲故殷之臣事紂蓋七十五諫而不聽去至周召公與語賢之告文王文王親自迎之以為公卿封長子左氏傳辛甲為太史命百官官針王闕鬻子二十二篇太史公序楚世家曰重黎業之吳回接之殷之季世粥子牒之劉向别録云鬻子名熊封於楚劉協曰鬻熊知道而文王咨謀諸子肇始莫先於斯唐逢行圭注一卷十四篇序云卷軸不全而其門可見賈誼新書引文王武王成王問粥子列子天瑞篇引粥熊曰運轉無已天地密移疇覺之哉力命篇引粥熊語文王曰自長非所增自短非所損陸佃曰列子所稱即南華藏舟鳬鶴之義也今其書無之則熊之嘉言要旨亡者多矣又小説有鬻子説十九篇後世所加管子八十六篇劉向序所校讎中管子書大中大夫卜圭書臣富參書射聲校尉立書太史書凡中外書五百六十四以校除復重四百八十四篇定著八十六篇太史公曰余讀管氏牧民山髙乘馬輕重九府詳哉言之也九府書民間無有山髙一名形勢今二十四卷牧民至輕重庚傅子曰管子書過半是後之好事者所加輕重篇尤鄙俗今本房喬注唐志謂尹知章注文選引江邃文釋云管子曰夫士懷耿介之心不蔭惡木之枝今檢管子近亡數篇恐是亡篇之內而邃見之石林葉氏曰其間頗多與鬼谷子相亂管子自序其事亦泛濫不切疑皆戰國䇿士相附益蘇氏古史謂多申韓之言非管子之正也甚者以智欺其民以術傾鄰國有不資之寶石壁菁茅之謀使管仲而信然尚何以霸哉老子隋志梁有漢長陵三老母丘望之注老子二卷志不著録朝氏公武曰以周平王四十二年授關尹喜凡五千七百四十有八言八十一章言道德之旨其末云使民復結繩而用之蓋三皇之道也東萊吕氏曰孔子嘗問禮焉今載於曽子問者與五千言殊不類蓋告孔子者其所職著於書者自其所見也陸德明序録云周敬王時西出關為關令尹喜説道德二篇尚虛無無為漢文帝時河上公作章句四篇以授帝言治身治國之要志無河上公章句鄰氏傅氏徐氏劉向傳説今皆亡王禹玉曰今資善堂所寫御本獨無章名章名疑非老氏之意薛氏曰古文老子道德上下經無八十一章之辨今文有河上公注分八十一章史記樂臣公本師河上丈人教安期再傳至于臣公其弟子蓋公為曹相國師修黃帝老子學則丈人者乃今所謂河上公也自晉世已言其教漢文帝敘述尤怪誕景迂朝氏曰常善救人故無棄人常善救物故無棄物獨得諸河上公古本無有也傅奕能辨之王弼題曰道德經不析道德而上下之猶近古歟葉氏曰老氏之書其與孔子異者皆矯世之辭而所同者皆合於易老子指歸不著録隋志十一卷嚴遵撰列子釋文云遵字君平作指歸十四篇演解五千文文子九篇與孔子並時而稱周平王問似依託今本十二篇道原至上禮李暹注豈暹析之歟其傳曰姓辛氏葵丘濮上人號曰計然范蠡師事之本受業於老子文子録其遺言為十二篇名研文子其字也志注謂似依託朝氏曰三代之書經秦火之後幸而存者錯亂參差如爾雅周公作而有張仲孝友是也桞宗元以為駁書曹子建表引文子李善注以為計然今其書一以老子為宗略無與范蠡謀議之事貨殖傳注計然其書則有萬物録著五方所出皆述之事見皇覽及晉中經簿唐志農家范子計然十五卷注云范蠡問計然答則與文子了不同北史蕭大圜曰陶朱成術於辛文蜎子十三篇名淵楚人史記環淵楚人學黃老道德之術著上下篇廣韻古有楚賢者環淵索隱正義皆無注釋今按文選枚乘七發便蜎詹何之倫注云淮南子雖有鈎針芳餌加以詹何蜎蠉之數猶不能與罔罟爭得也宋玉與登徒子偕受釣於玄淵七略蜎子名淵三文雖殊其人一也關尹子九篇劉向校中祕書九篇太常存七篇臣向本九篇蓋公授曹相國參相國薨書葬至孝武時有方士來以七篇上上以仙處之淮南王安好道聚書有此不出臣向父德因治淮南王事得之永始二年八月庚子上一字二柱三極四符五鑑六七七釡八籌九藥列仙傳云著書九篇名關令子莊子五十二篇郭象注三十三篇內篇七外篇十五雜篇十一陸德明序録云莊生宏才命世辭趣華深正言若反故莫能暢其𢎞致後人增足漸失其真故郭子玄云一曲之才妄竄竒説若閼奕意修之首危言遊鳬子胥之篇凡諸巧雜十分有三藝文志五十二篇即司馬彪孟氏所注是也內篇七外篇二十八雜篇十四解説三言多詭誕或似山海經或類占夢書故注者以意去取其內篇衆家並同自餘或有外而無雜唯子玄所注特會莊生之旨成玄英疏莊周字子休文選注太平御覽引莊子閼奕遊鳬之語荀子曰莊子蔽於天而不知人朱文公曰莊子見道體蓋自孟子之後荀卿諸公皆不能及韓文公曰子夏之學其後有田子方子方之後流而為莊周故周之書喜稱子方之為人列子八篇劉向校中書列子五篇與長社尉臣參校讎太常書三篇太史書四篇臣向書六篇臣參書二篇內外書凡二十篇以校除復重十二篇定著八篇天瑞至説符穆王湯問二篇迂誕恢詭非君子之言也至於力命篇一推分命揚子之書唯貴放逸二義乖背不似一家之書永始三年八月壬寅上桞宗元曰劉向録列子曰鄭穆公時人穆公在孔子前幾百嵗列子書言子産鄧析史記鄭繻公二十四年鄭殺其相駟子陽子陽正與列子同時是嵗魯穆公十年不知向言魯穆公時遂誤為鄭耶莊周放依其辭其稱夏竦狙公紀渻子季咸等皆出列子其文辭類莊子而尤質厚其楊朱力命疑其楊子書其言魏牟孔穿皆出列子後不可信或謂鄭繻公字誤為繆公東萊吕氏曰以列子所載楊朱遇老子老子中道而歎一章觀之則朱受學於老子不疑朱之言見於列子者因多後人所附益為我之説亦略可見也石林葉氏曰天瑞黃帝篇與佛書相表裏吕氏曰列子多引黃帝書蓋古之微言傳久而差者玄牝一章今見老子此戰國秦漢所以並言黃老也老成子十八篇列子曰老成子學幻於尹文先生長盧子九篇史記楚有尸子長盧公子牟四篇先莊子荀子非十二子注魏牟魏公子封於中山今莊子有公子牟稱莊子之言以折公孫龍據即與莊子同時也又列子稱公子牟解公孫龍之言龍平原君之客而張湛以為文侯子據年代非也説苑公子牟東行穰侯送之未知何者為定田子二十五篇吕氏春秋曰老𥅆貴柔孔子貴仁墨翟貴廉關尹貴清子列子貴虛陳駢貴齊陽朱貴已孫臏貴勢王廖貴先兒良貴後尸子廣澤篇曰墨子貴兼孔子貴公皇子貴衷田子貴均列子貴虛料子貴别史記世家齊宣王喜文學遊説之士自如騶衍淳于髠田駢接子慎到環淵之徒七十六人皆賜列第為上大夫不治而議論是以齊稷下學士復盛且數百千人劉向别録曰稷齊城門名談説之士期會於稷門下故曰稷下鄭志張逸問云我先師棘下生何時人答云齊田氏時善學者所會處也齊人號之棘下生無常人也西山真氏曰莊生所述諸子墨翟禽滑釐其一也宋鈃尹文其二也彭蒙田駢慎到其三也關尹老𥅆其四也莊周其五也惠施其六也異端之盛莫甚於此時陳駢即田駢也荀子非十二子與慎到並言七略齊田駢好談論故齊人為語曰天口駢天口者言田駢子不可窮其口若事天荀子注其學本黃老歸名法老萊子十六篇史記老萊子亦楚人也著書十正篇言道家之用與孔子同時大戴禮云德恭而行信終日言不在悔尤之內貧而能樂蓋老萊子之行也文選注引尸子老萊子曰人生於天地之間寄也戰國策云不聞老萊子之教孔子事君乎示之其齒之堅也六十而盡相靡也鶡冠子一篇今四卷十五篇隋志三卷博選至學問桞宗元辨此書非古謂好事者偽為其書而韓愈獨稱焉謂其詞雜黃老刑名陸佃序曰自博選篇至武靈王問凡十有九篇而退之讀此云有六篇者非全書也今四篇亡測真隱傳以鶡為冠莫其名因服成號黃帝四經四篇黃帝銘六經篇史記正義黃帝道書十卷隋志漢時道書之流三十七家大旨皆去健羡處沖虛其黃帝四篇老子二篇最得深旨黃帝老子之書謂之黃老列子引黃帝書吕氏春秋引黃帝言又曰嘗得學黃帝之所以誨顓頊矣賈誼淮南子引黃帝曰朱文公曰黃帝聰明神聖得之於天天下之理無不知天下之事無不能上而天地隂陽造化發育之原下而保神練氣愈疾引年之術庶物萬事之理巨細精粗洞然於胸次是以其言有及之者而世之言此者因自託焉以信其説於後世至戰國時方術之士遂筆之書以相傳授如列子所引與素問握竒之屬蓋必有粗得遺言之倣佛者如許行所道神農之言耳周官外史所掌三皇五帝之書恐不但若此而已東萊吕氏曰漢初黃老世有傳授觀樂毅傳贊可考皇覽記隂謀黃帝金人器銘武王問尚父曰五帝之誡可得聞歟尚父曰黃帝之戒曰吾之居民上也搖搖恐夕不至朝故為金人三封其口曰古之慎言金人銘蓋六篇之一也亦見家語蔡雍論黃帝有巾機之法皇王大紀曰黃帝作輿几之針以警宴安作金几之銘以戒逸欲黃帝內傳一卷序云籛鏗得之於衡山石室中至劉向校書見之遂傳于世捷子二篇齊人武帝時説史記接子齊人與慎到田駢同時皆學黃老正義藝文志云接子二篇此云武帝時説當考三輔決録有接昕子鄭長者二篇袁淑真隱傳鄭長者隱德無名著書一篇言道家事韓非稱之世傳是長者之辭因以為名今按韓非子外儲説鄭長者有言曰夫虛靜無為而無見也素王妙論不著録太史公素王妙論曰諸稱富者非貴其身得志也乃貴恩覆子孫澤及鄉里也黃帝設五法布之天下用之無窮蓋世有能知者莫不尊親如范子可謂曉之矣管子設輕重九府行伊尹之術則桓公以霸范蠡行十術之計二十一年之間三致千萬再散與貧七略云司馬遷撰史記正義云二卷今僅見此語於太平御覽越世家注引云范蠡本南陽人隋志梁有太史公素王妙議二卷道家者流致堂胡氏曰道以天下共由而得名得道而盡惟堯舜文王孔子而已黃帝之書無傳老𥅆八十一篇槩之孔孟固難以大成歸之自其所見而立言不可與天下共由也獨善其身不可與天下共由而名之曰道此漢以來淺儒之論以啓後世枝流分裂之弊陳平曰我多隂謀是道家之所禁太史公曰平少時本好黃帝老子之術太史公習道論六家要旨言道家為長隂陽鄒子四十九篇鄒子終始五十六篇史記鄒衍深觀隂陽消息而作怪迂之變終始大聖之篇十餘萬言其語閎大不經云云燕昭王身親往師之作主運劉向别録云鄒子書有主運篇封禪書云自齊威宣之時鄒子之徒論著終始五德之運如淳曰今其書有五德始終五德各以所勝為行及秦帝而齊人奏之故始皇采用之又云鄒衍以隂陽主運顯於諸侯如淳曰今其書有主運五行相次轉用事隨方靣為服公孫臣上書曰推終始傳則漢當土德鹽鐵論及論衡並以衍言迂怪虛妄東萊吕氏曰方騶衍推五德之運人視之特隂陽末術耳若無預於治亂之數也及至始皇始采用之定為水德以為水德之治剛毅戾深事皆決於法刻削無仁恩和義然後合五德之數於是急法久者不赦則其所繫豈小哉周禮司爟注鄭司農引鄒子南公三十一篇史記項羽紀楚南宫曰楚雖三户亡秦必楚也正義虞喜志林云南公者道士識廢興之數知亡秦者必於楚徐廣曰楚人也善言隂陽真隱傳居國南鄙因以為號著書言隂陽事容成子十四篇吕氏春秋容成作歷莊子則陽篇容成氏曰除日無嵗無內無外張蒼十六篇本傳蒼尤邃律歷著書十八篇言隂陽律歷事志篇數不同鄒奭子十二篇七略曰鄒赫子齊人為之語曰雕龍文赫赫言鄒衍之術文飾之若雕鏤龍史記云頗采騶衍之術以紀文衍之術迂大而閎辨奭也文具難施五曹官制五篇漢制似賈誼所條賈誼傳誼以為冝當改正朔易服色制度定官名興禮樂乃草具其儀法色上黃數用五為官名悉更奏之公孫渾邪十五篇公孫賀傳祖父昆邪景帝時封平曲侯著書十餘篇法李子三十二篇食貨志李悝為魏文侯作盡地力之教史記魏有李悝盡地力之教晉形法志魏文志師李悝撰次諸國法著法經戰國策魏安陵君曰吾先君成侯受詔襄王以守此地也手受大府之憲憲之上篇曰子弒父臣弒君有常不赦國雖大赦降城亡子不得與焉張斐律序鄭鑄刑書晉作執秩趙制國律楚造僕區並述法律之名申韓之徒各自立制通鑑外紀李悝為上地守下令曰人有狐疑之訟今射的中者勝不中者負令下而人皆習射及與秦人戰大敗之商君二十九篇太史公曰嘗讀商君開塞耕戰書與其人行事相類正義云商君書五卷館閣書目今是書具存共二十六篇三篇亡後魏刑罰志商君以法經六篇入説於秦設參夷之誅連相坐之法申子六篇史記申不害傳申子之學本於黃老而主刑名著書二篇號申子注劉向别録曰今民間所有上下二篇中書六篇皆合二篇已備過太史公所記元帝紀注劉向别録云申子學號刑名刑名者以名責實尊君卑臣崇上抑下宣帝好觀其君臣篇唐志三卷崇文總目館閣書目皆缺荀子曰申子蔽於勢而不知知韓非子曰申不害徒術而無法公孫鞅徒法而無術淮南子曰商鞅之啓塞申子之三符子七略曰孝宣皇帝重申不害君臣篇使黃門郎張喬正其字處子九篇史記趙有劇子之言注徐廣曰按應劭氏姓注云處處子索隱曰前史不記其名風俗通漢有北海太守處興蓋處子之後史記正義趙有劇孟劇辛是有劇姓慎子四十二篇史記慎到趙人著十二論正義慎子十卷戰國時處士館閣書目一卷案漢志四十二篇今三十七篇亡唯有威德因循民雜德立君人五篇滕輔注荀子曰慎子蔽於法而不知賢又曰慎子有見於後無見於先史記注徐廣曰劉向所定有四十一篇荀子注其術本黃老歸刑名多明不尚賢不使能之道太平御覽引慎子昔者天子手能衣而宰夫設服足能行而相者導進口能言而行人稱辭諺云不聰不明不能為王不瞽不聾不能為公皆在亡篇韓子五十五篇史記韓非傳喜刑名法術之學而其歸本於黃老作孤憤五蠧內外儲説林説難十餘萬言注新序曰申子書號曰術商鞅書號曰法皆曰刑名東萊吕氏曰太史公謂非喜刑名法術之學則兼治之也索隱按韓子書有解老喻老二篇是亦崇黃老之學也今本二十卷五十六篇沙隨程氏曰非書有存韓篇故李斯言非終為韓不為秦也後人誤以范雎書厠于其書之間乃有舉韓之論通鑑謂非欲覆宗國則非也韓安國受韓子雜家説朝錯三十一篇錯學申商刑名於軹張恢生所與洛陽宋孟及劉帶同師吕氏曰中商之學亦世有傳授唐志朝氏新書七卷隋志梁有三卷文選賔戲注引朝錯新書太史公曰賈生朝錯明申南蘇氏曰錯不足道也而誼亦為之漢律不著録晉刑法志秦漢舊律其文起自魏文侯師李悝撰次諸國法著法經以為王者之政莫急於盜賊故其律始於盜賊須劾捕故著網捕二篇其輕狡越城博戲借假不廉淫侈踰制為雜律一篇又以具律具其加減是故所著六篇而已然皆罪名之制也唐六典注李悝集諸國刑書造法經六篇一盜法二賊法三囚法四捕法五雜法六具法商鞅傳之改法為律吕氏曰具律令之名例律也商君受之以相秦漢承秦制蕭何定律除參夷連坐之罪增部主見知之條益事律興廄户三篇吕氏曰三篇總謂之事律合為九篇叔孫通益律所不及傍章十八篇張湯越宫律二十七篇趙禹朝律六篇合六十篇隋志漢律久亡上計律周禮典路注大樂律大胥注尉律説文敘昭帝紀注田律周禮士師注酎金律丁乎漢儀漢律會稽獻藙禮記內則注會稽郡獻鮚醬會稽獻􅱣一斗祠䃾司命能捕豺貀購百錢婦告威姑祠宗廟丹書告民不繇資錢二十二綺絲數謂之絩布謂之總綬組謂之首疁田茠草及其門首灑㳻賜衣者縵裘白裏船方長為舳艫齊人豫妻婢姦曰姘見姅變不得侍祠説文吏五日得一下沐初學記列侯墳髙四丈關內侯以下至庶人各有差周禮冢人注賊律曰敢蠱人及教令者棄市周禮庶氏注掠者唯得榜笞立章帝紀與罪人交關三日已上皆應知情孔融傳三人以上無故羣飲罰金四兩漢書文帝紀注吏二千石有豫告有賜告髙帝紀注人出一算惠帝紀注無故入人室宅廬舍上人車船牽引欲犯法者其時格殺之無罪周禮朝士注疏云賊律無干車無自後射大司馬注疏云田律淫季父之妻曰報左傳注鬪以刃傷人完為城旦其賊加罪一等與謀者同罪薛宣傳郭躬父𢎞習小杜律延年惠帝四年除挾書律文帝元年除收帑相坐律令二年除誹謗律愚按律令臧於理官故志不著録遺風俗通咎陶謨虞始造律傅子曰律是咎繇訓漢命蕭何廣之漢令不著録晉刑法志漢時決事集為令甲以下三百餘篇令甲死者不可復生刑者不可復息宣帝紀令甲諸侯在國名田他縣罰金二兩哀帝紀注令甲女子犯罪作如徒六月顧山遣歸平帝紀注金布令甲曰邊郡數被兵離飢寒夭絶天年父子相失令天下共給其費蕭望之傳令甲第一常符漏品後漢歷志著于甲令而稱忠吳芮傳乙令蹕先至而犯者罰金四兩張釋之傳注令乙騎乘車馬行馳道中沒入車馬江充傳注令丙箠長短有數黃帝紀秩祿令史記吕后紀注文帝紀注宫衛令張釋之傳注金布令見上漢髙帝紀注後禮儀志注品令百官表注祠令文帝紀注祀令後漢祭祀志注齋令蔡雍表志公令何並傳注功令儒林傳序廷尉挈令張湯傳光祿挈令燕王旦傳注樂浪挈令説文廷尉板令應劭傳田令黃香傳水令兒寬傳漢令𧻀張百人蠻夷長有罪當殊之蠻夷卒有􅀈説文安帝元初五年詔曰舊令制度各有科品注漢令今亡成帝詔曰今大辟之刑千有餘條律令煩多百有餘萬言杜周曰前王所是著為律後王所是疏為令鹽鐵論文學曰今律令百有餘篇陳寵謂今律令死刑六百一十耐罪一千六百九十八贖罪以下二千六百八十一溢於甫刑者千九百八十九刑法志孝武禁罔䆮密律令凡三百五十九章鄭昌以刪定律令為正本班固以刪定律令為清原杜預律序曰律以正罪名令以存事制法家者流蓋出於理官范氏曰申韓本於老子李斯出於荀卿學者失其淵源其末流將無所不至朱文公曰申韓之學淺於楊墨東萊吕氏曰六經孔孟子之教與人之公心合故治世宗之申商韓非之説與人之私情合故末世宗之兼山黃氏曰九家之學今存者獨刑名家而止耳佛老氏而止耳髙者喜談佛老而下者或習刑名故兩家之説獨存於世秦梁至於敗亡蘇氏曰自漢以來學者雖鄙申韓不取然世主心悅其言而隂用之小人之欲得君者必私習其説或誦言稱舉之故其學至于今猶行也明罰飭法飭今易作勑後魏刑法志漢孝武世增律三十餘篇宣帝時于定國為廷尉集諸法律凡九百六十卷大辟四百九十條千八百八十二事死罪決北凡三千四百七十二條諸斷罪當用者合二萬六千二百七十二條張斐律序曰張湯制越官律趙禹作朝會正見律鹽鐵論曰二尺四寸之律古今一也杜周傳三尺法朱博傳三尺律令漢藝文志考證卷六
