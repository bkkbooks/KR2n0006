body:
  text: 漢藝文志考證卷九宋王應麟撰天文常從日月星氣二十一卷老子師之説苑常樅有疾老子往問焉泰階六符一卷東方朔傳願陳泰階六符以觀天變不可不省是日因奏泰階之事注應劭曰黃帝泰階六符經漢日旁氣行事占驗三卷功臣表成帝時光祿大夫滑堪日旁占驗曰鄧弱以長沙將兵侯天文志云正朔所候決於日旁日旁雲氣人主象皆如其形以占隋志夏氏日旁氣一卷許氏撰魏氏日旁氣圗一卷夏氏日月傳不著録天文志夏氏日月傳曰日月食盡主位也不盡臣位也漢日食月暈雜變行事占驗十三卷五行志凡漢著紀十二世二百一十二年日食五十三朔十四晦三十六先晦一日三劉向傳漢興訖竟寧孝景帝尤數率三嵗一月而一食今連三年比食自建始以來二十嵗間而八食率二嵗六月而一發古今罕有天文志髙帝七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也昴為胸奴參為趙畢為邊兵宋祖沖之曰漢載四百食率在晦海中星占驗十二卷後漢天文志注引海中占隋志有海中星占星圖海中占各一卷即張衡所謂海人之占也唐天文志開元十二年詔太史交州測景以八月自海中南望老人星殊髙老人星下衆星粲然其明大者甚衆圖所不載莫辨其名海中二十八宿國分二十八卷淮南子天文訓星部地名角亢鄭氐房心宋尾箕燕斗牽牛越須女吳虛危齊營室東壁衛奎婁魯胃昴畢魏觜嶲參趙東井輿鬼秦桞七星張周翼軫楚又有二十八宿臣分未詳吕氏曰十二次蓋戰國言星者以當時所有之國分配之通典曰當吳之未亡天下列國尚有數十韓魏趙三卿又未為諸侯晉國猶在自吳滅至分晉凡八十六年時既不同若為分配春秋正義曰星紀在於東北吳越實在東南魯衛東方諸侯遙屬戍亥之次又三家分晉方始有趙而韓魏無分趙獨有之漢書地理志分郡國以配諸次其地分或多或少鶉首極多鶉火甚狹徒以相傳為説其源不可得而聞之甘氏嵗星經不著録周禮保章氏以十有二嵗之相觀天下之妖祥注嵗星為陽右行於天大嵗為隂左行於地十二嵗而小周其妖祥之占甘氏嵗星經史記正義甘德楚人作天文星占八卷隋志梁有石氏甘氏天文占各八卷程氏春秋分記曰嵗星所在傳有明文考之汲冢師春紀述為詳謂嵗星每嵗而成一分積百四十四年而滿本數則為超辰之限石氏星經不著録史記天官書索隱曰嵗星在正月晨見東方之名已下皆出石氏星經天文志兼載甘氏周禮疏月令正義引石氏星經隋志石氏星經簿讃一卷史記正義石申作天文八卷郎顗傳引石氏經曰嵗星出左有年出右無年巫咸五星占不著録隋志巫咸五星占一卷史記天官書昔之傳天數者殷商巫咸晉陳卓總甘石巫咸三家所著星圖大凡二百八十三官一千四百六十四星以為定紀乾象新書云天文録并諸家占書所載石申甘德巫咸三家星座共二百八十三座總一千四百六十四星年代䆮逺宿次舛訛驗天文則去極不同迹星書則次舍靡定將司天監銅渾儀測驗周天星次較定前書符契天道具列于左石申列舍星二十八座共一百六十六星赤中官星五十四座共三百十八星赤外官星三十八座共二百七十一星赤甘德中官星五十九座共二百一星黑外官星三十九座共二百九星黑巫咸中官星九座共三十一星黃外官星二十座共九十五星黃石申紫微垣星一十二座共五十四星赤甘德紫微垣星二十座共一百一星黑巫咸紫微垣星四座共一十八星黃周髀不著録隋志天文始于周髀一卷按周髀云昔者周公問於商髙曰晉天文志周公受於殷商蓋字誤也竊聞乎大夫善數請問古者包犧立周天歷度夫天不可階而升地不可尺寸而度請問數安從出商髙曰數之法出於圓方圓出於方方出於矩矩出於九九八十一故折矩以為句廣三股修四徑隅五既方之外半其一矩環而共盤得成三四五兩矩共長二十有五是謂積矩故禹之所以治天下者此數之所生也周公曰大哉言數請問用矩之道商髙曰平矩以正繩偃矩以望髙覆矩以測深卧矩以知逺環矩以為圓合矩以為方方屬地圓屬天天圓地方注北極之下髙人所居六萬里滂沱四漬而下天之中央亦髙四旁六萬里是為形狀同歸而不殊途隆髙齊軌而易以陳故曰天似蓋笠地法覆盤方數為典以方出圓笠以寫天天青黑地黃赤天數之為笠也青黑為表丹黃為裏以象天地之位是故知地者智知天者聖智出於句句出於矩夫矩之於數其裁制萬物唯所為耳周公曰善哉榮方曰周髀者何陳子曰古時天子治周此數望之從周故曰周髀髀者表也趙君卿序云渾天有靈憲之文蓋天有周髀之法信都芳著四術周髀宗其序曰渾天覆觀以靈憲為文蓋天仰觀以周髀為法星傳不著録天文志引星傳曰日者德也月者刑也又曰客星守招搖蠻夷有亂又引月南入牽牛戒月入畢五行志劉向以為星傳曰心大星天王也其前星太子後星庶子也步五星日月以紀吉凶之象周禮保章氏注五星有贏縮圜角日有薄食暈珥月有盈虧朓側匿之變七者右行列舍天下禍福變移所在皆見焉後魏天象志斑史以日暈五星之屬列天文志薄蝕彗孛之比入五行説七曜一也而分為二志故陸機云學者所疑也歷譜黃帝五家歷三十三卷律歷志張夀王上書言黃帝調歷漢元年以來用之後課諸歷案漢元年不用調歷夀王及李信治黃帝調歷課皆疏閼夀王歷乃大史官殷歷也夀王猥曰安得五家歷後漢志黃帝造歷元起辛卯洪範五紀論曰民間亦有黃帝諸歷不如史官記之明也晉杜預云或用黃帝以來諸歷以推經傳朔日皆不諧合顓頊歷二十一卷顓頊五星歷十四卷後漢志顓頊造歷元用乙卯漢興襲秦正朔以張蒼言用顓帝歷比於六歷疏閼中最為微近蔡雍論曰顓帝歷術曰天元正月己巳朔旦立春俱以日月起於天廟營室五度唐志大衍歷日度議洪範傳曰歷記始於顓帝上元太始閼蒙攝提格之嵗畢陬之月朔日己巳立春七曜俱在營室五度宋志祖沖之曰案五紀論黃帝歷有四法顓帝夏周並有二術詭異紛然孰識其正顓帝歷元嵗在乙邜而命歷序曰此術設元嵗在甲寅夏殷周魯歷十四卷書正義云古時真歷遭戰國及秦而亡漢存六歷雖詳於五紀之論皆秦漢之際假託為之詩正義云今世有周歷魯歷蓋漢初為之其交無遲速盈縮考日食之法而年月往往參差又云劉向五紀論載殷歷之法惟有氣朔而已後漢志夏用丙寅殷用甲寅周用丁巳魯用庚子宋祖沖之曰夏歷七曜西行特違衆法劉向以為後人所造殷歷日法九百四十而乾鑿度云殷歷以八十一為日法春秋書食有日朔者二十六以周歷考之失二十五魯歷校之又失十三占術之作皆在漢初周末春秋正義釋例云今魯歷不與春秋相符殆來世好事者為之非真也長歷稱凡經傳有七百七十九日漢末宋仲子集七歷以考春秋魯歷得五百二十九日失三百五十日唐大衍日度議曰甄曜度及魯歷南方有弧無井鬼北方有建星無南斗中氣議曰殷歷南至常在十月晦則中氣後天也周歷蝕朔差經或二日則合朔先天也合朔議曰春秋日蝕有甲乙者三十四殷歷魯歷先一日者十三後一日者三周歷先一日者二十二先二日九其偽可知矣朝氏曰夏傑在位五十有二年湯受天命放南巢實甲寅之歷也是為成湯之元不踰年而改元革命異乎繼世之君也考靈曜命歷序皆本於甲寅元後漢志中興以來圖讖漏泄而考靈曜命歷序皆有甲寅元其所起在四分庚申元後百一十四嵗朔差却二日漢延光二年亶誦施延熹平四年馮光陳晃皆言歷元不正當用甲寅為元議郎蔡雍議之曰歷法黃帝顓頊夏殷周魯凡六家各自有元晃所據則殷歷元也然則甲寅為殷湯之元也審矣古諸儒生皆以為孔子用殷甲寅歷漢劉洪於歷最善其表言曰甲寅歷於孔子時效竊以春秋緯命歷推之可信洪言而公子譜所謂商起庚戌終戊寅者非也帝王譜謂湯元年壬寅一行歷謂成湯伐桀嵗在壬戌皆非也程氏春秋分記曰周歷惟閏法多差左氏所載屢以失閏為譏漢元殷周諜歷十七卷史記三代世表余讀諜記黃帝以來名有年數稽其歷譜諜終始五德之傳古文咸不同乖異十二諸侯年表云讀春秋歷譜諜至周厲王耿昌月行帛圖二百三十二卷耿昌月行度二卷後漢歷志賈逵論曰案甘露二年大司農中丞耿夀昌奏以圗儀度日月行考驗天運狀日月行至牽牛東井日過度月行十五度至婁角日行一度月行十三度赤道使然此前世所共知也傳周五星行度三十九卷春秋正義以古今歷書推步五星金水日行一度土三百七十七日行星十二度火七百八十日行星四百一十五度四者皆不得十二年而一終唯木三百九十八日行星三十三度十二年而強一周舉其大數十二年而一終隋志古歷五星並順行秦歷始有金火之逆又甘石並時自有差異漢初測候乃知五星皆有逆行帝王諸侯世譜二十卷溝洫志王橫引周譜云定王五年河徙劉杳曰桓談新論云太史公三代世表旁行邪上並效周譜桞芳曰司馬遷因周譜明世家大戴禮有五帝德帝繫篇隋志漢氏帝王譜三卷龜山楊氏跂春秋公子血脈譜其傳本曰荀卿嘗仕於楚矣不用故退死蘭陵而史不記其嵗月以其時考之當在周秦之間而是書秦譜乃下及乎項滅子嬰之際吾知其非荀卿氏作明矣然自古帝王世系與夫列國之君得姓受氏譜牒散亡而史傳無所考據於春秋之學尤闕然也而是書旁穿曲貫枝分派别較然如指諸掌非殫見洽聞者不能為也日晷書三十四卷司馬公日景圖云日行黃道每嵗有差地中當隨而轉移故周在洛邑漢在頴川陽城唐在汴州浚儀許商算術二十六卷溝洫志博士許商治尚書善為算能度功用九章算術不著録周禮保氏九數鄭司農云方田粟米差分少廣商功均輸方程贏不足旁要今有重差夕桀句股疏曰方田以下皆依九章算術而言重差夕桀句股此漢法增之後漢鄭玄傳通九章算術注周公所作凡九篇方田粟米差分少廣均輸方程傍要盈不足句股馬續傳善九章算術注劉徽九章算術曰商功五均輸六盈不足七方程八並無重差夕桀禮記正義重差差分一也去旁要以句股替之是為漢之九數馬融干寶云今有夕桀各為一篇未知所出梅福傳齊桓之時有以九九見者顔師古曰九九算術若今九章五曹之輩魏劉徽九章算經序包犧氏始畫八卦作九九之術以合六爻之變黃帝神而化之引而伸之建歷紀協律吕記稱𨽻首作數其詳未之聞也周公制禮有九數九章是矣漢北平侯張蒼大司農中丞耿夀昌皆以善算命世蒼等因舊文遺殘各稱刪補故校其目與古或異而所論多近語夏侯陽算經序算數起自伏羲而黃帝定三數為十等𨽻首因以著九章徐嶽數術紀遺云黃帝為法數有十等及其用也乃有三焉十等者謂億兆京垓秭壤溝澗正載三等者謂上中下也其下數者十十變之若言十萬曰億十億曰兆十兆曰京也中數者萬萬變之若言萬萬曰億萬億曰兆萬萬兆曰京也上數者數窮則變若言萬萬曰億億億曰兆兆兆曰京也從億至載終於大衍髙祖紀張蒼定章程如淳曰章歷數之章術程者權衡斗桶丈尺之法式廣韻云説文算長八寸計歷數者也又有九章術漢許商杜忠陳熾魏王粲並善之五紀論不著録律歷志劉向總六歷列是非作五紀論後漢歷志五紀論日月循黃道南至牽牛北至東井率日月行一度月行十三度十九分度之七也五紀論推步行度當時比諸術為近然猶未稽於古以定三統服色之制劉歆作三統歷及譜三代各據一統天統子地統丑人統寅春秋緯樂緯云夏以十三月為正息卦受泰物之始其色尚黑以寅為朔殷以十二月為正息卦受臨物之牙其色尚白以雞鳴為朔周以十一月為正息卦受復其色尚赤以半夜為朔三正記云正朔三而改文質再而復朱文公曰天開於子地闢於丑人生於寅故斗柄建此三辰之月皆可以為嵗首而三代迭用之五行堪輿金匱十四卷周禮保章氏注輿雖有郡國所入度非古數也占夢注今八會其遺象疏案堪輿大會有八小會亦有八又堪輿天老曰假令正月陽建於寅隂建在戍鄭答張逸問案堪輿黃帝問天老事云四月有癸亥十月丁巳為隂陽交會史記日者傳禇先生云孝武時聚會占家問之某日可取婦乎堪輿家曰不可後漢王景參紀衆家數術之書堪輿日相之屬適於事用者集為大衍玄基唐吕才曰按堪輿經黃帝對天老始言五姓後魏殷紹以黃帝四序經文撮要為四序堪輿揚雄甘泉賦屬堪輿以壁壘注張晏曰堪輿天地總名孟康曰神名造圖宅書者公羊疏引堪輿云九月日體在大火鍾律災應二十六卷隋牛𢎞傳劉歆鍾律書云春宫秋律百卉必凋秋宫春律萬物必榮夏宫冬律雨雹必降冬宫夏律雷必發聲見風俗通鍾律叢辰日苑二十二卷日者傳叢辰家曰大凶泰一二十九卷日者傳太一家曰大吉後漢髙彪傳天有太一五將三門注太一式凡舉事皆欲發三門順五將東萊吕氏曰古之醫者觀八風之虛實邪正以治病因有太乙九宫之説其説具於針經風后孤虛二十卷龜䇿傳曰辰不全故有孤虛注六甲孤虛法甲子旬中無戌亥戌亥為孤辰巳為虛甲戌旬中無申酉申酉為孤寅邜為虛甲申旬中無午未午未為孤子丑為虛甲午旬中無辰巳辰巳為孤戌亥為虛甲辰旬中無寅邜寅邜為孤申酉為虛甲寅旬中無子丑子丑為孤午未為虛隋志遁甲孤虛記一卷伍子胥撰吳越春秋計􅒍曰孤虛謂天門地户也後漢方術傳注孤謂六甲之孤辰對孤為虛趙彥為宗資陳孤虛之法從孤擊虛以討賊孟子注天時謂時日支干五行王相孤虛之屬也正義云孤虛之法以一畫為孤無畫為虛二畫為實以六十甲子日定東西南北四方然後占其孤虛實而向背之即知吉凶矣羡門式法二十卷日者傳分䇿定卦旋式正棊周禮大史抱天時與大師同車鄭司農云抱式以知天時唐六典三式曰雷公太一六壬其局以楓木為天棗心為地刻十二神下布十二辰月令正義按隂陽式法梁元帝洞林序云羡門五將韓終六壬司馬相如傳注羡門偈石山上仙人羡門髙也五音竒胲用兵二十三卷五音竒胲刑德二十一卷淮南子兵略訓明於星辰日月之運刑德竒賌之數背鄉左右之便此戰之助也注竒胲之數竒祕之數非常術史記倉公傳脈書上下經五色診竒咳術咳與胲同抱朴子云黃帝審攻戰則納音之䇿左傳史龜曰是謂沈陽可以興兵利以伐薑不利于商姓之有五音蓋已見於此翼氏風角不著録翼奉傳注翼氏風角曰木落歸本水流歸末故木利在亥水利在辰金剛火疆各歸其鄉故火刑於午金刑于酉郎顗傳注風角謂候四方四隅之風以占吉凶蔡雍傳注翼氏風角曰風者天之號令所以譴告人君晉天文志京房著風角書有集星章所載妖星皆見於月旁隋志翼奉風角要候十一卷翼氏占風一卷京房風角要占三卷風角五音占五卷郊祀志注翼氏風角五德東方甲南方丙西方庚北方壬中央戊五行者五常之形氣也中庸注木神則仁金神則義火神則禮土神則智水神則信朱文公曰知信二字位置不能不舛張文饒曰五運六氣天之五行也五音六律地之五行也納音人之五行也羞用五事古文作敬用其法亦起五德始終史記歷書鄒衍明於五德之傳而散消息之分沈約曰五德更王有二家之説鄒衍以相勝立體劉向以相生為義蓍龜龜書五十二卷隋志有龜經一卷晉掌卜大夫史蘇撰崇文總目三卷而五十二卷之書亡矣史記龜䇿傳楮先生所補亦其大略也沈氏曰古之十者有繇辭周禮三兆其頌皆千有二百如鳯凰于飛和鳴鏘鏘間于兩社為公室輔専之渝攘公之羭一薰一蕕十年尚猶有臭如魚窺尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰大橫庚庚余為天王夏啓以光是也後漢張衡傳注龜經有棲鶴兆梁后兆得夀房説文引太史卜書左傳晉趙鞅卜救鄭遏水適火服虔云兆南行適火卜法橫者為土立者為木邪向經者為金背金者為火因兆而細曲者為水古文周書占曰蜉蝣之羽飛集于户夏龜二十六卷龜䇿傳塗山之兆從而夏啓世墨子夏后開使飛廉析金于山鑄鼎於昆吾使翁難乙灼白若之龜繇曰逢逢白雲一南一北一西一東九鼎既成遷于三國張衡靈憲恆娥竊藥奔月將往枚筮之於有黃有黃占之曰吉翩翩歸妹獨將西行逢天晦芒毋驚毋恐後且大昌此夏龜筮之見於書者太史公曰三王不同龜周易二十八卷史記大宛傳天子發書易云神馬當從西北來隋志京房有周易占守林飛侯四時候錯卦混沌委化逆刺占災異占事焦贛費直有易林皆不著録焦贛易林十六卷卷有四林林六十有四繇凡六十四卦之變四千九十有六東觀漢記孝明帝永平五年少雨上御雲臺自卦遇蹇以京氏易林占之繇曰蟻封穴户天將下雨沛獻王輔用體説卦謂蟻穴居知雨京房延夀弟子今書蹇繇實在震林三統歷引易九厄左氏載筮辭大有之乾曰同復乎父敬如君所蠱曰千乘三去三去之餘獲其雄狐復曰南國􅀈射其元王中厥目其辭皆韻如焦林之類儀禮疏古用木畫地記爻今用錢三少為重九也三多為交六也兩多一少為單七也兩少一多為坼八也周易隨曲射匿五十卷隋志有易射覆二卷又一卷東方朔傳上嘗使諸數家射覆朔自贊曰臣嘗受易請射之乃别蓍布卦而對贊曰逢占射覆注逢占逆吉事猶云逆刺也莫善於蓍龜今易作莫大乎蓍龜劉向云龜千嵗而靈蓍百年而神以其長久故能辨吉凶也漢藝文志考證卷九
