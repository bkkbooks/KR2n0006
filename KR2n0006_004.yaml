body:
  text: 漢藝文志考證卷四宋王應麟撰論語論語古二十一篇出孔子壁中兩子張可如淳曰分堯曰篇後子張問何如以從政已下爲篇名曰從政家語後序云孔安國爲古文論語訓二十一篇何晏序云古論唯博士孔安國爲之訓解而世不傳新論云文異者四百餘字正義曰孔子舊宅壁中得古文經傳即謂論語孝經爲傳也古文者科斗書蒼頡本體周所用以今所不識故名古文春秋正義引哀公問主於宰我案古論語及孔鄭皆以爲社主張包周等並爲廟主釋文云不知命無以爲君子也魯論無此章今從古説文引狐貈之厚絬衣長短右袂色孛如也文質份份不使勝食既朝袉身善射小人窮斯㜮讄曰禱爾于上下神祗友諞佞以杖荷莜有荷臾而過孔氏之門奡湯舟皆古文也又引論語跢予之足齊二十二篇多問王知道晁氏公武田齊論有問王知道兩篇詳其名是必論内聖之道外王之業未必非夫子之最致意者曰張侯論爲世所貴本傳禹爲成帝師以上好論語難數對巳問經爲論語章句獻之鄭𤣥以張侯論爲本參考齊古而爲之法孔子家語二十七卷師古曰非今所有家語馬昭謂今家語王肅增加非鄭𤣥所見肅私定以難𤣥孔子三朝七篇劉向别錄云孔子見魯哀公問政比三朝退而爲此記凡七篇並入大戴禮蜀志秦宓曰昔孔子三見哀公言成七卷裴松之注案中經簿有孔子三朝八卷一卷目錄餘者所謂七篇七篇今考大戴禮千本四代虞戴徳誥志小辨用兵少間史記漢書文選注所引謂之三朝記爾雅疏張揖引禮三朝記皆此書也孔子徒人圖法大史公曰弟子籍出孔氏古文近是史記孟子世家弟子葢三千焉身通六藝者七十二人索隠云史記自子石以右三十五人顯有年名及受業聞見于書傳其四十有二人無年及不見書𫝊家語此例唯有三十七人史記所傳七十有七家語所錄七十有六共公良孺秦商顔亥叔仲㑹四人家語有事迹史記闢然自公伯寮秦冉􅀈單三人家語不載而别有琴牢不知何説而張禹獨遺之禹身不知王鳯之邪正其不知此固宜然勢位足以軒輊一世使斯文遂䘮惜哉何晏序云鄭𤣥就魯論篇章考之齊古爲之註艾軒林氏曰康成溺於章句其竄定未必審也許氏説文有所謂逸論語是康成之説未行而論語散逸已有不傳者説文逸論語曰玉粲之璱兮其􅚇猛也如玉之瑩又曰璵璠魯之寳玉也孔子曰美哉璵璠逺而望之奐若也近而眎之瑟若也一則理勝二則孚勝初學記亦謂逸論語之文愚謂問王疑即問玉也篆文相似季氏篇洪氏曰或以爲齊論正義曰齊論者齊人所傳魯二十篇釋文曰鄭校周之本以齊古讀正凡五十事皇覽引魯讀六事正義曰魯論者魯人所𫝊即今所行篇次是也石經論語載盍毛包周有無不同之説其文有增損者其字亦有假借及用古者有字異而訓不逺若置其杖賈之哉者後漢𫝊有遵五迸四之文祝睦碑云鄉黨逡逡劉脩碑云鄉黨遜遜如也古今人表卑湛尾生髙尾生畮厥黨童子祝佗革子成茀肹廣韻引子西彼哉彼義切集韻引煥爾捨瑟而作魯安昌侯説二十一篇何晏序云張禹本受魯論兼講齊説善者從之號闕及馬融為之𫝊隋開皇中祕書學士王孝逸於陳人處得之劉炫為之作稽疑一篇將以興墜起廢而時人已多譏笑之者唐開元中劉知己以為宜行孔廢鄭諸儒争難蠭起卒行鄭學許冲上父説文云古文孝經昭帝時魯國三老所獻建武時議郎衛宏所校按志云孔氏壁中古文則與尚書同出也葢始出於武帝時至昭帝時乃獻之隋志云安國之本亡於梁亂儒者皆云劉炫自作之非孔舊本家語後序安國爲孝經傳二篇今有經無傳司馬公為指解并音百桓譚新論曰古孝經二十章千八七十一字今異者四百餘孝經一篇十八章隋志河間顔芝所藏漢初芝子貞出之凡十八章千八百七十二字劉向以顔本比古文除其繁惑以十八章為定雜傳四篇蔡邕明堂論引魏文侯孝經傳葢雜傳之一也爾雅二卷禮三朝記公曰寡人欲學小辯以觀於政其可乎孔子曰爾雅以觀於古足以辯言矣釋詁一篇葢周公所作舊説此書始於周公以教成王釋言以下或言仲尼所增子夏所定叔孫通所益梁文所補漢郭威謂爾雅周公所制而有張仲孝友等語疑之以問揚雄雄曰記有孔子教魯哀公學爾雅爾雅之出逺矣自古學者皆云周公作當有所據其後孔子弟子㳺夏之儔又有所記以解釋六藝故有張仲孝友等語劉向謂史佚教其子以爾雅艾軒林氏曰爾雅一書六籍之户牖學者之要津也古人之學必先通爾雅則六籍百家之言皆可以類求也及散裂爾雅而投諸箋注説隨意遷文從義變説或拘泥則文亦牽合學者始以訓詁之學爲不足學也釋詁釋言釋訓猶詩之有六義小學之有六書止齋陳氏曰古者重小學漢嘗置博士如毛氏詩訓許氏説文楊氏方言之類皆有所本隋唐以來以科目取士此書浸廢韓退之尚以注蟲魚爲不切則知誦習者寡矣晁氏曰爾雅小學之類附孝經非是小爾雅一篇孔鮒撰十三章申衍詁訓見孔叢子李軌解一卷古今字一卷春官外史掌達書名于四方注古曰名今曰字秋官大行人諭書名注書之字也聘禮記曰百名以上書之於䇿不滿百名書之於方説文叙倉頡初作書葢依類象形故謂之文其後形聲相益即謂之字字者言孳乳而浸多也著於竹帛謂之書書者如也呂氏曰秦之文字多李斯趙高所定非保氏之教也樓氏曰古字不多率假借以爲用後世寖廣隨俗更改多失造字之意弟子職一篇管子雜篇第五十九有學則蚤作受業饌饋乃食洒掃執燭請衽退習等章朱文公曰竊疑是作内政時士之子常為士因作此以教之説三篇周禮注引孝經説葢緯書非是之謂也孔子爲曾子陳孝道致堂胡氏曰曾子門人纘所聞而成之晁氏曰何休稱子曰吾志在春秋行在孝經孝經鈎命决云信斯言也則孝經乃孔子自著今首章云仲尼居曾子侍則非孔子所著明矣詳其文義當是曾子弟子所爲書小學史籀十五篇説文叙曰宣王太史籀著大篆十五篇與古文或異艾軒林氏曰大篆出於史籀戰國以來俱用之許氏微得其舊體唐𤣥度曰秦焚詩書惟易與史篇得全王莽之亂此篇亡失建武中獲九篇章帝時王育爲作解説所不通者十有二三晉世此篇廢今畧傳字體而已今按説文引王肓説翟氏曰史籀變倉頡之法作大篆摠天下字一以㑹意書法之壊自籀始衛恒曰或與古同或與古異世謂之籀書元帝善史書應劭曰史籀所作大篆安帝年十嵗好學史書漢官儀能通蒼頡史籀篇補蘭臺令史滿嵗爲尚書郎歐陽公指石鼔爲籀書以前乎籀書則古文科斗也嚴延年善史書奏成於手中貢禹亦言郡國擇便巧史書者以爲右職王尊傳司𨽻遣假佐蘇林謂取内郡善史書佐給諸府志云尚書御史史書令史則外之郡國内之諸府皆有史書吏以備剡奏也八體六技説文叙秦書有八體大篆小篆刻符蟲書摹印署書殳書𨽻書漢興有草書尉律學僮十七已上始試諷籀書九千字乃得爲吏又以八體試之郡移太史并課最者以爲尚書史書或不正輒舉劾之及亡新居攝使大司空甄豐等校文書之部頗改定古文時有六書古文竒字篆書佐書繆篆鳥蟲書佐書即𨽻也尚書正義亦云秦有八體亡新六書去大篆刻符殳書署書加古文奇字志謂漢興蕭何草律亦著其法曰太史試學童能諷書九千字以上乃得爲史又以六體試之六體者古文竒字篆書𨽻書繆篆蟲書律即尉律廷尉治獄之律六體乃新莽之制漢興尉律所試者八體也當從説文叙所謂六技者疑即亡新六書蕭子良古今篆𨽻文體云殳書伯氏之職也古者文既記笏武亦書殳墨藪秦始皇以祈禱名山作刻符書用題印璽蕭何作署書題蒼龍白虎二闕蒼頡一篇説文叙七國文字異形秦初兼天下丞相李斯乃奏同之罷其不與秦文合者斯作倉頡篇中車府令趙高作爰歴篇太史令胡母敬作博學篇皆取史籀大篆或頗省改所謂小篆者也初有𨽻書以趣約易而古文由此絶矣考工記注引蒼頡篇有鞄􅠙柯欘顔之推曰蒼頡篇李斯所造而云漢兼天下海内并厠豨黥韓覆畔討滅殘非本文也羅氏曰其篇雖名祖蒼頡而實異史籀龜山楊氏曰圖書之文天實兆之非人私智所能爲也秦人以吏爲師嚴是古之禁盡滅先王之籍漢興去秦未逺也科斗書世已無能知者况數千載之後乎揚子曰言心聲也書心畫也世𫝊小篆李斯趙高之徒以反古逆亂之心爲之其淵源可知矣揚子或欲學蒼頡史篇曰史乎史子愈於妄闕也厯張湯傳爰書訊鞫論報劉仲馮曰趙高作爰獄吏用之凡將一篇文選蜀都賦注引司馬相如凡將篇曰黄潤纎美冝制禪藝文類聚引凡將篇曰鐘磬竽笙筑坎侯唐志猶有此書今闕説文引相如説急就一篇隋唐志謂之急就章顔師古叙曰司馬相如作凡將篇史游景慕擬而廣之元成之間列於祕府舊得皇象鍾繇衛夫人王羲之所書篇本備加詳覈凡三十二章又見崔浩劉芳所注未善遂爲解訓晁氏曰雜記姓名諸物五官等字以教童䝉急就者謂字之難知者緩急可就而求焉羅氏曰一本相傳是吳皇象寫比顔解本無焦滅胡以下六十三字纔三十一章而已國朝太宗皇帝嘗書此篇又於顔本外多齊國山陽兩章凡爲章三十有四此兩章葢起於東漢按急就篇末説長安中涇渭街術故此篇亦言洛陽人物之盛以相當而鄗縣以世祖即位之地升其名爲高邑與先漢所改真定常山並列此爲後漢人所續不疑元帝善史書游爲此篇皆稍近古傳稱游勤心納忠有所補益豈此類耶訓纂一篇揚雄傳史篇莫大於倉頡作訓纂説文叙孝宣時召通倉頡讀者志云徴齊人能正讀者張敞從受之涼州刺史杜業沛人爰禮講學大夫秦近亦能言之孝平時徴禮等百餘人令説文字未央廷中紀元始五年正月徴天下通知小學史篇者以禮爲小學元士黄門侍郎揚雄采以作訓纂篇隋志三蒼三卷李斯作蒼頡篇江式曰蒼頡爰厯博學後人分五十五章爲上卷書按此即志所謂閭里師合三篇者揚雄作訓纂篇江式曰元夀中作爲中卷後漢郎中賈魴作滂喜篇江式曰永元中賈叔郎接記爲下卷故曰三蒼徐氏曰賈魴以三蒼之書皆爲𨽻字𨽻字始廣而篆籀轉微説文繋傳以蒼頡爰厯博學爲三蒼史記正義引訓纂説文引揚雄説雄乆爲郎校書麟閣見天下上計孝亷及内郡衛卒㑹者常提三尺弱翰齎油素四尺以問異語歸即以鈆摘次於槧積二十有七嵗而書成名曰輶軒使者絶代語釋别國方言方言者葢爾雅之流也十五卷劉棻從雄學作竒字注古文之異者杜林蒼頡訓纂一篇杜鄴𫝊初鄴從張吉學吉子竦從鄴學問尤長小學鄴子林正文字過於鄴竦故世言小學者由杜公隋志梁有蒼頡二卷杜林注説文引杜林説六書韓非子曰蒼頡之作書也自環者謂之私背私謂之公一云自營爲厶背厶爲公象事周禮注云處事説文序云指事象意周禮注説文序云㑹意象聲周禮注云諧聲説文序云形聲周禮䟽云書有六體形聲實多夾漈鄭氏曰書契之本見於文字獨體爲文合體爲字文有子母主類爲母從類爲子文字之本出於六書象形指事文也㑹意諧聲轉注字也假借者文與字也古三墳伏羲氏始畫八封命臣飛龍氏造六書説文引孔子曰一貫三爲王推十合一爲士㮚之爲言續也黍可爲酒禾入水也烏􅀈呼也貉之爲言惡也牛羊之字以形舉也凡在人下故詰屈狗叩也視犬之字如畫狗也未詳所出然似非孔子之言或緯書所載也諷書九千字以上字或不正輒舉劾羅氏曰古來用字約少板䇿所書多者纔百名以上今漢代試爲史者一童所記至九千字烏覩古所謂正哉劉勰云馬字缺畫而石建懼死雖云性謹亦時重文也龜山楊氏曰先王之時書必同文故建官以達之所以一道徳之歸立民信也漢初猶有課試之科舉劾之令以同天下之習古文科斗之書始於蒼頡其文至三代不改周宣王時雖史籀有大篆十五篇猶與科斗並行故終三代所用者惟篆與蒼頡二體盧植曰古文科斗近於爲實而厭抑流俗降在小學衛宏古文竒字序云秦改古文以爲篆𨽻𨽻書趙氏明誠曰庾肩吾云𨽻書今之正書也張懐瓘六體書論亦云𨽻書者程邈造字皆真正亦曰真書自唐以前皆謂楷字爲𨽻至歐陽公集古録誤以八分爲𨽻書自是舉世凡漢時石刻皆目爲漢𨽻東魏大覺寺碑隂題韓毅𨽻書葢今楷字也沙隨程氏曰書苑云蔡文姬言割程𨽻字八分取二分割李篆字二分取八分於是爲八分書千文曰杜藳鍾𨽻唐孫過庭草書譜曰元常專精於𨽻書伯英尤工於草體彼之二美逸少兼之此以真行爲𨽻也鍾王未嘗爲今所謂𨽻書者也梁蕭子雲以逸少不及元常子敬不及逸少因此硏思遂悟𨽻式此以真行爲𨽻無疑本朝任玠序范度五體千文云𨽻則統乎羲獻鍾庾歐虞顔柳真草之軰八分則酌乎篆𨽻之間此又其證也陸氏曰周越書苑云郭忠恕以爲小篆散而八分生八分破而𨽻書出𨽻書悖而行書作行書狂而草書聖以此知𨽻書乃今真書愚按唐六典注亦云𨽻書典籍表奏及公私文疏所用徐鉉謂𨽻書之法有刪繁補缺之論則其僞斷可知矣唐張懐瓘書斷云八分者秦羽人上谷王次仲所作始皇時官務稍多得次仲文簡畧赴急速之用臣復續揚雄作十三章韋昭曰臣班固自謂也隋唐志班固太甲篇在昔篇各一卷五者葢五常之道相湏而備白虎通曰經常也有五常之道故曰五經樂仁書義禮禮易智詩信也與此不同西山真氏曰六經於五常之道無不包者今以五常分屬於六藝是樂有仁而無義詩有義而無仁也可乎哉注秦近君儒林傳秦㳟延君增師法至百萬言近字誤序六藝爲九種唐氏曰漢世經先出者不如後出盛傳於後世費氏易古文尚書毛詩小戴禮左氏春秋大抵初以經名家者後多不傳所謂欲速不達晁氏曰典籍之存詁訓之傳皆漢書之力漢書於學者何負而例貶之歟漢藝文志考證卷四
