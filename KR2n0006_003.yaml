body:
  text: 漢藝文志考證卷三宋王應麟撰樂樂記二十三篇禮記正義云樂記者記樂之義此於别録屬樂記蓋十一篇合為一篇謂有樂本有樂論有樂施有樂言有樂禮有樂情有樂化有樂象有賔牟賈有師乙有魏文侯今雖合此略有分焉劉向所校二十三篇著於别録今樂記所斷取十一篇餘有十二篇其名猶在奏樂第十二樂器第十三樂作第十四意始第十五樂穆第十六説律第十七季札第十八樂道第十九樂義第二十昭本第二十一昭頌第二十二竇公第二十三王禹二十四卷記無所録周禮樂師注云貍首在樂記蔡雍明堂論引樂記曰武王伐殷為俘馘于京太室沈約云樂記取公孫尼子史記正義云樂記公孫尼子次撰樂經不著録元始四年立樂經三禮圖云舊圖引樂經云黃鍾磬云云周禮磬氏疏案樂云磬前長三律二尺七寸後長二律尺八寸與三禮圖所引同今樂經亡傳莫知誰作王充論衡曰陽成子長作樂經非庶幾之才不能成也又曰陽成子張作樂然則漢儒所作歟後漢律厯志注建初二年七月太常丞鮑鄴上言亦引樂經曰十二月行之所以宣氣豐物也隋志有樂經四卷沈約云秦代滅學樂經殘亡晉中經簿無復樂書别録所載已復亡逸尚書大傳引樂曰舟張辟雍鶬鶬相從八風回回鳯皇喈喈雅歌詩四篇文選注七略曰漢興魯人虞公善雅歌發聲盡動梁上塵晉志杜夔傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭此四篇豈即四曲歟當考雅琴趙氏七篇師氏八篇龍氏九十九篇劉向别録雅琴之意皆出龍德諸琴雜事中宣帝元康神爵間丞相奏能鼓琴者渤海趙定梁國龍德皆召入見溫室使鼓琴待詔定為人尚清靜少言語善鼓琴時間燕為散操向有雅琴賦見文選注沈約曰别録龍氏雅琴百六篇劉昆能彈雅琴知清角之操文選注引七略雅暢第十七夾漈鄭氏曰琴之九操十二引以音相授並不著辭琴之有辭自梁始王褒傳上頗作歌詩欲興協律之事丞相魏相奏言知音善鼓雅琴者渤海趙定梁國龔德皆召見待詔樂元語不著録食貨志樂語有五均鄧展曰樂元語河間獻王所傳道五均事瓚曰其文云天子取諸侯之士以立五均則市無二賈四民常均白虎通引樂元語曰東夷之樂曰朝離南夷樂曰南西夷樂曰味北夷樂曰禁又云受命而六樂樂先王之樂明有法也殷薦之上帝以享祖考今易作以配祖考自黃帝下至三代樂各有名通典伏羲樂名扶來亦曰立本神農樂名扶持亦曰下謀黃帝作咸池少皥作大淵顓頊作六莖帝嚳作五英堯作大章舜作大韶禹作大夏湯作大濩周武王作大武周公作勺大司樂周所存六代之樂黃帝雲門大卷堯大咸舜大㲈禹大夏湯大濩武王大武河間獻王作樂記獻八佾之舞本傳武帝時獻王來朝獻雅樂大事記在元光五年冬十月禮樂志河間獻王有雅材亦以為治道非禮樂不成因獻所集雅樂天子下大樂官常存肄之嵗時以備數然不常御常御及郊廟皆非雅聲至成帝時謁者常山王禹世受河間樂能説其義其弟子宋曄等上書言之下大夫博士平當等考試當以為河間獻王聘求幽隱修興雅樂以助教化時大儒公孫𢎞董仲舒等皆以為音中正雅立之大樂春秋鄉射作於學官希濶不講今曄等守習孤學大指歸於興助教化宜領屬雅樂以繼絶表微事下公卿以為久逺難分明當議復寢春秋春秋古經十二篇周禮小宗伯注古文春秋經公即位為公即立疏云春秋古經是此古文經所藏之書文帝除挾書律此本然後行於世史記吳世家余讀春秋古文服虔注左氏云古文篆書一簡八字經十二卷公羊榖梁二家詩正義漢初為傳訓者皆與經别行三傳之文不與經連故石經書公羊傳皆無經文左氏傳三十卷漢初出張蒼之家文帝時賈誼為訓詁授趙人貫公太史公十二諸侯年表序云孔子西觀周室論史記舊聞興於魯而次春秋七十子之徒口受其傳指為有所刺譏褒諱挹損之文辭不可以書見也魯君子左丘明懼弟子人人異端各安其意失其真故因孔子史記具論其語成左氏春秋劉歆以為左丘明好惡與聖人同親見夫子而公羊穀梁在七十子後傳聞之與親見其詳略不同建平中歆欲立左氏諸儒排之謂左氏不傳春秋沈氏云嚴氏春秋引觀周篇云孔子將修春秋與左丘明乘如周觀書於周史歸而修春秋之經丘明為之傳共為表裏啖氏曰左氏比於二傳其功最高博采諸家敘事尤備能令後代頗見本末因以求意經文可知劉氏曰仲尼之時魯國賢者無不從之遊獨丘明不在弟子之籍若丘明真受經作傳者豈得不在弟子之籍哉丘明自用其意説經泛以舊章常例通之於史䇿可以見成敗耳其褒貶之意非丘明所盡也以其不受經也石林葉氏曰古者以左史書言右史書動左氏蓋左史之後以官名氏者也所以得其目以為傳東萊呂氏曰左氏於定哀之間載孔子之事皆傳聞失實本不曾登聖門公羊疏云左氏先著竹帛故漢時謂之古學平帝時始立學官建武以李封為博士復廢肅宗令賈逵選公羊嚴顔諸生教以左氏與簡紙經傳各一通雖不立學官然擢高第為講郎説文引古文左氏無以莤酒附婁無松柏樌瀆鬼神諸侯敵王所鎎誒誒出出王室日蠢蠢焉澤之目籞不義不䵒癹夷藴崇之楄部薦幹其字多異後漢言左氏祖鄭興而賈逵傳父業故有鄭賈之學公羊傳十一卷戴宏序云子夏傳與公羊高高傳與子平平傳與子地地傳與子敢敢傳與子夀至漢景帝時夀乃共弟子齊人胡毋子都著於竹帛儒林傳胡毋生為景公博士與董仲舒同業齊之言春秋者宗事之公孫𢎞亦頗受焉武帝因尊公羊家何休自謂本胡毋生條例劉氏曰公羊異二傳者大指有三一曰據百二十國寶書而作二曰張三世三曰新周故宋以春秋當新王三者皆非也隋志春秋公羊傳十二卷嚴彭祖撰荀嵩謂公羊辭義清俊斷決明審朝氏曰既曰一家之傳而特書子公羊子者孰謂謂高歟又載魯子高子之辭何耶而又復有子沈子子女子子北宮子者高之所子歟抑平地敢夀之所子歟石林葉氏曰公羊穀梁受學於子夏此出於讖緯之書所謂説顯辭者其言不經見劉知幾史通曰左氏之義有三長二傳之義有五短子吳兢書目云高乃夏弟子榖梁傳十一卷韋賢夏侯勝言榖梁子本魯學公羊氏乃齊學也吳兢書目云秦孝公時人楊士勛疏云榖梁子名俶字元始魯人一名赤顔師古曰名喜受經于子夏為經作傳傳孫卿卿傳魯人申公申公傳博士江翁其後魯人榮廣大善榖梁又傳蔡千秋漢宣帝好榖梁擢千秋為郎由是行於世隋志梁有春秋榖梁傳十五卷漢諫大夫尹更始撰劉歆曰孝宣立榖梁後漢賈逵兼通五家榖梁之説朝氏曰榖梁晚出於漢因得監省左氏公羊之違畔而正之其精深逺大者真得子夏之所傳左氏之失專而縱公羊之失雜而拘榖梁司典刑而不縱崇信義而不拘有意乎蹈道而知變通矣不免失之隨也石林葉氏曰左氏傳事不傳義是以詳於史而未必實以不知經故也公羊榖梁傳義不傳事是以詳於經而義未必當以不知史故也又曰榖梁或記尸子沈子其所從來亦不一鄭康成曰左氏善於禮公羊善於讖榖梁善於經荀嵩謂榖梁文清義約啖氏曰三傳傳經密於左氏榖梁意精公羊詞辨但守文堅滯或至矛楯不近聖人夷曠之體鄒氏傳十一卷夾氏傳十一卷七録云建武中鄒夾氏皆絶王吉能為鄒氏春秋隋志王莽之亂鄒氏無師夾氏亡范升奏曰春秋之家又有騶夾鐸氏微三篇太史公曰鐸椒為楚威王傅為王不能盡觀春秋采取成敗卒四十章為鐸氏微劉向别録云左丘明授曾申申授吳起起授其子期期授楚人鐸椒鐸椒作抄撮八卷授虞卿説苑魏武侯問元年於吳子吳子對曰言國君必謹始也謹始奈何曰正之正之奈何曰明智吳起學春秋見於此虞氏微傳二篇劉向别録云虞卿作抄撮九卷授荀卿荀卿授張蒼公羊顔氏記十一篇顔安樂事眭孟六藝論云治公羊者胡毋生董仲舒仲舒弟子嬴公公弟子眭孟孟弟子嚴彭祖及顔安樂彭祖為嚴氏學安樂為顔氏學皆立博士後漢張霸減定嚴氏春秋為二十萬言公羊董仲舒治獄十六篇隋志董仲舒春秋決事十卷唐志春秋決獄十卷七録云春秋斷獄五卷應劭曰仲舒居家朝廷每有政議遣廷尉張湯問其得失於是作春秋決獄二百三十二事動以經對論衡曰仲舒表春秋之義稽合於律無乖異者太平御覽載仲舒決獄二事引春秋許止進藥夫人歸於齊通典載仲舒斷疑獄引春秋之義父為子隱議奏三十九篇石渠論劉更生傳初立榖梁春秋徴更生受榖梁講論五經於石渠禮記正義引議郎尹更始待詔劉更生等議石渠云後漢陳元曰孝宣為石渠論而穀梁氏興國語二十一篇司馬遷傳贊左丘明為傳又纂異同為國語史通曰左丘明既為春秋內傳又稽逸文纂别説分周魯齊晉鄭楚吳越八國事起周穆王終魯悼公為外傳國語六經之流三傳之亞也陸淳謂與左傳文體不倫定非一人所為太史公曰左丘失明厥有國語石林葉氏曰按姓氏譜有左氏有左丘氏則豈一家之言乎唐啖趙之徒頗知之然未有以傳其説也宋氏曰自魏晉以後書録所題皆曰春秋外傳國語是則左傳為內國語為外二書相副以成大業説文引國語侊飯不及一食於其心侙然兵不解醫其字多異世本十五篇周官瞽矇世奠繫注謂世之而定其繫謂書於世本也國語曰教之世以怵懼其動小史定繫世辨昭穆注謂帝繫世本之屬天子曰帝繫諸侯曰世本司馬遷傳贊世本録黃帝以來至春秋時帝王公侯卿大夫祖世所出司馬遷采世本劉向曰世本古史官明於古事者所記録黃帝以來帝王諸侯及卿大夫系諡名號凡十五篇隋志世本王侯大夫譜二卷又世本二卷劉向撰又四卷宋衷撰又云漢初得世本敘黃帝以來祖世所出春秋正義云今之世本與司馬遷言不同世本多誤不足依憑顔之推曰世本左丘明所書此説出皇甫謐帝王世紀而有燕王喜漢高祖非本文也項氏曰古者立氏必告于太史氏春秋之末知果别族於太史為輔氏後世史職既廢宗法又亡鄭氏曰三代之前姓氏分而為二男子稱氏婦人稱姓三代之後姓氏合而為一戰國䇿三十三篇劉向校書録序云中書本號或曰國䇿或曰國事或曰短長或曰事語或曰長書或曰修書臣向以為戰國時遊士輔所用之國為之策謀宜為戰國䇿邊通學短長蒯通善為長短説主父偃學長短從橫術隋志三十四卷劉向録唐志缺二卷今世所傳三十三卷史通曰其篇有東西二周秦齊燕楚三晉宋衛中山合十二國分為三十二卷謂之䇿者蓋録而不序即簡以為名司馬遷采戰國䇿姚氏校定總四百八十餘條太史公采九十餘條其事異者止五六條奏事二十篇秦時大臣奏事刻石名山文七國未變古式言事於王皆稱上書秦初改書曰奏秦刻石者四嶧山琅邪臺之罘會稽楚漢春秋九篇陸賈記項氏與漢高初起及惠文間事隋志九卷史通云晏子虞卿呂氏陸賈其書篇第本無年月而亦謂春秋司馬遷傳贊漢興伐秦定天下有楚漢春秋劉氏曰厯代國史其流出於春秋劉歆敘七略王儉撰七志史記以下皆附春秋荀朂分四部史記舊事入丙部阮孝緒七録記傳録紀史傳由是經與史分洪氏曰陸賈書當時事而所言多與史不合顔師古屢辨之若高祖之臣别有綘灌南宮侯張耳準隂舍人謝公太史公百三十篇十篇有録無書東萊呂氏曰以張晏所列亡篇之目校之史記或其篇具在或草具而未成非皆無書也其一曰景紀此其篇具在者也所載間有班書所無者其二曰武紀十篇唯此篇亡衛宏漢舊儀注曰司馬遷作本紀極言景帝之短及武帝之過武帝怒而削去之衛宏與班固同時是時兩紀俱亡今景紀所以復出者武帝特能毁其副在京師者耳藏之名山固自有他本也武紀終不見者豈非指切尤甚雖民間亦畏禍而不敢藏乎其三曰漢興以來將相年表其書具在但前闕敘其四曰禮書其敘具在自禮由人起以下則草具而未成者也其五曰樂書其敘具在自凡音之起而下則草具而未成者也其六曰律書其敘具在自書曰七正二十八舍以下則草具而未成者也其七曰三王世家其書雖亡然敘傳云三子之王文辭可觀作三王世家則其所載不過奏請及䇿書或如五宗世家其首略敘其所自出亦未可知也贊乃真太史公語也其八曰傳靳蒯成列傳此其篇具在而無刓缺者也張晏乃謂褚先生所補褚先生論著附見史記者甚多試取一二條與此傳並觀之則雅俗工拙自可了矣其九曰日者列傳自余志而著之以上皆太史公本書其十曰龜䇿列傳其序具在自褚先生曰以下乃其所補爾方班固時東觀蘭臺所藏十篇雖有録無書正如古文尚書兩漢諸儒皆未嘗見至江左始盛行固不可以其晚出遂疑以為偽也馮商所續太史公七篇張湯傳贊馮商稱張湯之先與留侯同祖史通云史記所書年止漢武太初已後闕而不録其後劉向向子歆及諸好事者若馮商衛衡揚雄史岑梁審肆仁晉馮假肅金丹馮衍韋融蕭奮劉恂等相次撰續迄于哀平間猶名史記至建武中司徒掾班彪以為其言鄙俗不足以踵前史又雄歆偽褒新室誤後惑衆不當埀之後代於是採其舊事傍貫異聞作後傳六十五篇其子固為漢書論衡曰揚子雲録宣帝以至哀平陳平仲紀光武太古以來年紀二篇李德林曰史者編年也故魯號紀年墨子又云吾見百國春秋春秋緯曰開闢至獲麟二百七十六萬嵗分為十紀大率一紀二十七萬六千年艾軒林氏曰伏羲氏元年辛巳或以為甲寅陶唐氏元年戊辰或以為辛卯或以為甲辰舜之年月以孟子司馬遷之言求之虞書似亦有不合者六藝論云燧人至伏犧一百八十七代漢著記百九十卷劉毅曰漢之舊典世有注記荀悅申鑒曰先帝故事有起居注曰注動靜之節必書焉通典曰漢武帝有禁中起居注馬后撰明帝起居注則漢起居似在宮中為女史之任谷永言災異有八世著記久不塞除之語漢大年紀五篇高祖文帝武帝紀臣瓚注引漢帝年紀蓋即此書左史記言右史記事玉藻曰動則左史書之言則右史書之與此不同東萊呂氏曰玉藻云云説者遂以尚書為右史所書殊不知三典兼載言動如禹貢一篇皆紀事未嘗有禹之言也冥氏春秋不著録秋官𡨕氏注鄭司農云冥讀為𡨕氏春秋之𡨕愚按儒林傳堂溪惠授泰山𡨕都顔氏有管冥之學疏謂若晏子呂氏春秋之類恐非夾氏未有書夾氏傳十一卷有録無書然則録存而書亡也有書當考漢藝文志考證卷三
